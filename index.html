   "column by platoon, the instructor will command:\n\n"+
   "1. By platoon, right wheel. 2. MARCH.\n\n"+
   "At the first command, the captain and first lieutenant will place "+
   "themselves rapidly two paces in front of the centres of their respective "+
   "platoons; the covering sergeant will step into the front rank, in the "+
   "place of the captain.\n\n"+
   "At the command march, each platoon will wheel to the right on a fixed "+
   "pivot; the pivot man will mark time in his place, turning gradually; the "+
   "outer flank will describe the arc of a circle.  When the wheel is nearly "+
   "completed, each chief of platoon will command: 1. Platoon. 2. HALT — and "+
   "align his platoon.\n\n"+
   "The company may in like manner be broken to the LEFT by inverse commands: "+
   "1. By platoon, left wheel. 2. MARCH — each platoon wheeling to the left "+
   "on a fixed pivot, the second platoon then finding itself at the head of "+
   "the column (left in front).  (Condensed.)",
   [
     ["By platoon, right (left) wheel","break_prep",
      "The captain posts himself two paces in front of the centre of the 1st "+
      "platoon, the 1st lieutenant in front of the 2d; the covering sergeant "+
      "(1S) steps into the front rank to fill the captain's place."],
     ["MARCH (right wheel)","break_march_right",
      "The right front-rank man of each platoon faces to the right and "+
      "stands fast as the fixed pivot (178); each chief runs a little "+
      "beyond the point where the marching flank will rest, faces the late "+
      "rear, and halts his platoon three paces short of the perpendicular "+
      "(179); the covering sergeant then moves, passing by the front rank, "+
      "to where the LEFT of the 1st platoon is to rest, the second sergeant "+
      "in like manner for the 2d, each leaving a space equal to the front "+
      "of his platoon."],
     ["MARCH (left wheel)","break_march_left",
      "Each platoon wheels to the left on a fixed pivot (the left-flank "+
      "front-rank man faces to the left and stands fast); the chiefs mark "+
      "the perpendicular and halt their platoons three paces short; the "+
      "sergeants move to where the RIGHT of each platoon is to rest (186)."],
     ["3. Left (Right)--DRESS","break_dress",
      "Each chief, two paces outside his guide and facing him, dresses his "+
      "platoon the last three paces up onto the perpendicular, aligning the "+
      "sergeant between himself and the man who had faced (179-180, 186)."],
     ["FRONT","break_front",
      "The alignment ended, each chief commands Front and places himself "+
      "two paces before the center of his platoon (181, 187). The company "+
      "is in column by platoon, one guide on the flank of each platoon."],
     ["MARCH -- and forward, Guide left (right wheel)","break_forward_right",
      "The cautioned variant (188-193): the chiefs remain before their "+
      "centers during the wheel, the pivot man marks time instead of "+
      "facing, and the wheel runs full to the perpendicular; at the instant "+
      "it completes -- Forward, MARCH, Guide left -- the sergeants move "+
      "rapidly to the LEFT flanks of their platoons (1S passing before the "+
      "front rank) and the column steps off without a halt. May also be "+
      "given from the march in line (194)."],
     ["MARCH -- and forward, Guide right (left wheel)","break_forward_left",
      "The same movement breaking to the left (195): full wheel to the "+
      "left, then Forward, MARCH, Guide right -- the sergeants move to the "+
      "RIGHT flanks and the column (left in front) marches on."]
   ]],
  ["Article 2: To march in column",
   "The column being at a halt ... the instructor will command:\n\n"+
   "1. Column, forward. 2. Guide left (or right). 3. MARCH.\n\n"+
   "At the command march, both platoons will step off together; the guides "+
   "will march on the prolongation of the direction; each chief of platoon "+
   "will see that his platoon preserves its distance.  (Condensed.)",
   [
     ["Column, forward — Guide left (right) — MARCH","col_march",
      "The column of platoons advances "+MARCH_PACES+" paces, the platoons "+
      "preserving their wheeling distance.  (Click again to continue.)"]
   ]],
  ["Article 3: To change direction",
   "The column of platoons being in march, to cause it to change direction "+
   "the instructor will command:\n\n"+
   "1. Head of column to the left (or right). 2. MARCH.\n\n"+
   "The leading platoon will wheel to the left (right) on a movable pivot: "+
   "the pivot man will shorten his step over a small arc, the outer flank "+
   "will move at the full step over the large arc.  Each succeeding platoon "+
   "will march squarely up to the wheeling ground and there wheel in like "+
   "manner, on the same ground as the first.  (Condensed.)",
   [
     ["Head of column to the left — MARCH","col_left",
      "The leading platoon wheels 90 degrees to the left on the wheeling "+
      "ground and moves on; the second platoon slackens its step to give the "+
      "first room, marches up to the same ground, and wheels after it."],
     ["Head of column to the right — MARCH","col_right",
      "The same movement, wheeling to the right."]
   ]],
  ["Article 4: To halt the column",
   "The column being in march, to halt it the instructor will command:\n\n"+
   "1. Column. 2. HALT.\n\n"+
   "At the second command the column will halt; the guides will stand fast.  "+
   "(Condensed.)",
   [
     ["Column — HALT","col_halt",
      "The column halts in place.  (In this simulation the column already "+
      "halts at the end of each MARCH segment; this command sets the state so "+
      "the column can be formed into line.)"]
   ]],
  ["Article 5: Being in column by platoon, to form to the left (or right) "+
   "into line of battle",
   "The column by platoon, right in front, being at a halt, to form it to "+
   "the left into line of battle the instructor will command:\n\n"+
   "1. Left into line, wheel. 2. MARCH.\n\n"+
   "At the command march, each platoon will wheel to the left on a fixed "+
   "pivot.  Each chief of platoon will then command:\n\n"+
   "1. Platoon. 2. HALT.\n\n"+
   "245. The command halt will be given when the marching flank of the "+
   "platoon is three paces from the line of battle.\n\n"+
   "246. The chief of the second platoon, having halted it, will return to "+
   "his place as a file closer, passing around the left of his subdivision.\n\n"+
   "247. The captain, having halted the first platoon, will move rapidly to "+
   "the point at which the right of the company will rest in line of battle, "+
   "and command:\n\nRight--DRESS.\n\n"+
   "248. At this command, the two platoons will dress up on the alignment; "+
   "the front-rank man on the right of the leading platoon, who finds himself "+
   "opposite the instructor established on the direction of the guides, will "+
   "place his breast lightly against the left arm of this officer.  The "+
   "captain will direct the alignment from the right on the man on the "+
   "opposite flank of the company.\n\n"+
   "249. The company being aligned, the captain will command:\n\nFRONT.\n\n"+
   "The instructor, seeing the company in line of battle, will command:\n\n"+
   "Guides--POSTS.\n\n"+
   "Forming to the RIGHT into line: since the first platoon must always rest "+
   "on the right of the company, the second platoon will march past the "+
   "first, and wheel to the right upon the ground which places it on the "+
   "left of the first platoon in the new line.",
   [
     ["Left into line, wheel — MARCH","form_line_left",
      "Each platoon wheels to the left on a fixed pivot (the left front-rank "+
      "man) through the full 90°, coming fully onto the line of battle. "+
      "Can be given from a halt (COL_HALT) or while marching (COL_MARCH). "+
      "Par. 265–268: if given while marching, the wheel is completed at the "+
      "march and the company continues forward in line."],
     ["Right into line, wheel — MARCH","form_line_right",
      "The 1st platoon wheels to the right on a fixed pivot through the full "+
      "90°.  The 2d platoon stands fast while the 1st wheels and advances "+
      "clear, then marches straight forward to its own wheel ground and "+
      "wheels right — so the company forms without inversion, with the 1st "+
      "platoon always on the right of the line.  Can be given from a halt "+
      "or while marching."],
     ["Platoon — HALT","form_halt",
      "The instructor gives this command when the marching flank of each "+
      "platoon is three paces from the line (par. 245) — in the simulation "+
      "the platoons have already completed the full wheel and are on the line. "+
      "The chief of the 2d platoon (1L) returns to the rank of file closers, "+
      "passing around the LEFT of his platoon; the captain moves rapidly to "+
      "the point where the right of the company will rest in line."],
     ["Right — DRESS","form_dress",
      "The company dresses on the alignment, closing any remaining gaps "+
      "and completing the line of battle."],
     ["FRONT","form_front",
      "Eyes front — the alignment is complete."],
     ["Guides — POSTS","guides_posts",
      "The captain stands at the right of the front rank, the covering "+
      "sergeant (1S) falls back to the rear rank behind him, and the guides "+
      "and chiefs return to their posts among the file closers."],
     ["On the right into line (column marching, right in front)",
      "online_right_prep",
      "Used instead of the wheel when the column is MARCHING right in front "+
      "and the line is to form facing to the right. The captain sends the "+
      "2d lieutenant ahead as a marker for the point where the right flank "+
      "of the line will rest — well in advance, at least ten paces beyond "+
      "the column's right flank — and commands guide right; the column "+
      "marches on until its head comes abreast the marker."],
     ["Right turn","online_right_turn",
      "The first group of four wheels 90 degrees to the right and marches "+
      "on the line; each following four continues straight until just past "+
      "the left of the four before it, then wheels in turn — the whole "+
      "company forming successively to the left. The fours halt three paces "+
      "from the line; the captain places himself on the right of the line "+
      "of battle, and each guide posts himself immediately in front of "+
      "where the left of his platoon will rest, facing the captain."],
     ["Right — DRESS (on the captain)","online_right_dress",
      "The company dresses the last three paces up onto the line, aligning "+
      "on the captain at the right."],
     ["Guides — POSTS (after On the right into line)","guides_posts",
      "The covering sergeant covers the captain; the guides and the marker "+
      "return to their places among the file closers. The company stands "+
      "in line of battle facing to the right of its old direction of march."],
     ["On the left into line (column marching or halted, left in front)",
      "online_left_prep",
      "The mirror of the movement above, for a column LEFT in front: the "+
      "marker runs out to where the LEFT flank of the new line will rest, "+
      "at least ten paces beyond the column's left flank, and the column "+
      "comes up abreast."],
     ["Left turn","online_right_turn",
      "Each group of four wheels 90 degrees to the LEFT in succession, the "+
      "company forming to the right of each preceding four; the fours halt "+
      "three paces from the line. The captain places himself at the LEFT of "+
      "the line beside the marker to direct the dress; the guides post in "+
      "front of where the far flank of each platoon will rest."],
     ["Left — DRESS (on the captain)","online_right_dress",
      "The company dresses the last three paces up onto the line, aligning "+
      "on the captain at the left."],
     ["Guides — POSTS (after On the left into line)","guides_posts",
      "The captain crosses around the front of the company to his post on "+

   ]]

["LESSON VI", [
  ["Article 1: To break into platoons, and to re-form the company",
   "270. The company marching in the cadenced step, and supposed to make "+
   "part of a column, right in front, when the instructor shall wish to "+
   "cause it to break by platoon, he will give the order to the captain, "+
   "who will command: 1. Break into platoons, and immediately place himself "+
   "before the centre of the first platoon.\n\n"+
   "271. At the command break into platoons, the first lieutenant will pass "+
   "quickly around the left to the centre of his platoon, and give the "+
   "caution: Mark time.\n\n272. The captain will then command: 2. MARCH.\n\n"+
   "273. The first platoon will continue to march straight forward; the "+
   "covering sergeant will move rapidly to the left flank of this platoon "+
   "(passing by the front rank) as soon as the flank shall be disengaged.\n\n"+
   "274. At the command march, the second platoon will begin to mark time; "+
   "its chief will immediately add: 1. Right oblique; 2. March — given so "+
   "that this platoon may commence obliquing the instant the rear rank of "+
   "the first platoon shall have passed. The men will shorten the step in "+
   "obliquing, so that when the command forward march is given, the platoon "+
   "may have its exact distance.\n\n"+
   "275. The chief of the second will command Forward, MARCH, the instant "+
   "that the guide of his platoon shall cover the guide of the first.\n\n"+
   "276-277. In a column, left in front, the company will break into "+
   "platoons by inverse means; the left guide of the company will shift to "+
   "the right flank of the second platoon, and the covering sergeant will "+
   "remain on the right of the first.\n\n"+
   "TO RE-FORM THE COMPANY.\n\n"+
   "278-284. The column, by platoon, being in march, right in front: Form "+
   "company. 1. First platoon; 2. Right oblique; 3. MARCH. The first "+
   "platoon obliques to the right to unmask the second; the covering "+
   "sergeant returns to the right of the company, passing by the front "+
   "rank. When nearly unmasked: Mark time — MARCH; the second platoon "+
   "marches straight forward, and when nearly up: Forward — MARCH, the "+
   "instant the two platoons unite.\n\n"+
   "285-286. In a column, left in front, the same movement is executed by "+
   "inverse means; the guide of the second platoon passes to its left flank "+
   "the moment it begins to oblique, the guide of the first remaining on "+
   "its right.",
   [
     ["1. Company, forward. 2. MARCH  (from Lesson III)", "company_forward",
      "Repeated here for convenience, so every movement of this lesson can "+
      "be reached without leaving it: the halted company is put in march "+
      "in line of battle (Lesson III). Follow with MARCH to advance, then "+
      "break by platoon, break files to the rear (Art. 2), or take the "+
      "route step (Art. 3)."],
     ["MARCH  (continue the march)", "line_march",
      "The company advances "+MARCH_PACES+" paces in line of battle — in "+
      "quick time, in the route step, or with files broken to the rear, "+
      "as the case may be. (Repeated from Lesson III for convenience.)"],
     ["1. Break into platoons. 2. MARCH (right in front)",
      "break_platoons_right",
      "Given while the company marches in line. The 1st platoon marches "+
      "straight on; the captain places himself before its centre and 1S "+
      "runs to its left flank as soon as it is disengaged. The 2d platoon "+
      "marks time until the 1st platoon's rear rank has passed, then "+
      "obliques to the right at a shortened step, its chief (1L, come "+
      "round the left of the company) commanding Forward the instant his "+
      "guide covers the guide of the 1st — the column formed at exact "+
      "wheeling distance without a halt."],
     ["1. Break into platoons. 2. MARCH (left in front)",
      "break_platoons_left",
      "By inverse means (276-277): the 2d platoon marches straight on and "+
      "the 1st marks time, then obliques to the left behind it; 2S shifts "+
      "to the right flank of the 2d platoon and 1S remains on the right of "+
      "the 1st."],
     ["1. Form company. 2. MARCH","form_company",
      "Given with the column by platoon on the march (either flank in "+
      "front, detected automatically). The leading platoon obliques toward "+
      "its own flank at the full step to unmask the rear platoon, then "+
      "marks time; the rear platoon marches straight up, and at the "+
      "instant the two unite the whole moves Forward in line. The guides "+
      "and chiefs return to their line posts."]
   ]],
  ["Article 2: To break files to the rear, and to cause them to re-enter "+
   "into line",
   "294. The company being in march, and supposed to constitute a "+
   "subdivision of a column, right (or left) in front, when the instructor "+
   "shall wish to cause files to break off, he will give the order to the "+
   "captain, who will immediately turn to his company, and command:\n\n"+
   "1. Two files from left (or right) to rear. 2. MARCH.\n\n"+
   "295. At the command march, the two files on the left (or right) of the "+
   "company will face to the right (or left) and double; the others will "+
   "continue to march straight forward. If the files are broken from the "+
   "left, the men will immediately file to the left, so that the odd "+
   "numbers will cover the first and third, and the even numbers, the "+
   "second and fourth files, from that flank of the company. If the files "+
   "are broken from the right, the men will immediately file to the right, "+
   "so that the even numbers will cover the first and third, and the odd "+
   "numbers, the second and fourth files from that flank of the company. "+
   "The men will be careful not to lose their distances and to keep "+
   "aligned.\n\n"+
   "296. If the instructor should still wish to break two files from the "+
   "same side, he will give the order to the captain, who will proceed as "+
   "above directed.\n\n"+
   "297. At the command march, given by the captain, the files already "+
   "broken, advancing a little the outer shoulder, will gain the space of "+
   "two files to the right, if the files are broken from the left, and to "+
   "the left, if the files are broken from the right, shortening, at the "+
   "same time, the step, in order to make room between themselves and the "+
   "rear rank of the company for the files last ordered to the rear; the "+
   "latter will break by the same commands, and in the same manner as the "+
   "first. The men who double, should increase the length of the step, in "+
   "order to prevent distances from being lost.\n\n"+
   "298. The instructor may thus diminish the front of a company by "+
   "breaking off successive groups of two files, but the new files must "+
   "always be broken from the same side.\n\n"+
   "299. The instructor, wishing to cause files broken off to return into "+
   "line, will give the order to the captain, who will immediately "+
   "command:\n\n1. Two files into line. 2. MARCH.\n\n"+
   "300. At the command march, the first two files of those marching by "+
   "the flank will return briskly into line, and the others will gain the "+
   "space of two files by advancing the inner shoulder toward the flank to "+
   "which they belong.\n\n"+
   "301. The captain will turn to his company, to watch the observance of "+
   "the principles which have just been prescribed.\n\n"+
   "302. The instructor having caused groups of two files to break one "+
   "after another, and to return again into line, will afterward cause two "+
   "or three groups to break together, and for this purpose, will command: "+
   "Four (or six) files from left (or right) to rear — MARCH. The files "+
   "designated will face to the right (or left) and double, and will then "+
   "immediately file into their proper places as indicated No. 295, taking "+
   "care that the distances are preserved.\n\n"+
   "303. The instructor will next order the captain to cause two or three "+
   "groups to be brought into line at once, who, turning to the company, "+
   "will command:\n\nFour (or six) files into line — MARCH.\n\n"+
   "304. At the command march, the files designated will advance the inner "+
   "shoulder, move up and form on the flank of the company by the shortest "+
   "lines.\n\n"+
   "305. As often as files shall break off to the rear, the guide on that "+
   "flank will gradually close on the nearest front-rank man remaining in "+
   "line, and he will also open out to make room for files ordered into "+
   "line.\n\n"+
   "306. The files which march in the rear are disposed in the following "+
   "order: the left files as if the company was marching by the right "+
   "flank, and the right files as if the company was marching by the left "+
   "flank. Consequently, whenever there is on the right or left of a "+
   "subdivision, a file which does not belong to a group, it will be "+
   "broken singly.\n\n"+
   "307. It is necessary to the preservation of distances in column, that "+
   "the men should be habituated in the schools of detail to execute the "+
   "movements of this article with precision.\n\n"+
   "308. If the new files broken to the rear do not step well off when "+
   "filing to the left or right; if, when files are ordered into line, "+
   "they do not move up with promptitude and precision, in either case, "+
   "the following files will be arrested in their march, and thereby cause "+
   "the column to be lengthened out.\n\n"+
   "309. The instructor will place himself on the flank from which the "+
   "files are broken, to assure himself of the exact observance of the "+
   "principles.\n\n"+
   "310. Files will only be broken off from the side of direction, in "+
   "order that the whole company may easily pass from the front to the "+
   "flank march.",
   [
     ["1. Two files from left to rear. 2. MARCH", "files_rear_left_2",
      "Given while the company marches in line (Lesson III: Company, "+
      "forward — MARCH first). The two left files drop back and form a "+
      "single rank covering the first through fourth files from the left "+
      "of the remaining company (295) — the outer file's men on the 1st "+
      "and 3d, the inner file's on the 2d and 4th. Ranks already broken "+
      "gain two files inward and shorten the step to make room nearest "+
      "the rear rank for the files last ordered back (297). All further "+
      "breaks must come from the same side (298). In this simulation the "+
      "momentary flank-facing of 295 is not shown, the broken ranks are "+
      "drawn behind the file closers (who keep their posts), and the "+
      "front may not be reduced below six files (cf. 329)."],
     ["1. Two files from right to rear. 2. MARCH", "files_rear_right_2",
      "The same movement from the right flank: the two right files drop "+
      "back and cover the first through fourth files from the right of "+
      "the remaining company (295); later breaks must also come from the "+
      "right (298)."],
     ["1. Two files into line. 2. MARCH", "files_line_2",
      "The rank nearest the company — the files last broken — returns "+
      "briskly into line on the flank, and the ranks still broken gain "+
      "two files back toward the flank to which they belong (299-300). "+
      "The captain turns to his company to watch the execution (301)."],
     ["Four files from left to rear — MARCH", "files_rear_left_4",
      "Two groups break together (302): the four left files face about "+
      "their business at once, filing into two covering ranks — the "+
      "outermost pair deepest, exactly as if broken in succession."],
     ["Four files from right to rear — MARCH", "files_rear_right_4",
      "Two groups break together from the right flank (302)."],
     ["Four files into line — MARCH", "files_line_4",
      "Two ranks are brought into line at once (303-304): the files "+
      "designated advance the inner shoulder, move up and form on the "+
      "flank of the company by the shortest lines."],
     ["Six files from left to rear — MARCH", "files_rear_left_6",
      "Three groups break together from the left flank (302), filing "+
      "into three covering ranks behind the company."],
     ["Six files from right to rear — MARCH", "files_rear_right_6",
      "Three groups break together from the right flank (302)."],
     ["Six files into line — MARCH", "files_line_6",
      "Three ranks move up and form on the flank of the company at once, "+
      "by the shortest lines (303-304)."]
   ]],
  ["Article 3: To march in column in route",
   "311. The swiftness of the route step will be one hundred and ten steps "+
   "in a minute; this swiftness will be habitually maintained in columns "+
   "in route, when the roads and ground may permit.\n\n"+
   "312. The company being at a halt, and supposed to constitute a "+
   "subdivision of a column, when the instructor shall wish to cause it to "+
   "march in the route step, he will command:\n\n"+
   "1. Column, forward. 2. Guide left (or right). 3. Route step. 4. "+
   "MARCH.\n\n"+
   "313. At the command march, repeated by the captain, the two ranks will "+
   "step off together; the rear rank will take in marching, by shortening "+
   "a few steps, a distance of one pace (twenty-eight inches) from the "+
   "rank preceding, which distance will be computed from the breasts of "+
   "the men in the rear rank, to the knapsacks of the men in the front "+
   "rank. The men, without further command, will immediately carry their "+
   "arms at will as indicated in the School of the Soldier, No. 228, or "+
   "they may sling them on their backs, muzzle up. They will no longer be "+
   "required to march in the cadenced pace, or with the same foot, or to "+
   "remain silent. The files will march at ease; but care will be taken to "+
   "prevent the ranks from intermixing, the front rank from getting in "+
   "advance of the guide, and the rear rank from opening to too great a "+
   "distance.\n\n"+
   "314. The company marching in the route step, the instructor will cause "+
   "it to change direction, which will be executed without formal "+
   "commands, on a simple caution from the captain; the rear rank will "+
   "come up to change direction in the same manner as the front rank. Each "+
   "rank will conform itself, although in the route step, to the "+
   "principles which have been prescribed for the change in closed ranks, "+
   "with this difference only; that the pivot man, instead of taking steps "+
   "of nine inches, will take steps of fourteen inches, in order to clear "+
   "the wheeling point.\n\n"+
   "315. The company marching in the route step, to cause it to pass to "+
   "the cadenced step, the instructor will first order pieces to be "+
   "brought to the right shoulder, and then command:\n\n"+
   "1. Quick time. 2. MARCH.\n\n"+
   "316. At the command march, the men will resume the cadenced step, and "+
   "will close so as to leave a distance of sixteen inches between each "+
   "rank.\n\n"+
   "317. The company marching in the cadenced pace, the instructor, to "+
   "cause it to take the route step, will command:\n\n"+
   "1. Route step. 2. MARCH.\n\n"+
   "318. At the command march, the front rank will continue the step of "+
   "twenty-eight inches, the rear rank will take, by gradually shortening "+
   "the step, the distance of twenty-eight inches from the front rank; the "+
   "men will carry their arms at will.\n\n"+
   "319. If the company be marching in the route step, and the instructor "+
   "should suppose the necessity of marching by the flank in the same "+
   "direction, he will command:\n\n"+
   "1. Company by the right (or left) flank. 2. By file left (or right). "+
   "3. MARCH.\n\n"+

   "broken off to the rear, they will, by wheeling, regain their "+

   "means, as if the company were marching in the cadenced step. When the "+
   "company breaks into platoons, the chief of each will move to the flank "+
   "of his platoon, and will take the place of the guide, who will step "+
   "back into the rear rank.\n\n"+

   "by the two next subalterns in rank, or, in their absence, by "+
   "sergeants.\n\n"+
   "324. The instructor wishing to diminish by section, will give the "+
   "order to the captain, who will command:\n\n"+

   "guides, who will be thus displaced, will fall back into the rear rank; "+

        ab.className = "artbtn"; ab.textContent = title;
        ab.onclick = e => { showText(title, casey); };
        sa.appendChild(ab); da.appendChild(sa);
        if(cmds.length){
          for(const [label, key, note] of cmds){
            const b = document.createElement("button");
            b.className = "cmd" + (key ? "" : " textonly");
            b.textContent = label;
            b.onclick = () => {
              if(!key){ showText(title, casey, note); return; }
              runOrder(title, casey, label, key, note);
            };
            if(key) BTN_REGISTRY.push({ key: key, btn: b });
            da.appendChild(b);
          }
        }else{
          const b = document.createElement("button");
          b.className = "cmd textonly";
          b.textContent = "(text only — animation planned)";
          b.onclick = () => showText(title, casey);
          da.appendChild(b);
        }
        dl.appendChild(da);
      }
      tree.appendChild(dl);
    }
  }

  // ---------- mobile drawers ----------
  const isNarrow = () => window.matchMedia("(max-width:900px)").matches;
  function closeDrawers(){
    document.getElementById("book").classList.remove("open");
    document.getElementById("panel").classList.remove("open");
  }
  el("btnBook").onclick = () => {
    const b = document.getElementById("book");
    const was = b.classList.contains("open");
    closeDrawers();
    if(!was) b.classList.add("open");
  };
  el("btnManual").onclick = () => {
    const p = document.getElementById("panel");
    const was = p.classList.contains("open");
    closeDrawers();
    if(!was) p.classList.add("open");
  };

  // ---------- contextual button availability ----------
  // Every command button is greyed out whenever the order could not validly
  // be given: wrong formation state, wrong flank/column facing, or a
  // movement still in progress.
  const BTN_REGISTRY = [];
  function colRightInFront(m){
    if(m.state !== "COL_HALT" && m.state !== "COL_MARCH") return null;
    const c1 = centroid(m.platoonMembers(1).map(x => x.pos));
    const c2 = centroid(m.platoonMembers(2).map(x => x.pos));
    return dot(sub(c1, c2), vec(m.colDir)) > 0;
  }
  const inStates = (...ss) => m => ss.indexOf(m.state) !== -1;
  const inFlank = inStates("FLANK_FACED", "FLANK_MARCH");
  const inCol   = inStates("COL_HALT", "COL_MARCH");
  const ENABLED_WHEN = {
    open_prep:        inStates("LINE_HALT"),
    open_order:       inStates("OPEN_PREP"),
    open_march:       inStates("OPEN_MARKED"),
    open_front:       inStates("OPEN_RANKS"),
    close_order:      inStates("OPEN_RANKS", "OPEN_DONE"),
    company_forward:  inStates("LINE_HALT"),
    line_march:       inStates("LINE_MARCH", "FILES_MARCH", "ROUTE_MARCH"),
    line_halt:        inStates("LINE_MARCH", "OBLIQUE_MARCH", "ROUTE_MARCH"),
    oblique_right:    inStates("LINE_HALT", "LINE_MARCH", "OBLIQUE_MARCH"),
    oblique_left:     inStates("LINE_HALT", "LINE_MARCH", "OBLIQUE_MARCH"),
    oblique_forward:  inStates("OBLIQUE_MARCH"),
    right_face:       inStates("LINE_HALT"),
    left_face:        inStates("LINE_HALT"),
    flank_march:      inStates("FLANK_FACED", "FLANK_MARCH", "FLANK_2", "FLANK_1"),
    by_file_left:     inFlank,
    by_file_right:    inFlank,
    flank_front:      inFlank,
    file_into_line_right: m => inFlank(m) && m._flankRight !== false,
    file_into_line_left:  m => inFlank(m) && m._flankRight === false,
    file_into_line_posts: inStates("FILE_LINE_LEFT"),
    flank_company_into_line: inFlank,
    flank_platoon_into_line: inFlank,
    break_prep:        inStates("LINE_HALT"),
    break_march_right: inStates("COL_READY"),
    break_march_left:  inStates("COL_READY"),
    break_dress:       inStates("BREAK_HALTED"),
    break_front:       inStates("BREAK_DRESSED"),
    break_forward_right: inStates("COL_READY", "LINE_MARCH"),
    break_forward_left:  inStates("COL_READY", "LINE_MARCH"),
    col_march:         inStates("COL_HALT", "COL_MARCH", "SEC_MARCH"),
    col_left:          inCol,
    col_right:         inCol,
    col_halt:          inStates("COL_MARCH"),
    // The wheel into line is not used toward the side the column marches by
    // (right in front -> On the right into line instead, and vice versa).
    form_line_left:    m => inCol(m) && colRightInFront(m) === true,
    form_line_right:   m => inCol(m) && colRightInFront(m) === false,
    form_halt:         inStates("FORM_WHEELED"),
    form_dress:        inStates("FORM_HALTED"),
    form_front:        inStates("FORM_DRESSED"),
    break_platoons_right: inStates("LINE_MARCH"),
    break_platoons_left:  inStates("LINE_MARCH"),
    form_company:         inStates("COL_MARCH"),
    files_rear_left_2:  m => m.canBreakFiles(true, 1),
    files_rear_right_2: m => m.canBreakFiles(false, 1),
    files_rear_left_4:  m => m.canBreakFiles(true, 2),
    files_rear_right_4: m => m.canBreakFiles(false, 2),
    files_rear_left_6:  m => m.canBreakFiles(true, 3),
    files_rear_right_6: m => m.canBreakFiles(false, 3),
    files_line_2: m => m.canFilesIntoLine(1),
    files_line_4: m => m.canFilesIntoLine(2),
    files_line_6: m => m.canFilesIntoLine(3),
    route_forward:     inStates("LINE_HALT"),
    route_step:        inStates("LINE_MARCH"),
    quick_time:        inStates("ROUTE_MARCH"),
    route_flank_right: inStates("ROUTE_MARCH", "COL_MARCH"),
    route_flank_left:  inStates("ROUTE_MARCH", "COL_MARCH"),
    flank_undouble_2:  m => m.state === "FLANK_MARCH" && !m._flankHybrid,
    flank_undouble_1:  inStates("FLANK_2"),
    flank_double_2:    inStates("FLANK_1"),
    flank_double_4:    inStates("FLANK_2"),
    break_sections:    m => m.state === "COL_MARCH" && m.n2 >= 12,
    form_platoons:     inStates("SEC_MARCH"),
    countermarch_right: inStates("LINE_HALT"),
    countermarch_left:  inStates("LINE_HALT"),
    online_right_prep: m => inCol(m) && colRightInFront(m) === true,
    online_left_prep:  m => inCol(m) && colRightInFront(m) === false,
    online_right_turn: inStates("ONLINE_READY"),
    online_right_dress: inStates("ONLINE_HALTED"),
    guides_posts:      inStates("LINE_WHEELED", "ONLINE_DRESSED")
  };
  function refreshButtons(){
    const busy = !!anim;
    for(const { key, btn } of BTN_REGISTRY){
      const p = ENABLED_WHEN[key];
      btn.disabled = busy || (p ? !p(model) : false);
    }
  }

  // ---------- orders & animation ----------
  function runOrder(title, casey, label, key, note){
    if(isNarrow()) closeDrawers();
    if(anim){
      showText(title, casey, note,
        "A movement is still in progress — wait for it to finish.");
      return;
    }
    const err = ORDER_DISPATCH[key](model);
    if(err){
      showText(title, casey, note, "ORDER NOT TAKEN: " + err);
      updateState();
      return;
    }
    showText(title + " — " + label, casey, note);
    // Speech bubble(s) by the officer(s) giving the command. Strip the
    // book's numbering ("1. ... 2. ...") and parenthetical alternates
    // ("(right)"), and normalize dashes, so the bubble reads as the
    // command actually spoken.
    const spoken = label.replace(/\([^)]*\)/g, "")
                        .replace(/(^|\s)\d+\.\s*/g, "$1")
                        .replace(/--/g, "\u2014")
                        .replace(/\.\s+/g, " \u2014 ")
                        .replace(/\s*\u2014\s*/g, " \u2014 ")
                        .replace(/\s{2,}/g, " ").trim();
    if(spoken){
      const t0 = performance.now();
      const dur = 2800 + spoken.length * 45;
      speech = (SPEECH_SPEAKERS[key] || ["capt"])
        .filter(id => model.men.has(id))
        .map(id => ({ id: id, text: spoken, t0: t0, dur: dur }));
    }
    if(!el("inArrows").checked) arrows = [];
    const moving = model.menArr().filter(m => m.path);
    for(const m of moving) arrows.push(m.path.slice());
    if(moving.length){
      const maxLen = Math.max(...moving.map(m => m.length));
      const speed = parseFloat(el("inSpeed").value);
      anim = { t0: performance.now(),
               dur: Math.max(600, maxLen / Math.max(0.5, speed) * 1000),
               perMan: !!model._perManAnim,
               maxLen: maxLen };
      model._perManAnim = false;
    }
    updateState();
  }

  function updateState(){
    refreshButtons();
    const s = STATE_LABEL[model.state] || model.state;
    const hd = ((model.heading * 180/Math.PI) + 90 + 360) % 360;
    const comp = ["N","NE","E","SE","S","SW","W","NW"][
      Math.floor(((hd + 22.5) % 360)/45)];
    el("stateLbl").textContent = "Formation: " + s + "  |  Front: " + comp;
  }

  // ---------- drawing ----------
  function draw(){
    const rb = document.getElementById("readyBadge");
    if(anim){
      if(rb.textContent !== "MOVING\u2026"){
        rb.textContent = "MOVING\u2026";
        rb.style.background = "#f6dfae"; rb.style.color = "#7a5a1a";
      }
    } else if(rb.textContent !== "READY"){
      rb.textContent = "READY";
      rb.style.background = "#d9ecd0"; rb.style.color = "#2c6b2f";
    }
    const w = cv.clientWidth, h = cv.clientHeight;
    const dpr = window.devicePixelRatio || 1;
    if(cv.width !== Math.round(w*dpr) || cv.height !== Math.round(h*dpr)){
      cv.width = Math.round(w*dpr); cv.height = Math.round(h*dpr);
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    // animation progress
    if(anim){
      const f = Math.min(1, (performance.now() - anim.t0) / anim.dur);
      const captMult = model._captSpeedMult || 1;
      for(const m of model.men.values()){
        if(!m.path) continue;
        if(anim.perMan && m.length > 0){
          const mult = (m.id === "capt" && captMult !== 1) ? captMult : 1;
          m.pos = m.pointAtFraction(Math.min(1, f * anim.maxLen / m.length * mult));
        } else {
          const mult = (m.id === "capt" && captMult !== 1) ? captMult : 1;
          m.pos = m.pointAtFraction(Math.min(1, f * mult));
        }
      }
      if(f >= 1){ model.finish(); anim = null; updateState(); }
    }

    // follow camera
    if(el("inFollow").checked){
      const pts = model.menArr().map(m => m.pos);
      let minx=Infinity,maxx=-Infinity,miny=Infinity,maxy=-Infinity;
      for(const p of pts){
        minx=Math.min(minx,p[0]); maxx=Math.max(maxx,p[0]);
        miny=Math.min(miny,p[1]); maxy=Math.max(maxy,p[1]);
      }
      const tx=(minx+maxx)/2, ty=(miny+maxy)/2;
      view[0] += (tx - view[0]) * 0.12;
      view[1] += (ty - view[1]) * 0.12;
    }

    const P = ppp();
    // grid every 5 paces
    ctx.strokeStyle = GRID; ctx.lineWidth = 1;
    const step = 5 * P;
    const ox = ((-view[0]*P + w/2) % step + step) % step;
    const oy = ((-view[1]*P + h/2) % step + step) % step;
    ctx.beginPath();
    for(let x = ox; x < w; x += step){ ctx.moveTo(x, 0); ctx.lineTo(x, h); }
    for(let y = oy; y < h; y += step){ ctx.moveTo(0, y); ctx.lineTo(w, y); }
    ctx.stroke();

    // movement arrows
    ctx.strokeStyle = ARROW; ctx.lineWidth = 1.4;
    ctx.setLineDash([5, 4]);
    for(const path of arrows){
      if(path.length < 2) continue;
      ctx.beginPath();
      let p = w2s(path[0]);
      ctx.moveTo(p[0], p[1]);
      for(let i = 1; i < path.length; i++){
        p = w2s(path[i]); ctx.lineTo(p[0], p[1]);
      }
      ctx.stroke();
      // arrowhead
      const a = w2s(path[path.length-2]), b = w2s(path[path.length-1]);
      const ang = Math.atan2(b[1]-a[1], b[0]-a[0]);
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(b[0], b[1]);
      ctx.lineTo(b[0] - 8*Math.cos(ang - 0.4), b[1] - 8*Math.sin(ang - 0.4));
      ctx.moveTo(b[0], b[1]);
      ctx.lineTo(b[0] - 8*Math.cos(ang + 0.4), b[1] - 8*Math.sin(ang + 0.4));
      ctx.stroke();
      ctx.setLineDash([5, 4]);
    }
    ctx.setLineDash([]);

    // the men
    const r = 0.42 * P;
    const fs = Math.max(6, r * 0.85);
    ctx.font = "bold " + fs + "px Georgia, serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    for(const id of model.order){
      const m = model.men.get(id);
      const [sx, sy] = w2s(m.pos);
      if(sx < -30 || sx > w+30 || sy < -30 || sy > h+30) continue;
      const fill = m.role === "private" ? PVT_FILL[m.section || 1] : ROLE_FILL[m.role];
      const ring = PLT_RING[m.platoon] || "#555";
      if(id === selId){
        ctx.strokeStyle = "#D97706"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(sx, sy, r + 3.5, 0, Math.PI*2); ctx.stroke();
      }
      // facing tick
      const fv = vec(m.facing);
      ctx.strokeStyle = ring; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx + fv[0]*r, sy + fv[1]*r);
      ctx.lineTo(sx + fv[0]*(r + 0.3*P), sy + fv[1]*(r + 0.3*P));
      ctx.stroke();
      ctx.fillStyle = fill;
      ctx.strokeStyle = ring; ctx.lineWidth = id === selId ? 2.4 : 1.6;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#22221C";
      ctx.fillText(m.label, sx, sy + 0.5);
    }

    // platoon / section labels: drawn LAST (on top), offset to the outer
    // flanks so the moving circles never obscure them
    if(el("inUnits").checked){
      const lblFont = Math.max(9, P * 0.55);
      for(const [p, name] of [[1, "1st Platoon"], [2, "2d Platoon"]]){
        const ms = model.platoonMembers(p).filter(m =>
          m.rank === "front" || m.rank === "rear");
        if(!ms.length) continue;
        const c = centroid(ms.map(m => m.pos));
        const face = ms[0].facing;
        // offset to the platoon's outer flank: 1st -> its right, 2d -> its left
        const flank = vec(face + (p === 1 ? Math.PI/2 : -Math.PI/2));
        let span = 0;
        for(const m of ms) span = Math.max(span, Math.abs(dot(sub(m.pos, c),
          vec(face + Math.PI/2))));
        const lp = add(c, flank, span + 2.6);
        const [sx, sy] = w2s(lp);
        drawPill(name, sx, sy, lblFont, PLT_RING[p]);
      }
      const secFont = Math.max(8, P * 0.4);
      for(let s = 1; s <= 4; s++){
        const ms = model.menArr().filter(m => m.section === s);
        if(!ms.length) continue;
        const c = centroid(ms.map(m => m.pos));
        const face = ms[0].facing;
        const back = vec(face + Math.PI);
        const lp = add(c, back, 2.6);
        const [sx, sy] = w2s(lp);
        drawPill("sec. " + s, sx, sy, secFont, "#7B6E4E");
      }
    }

    // speech bubbles: drawn on top of everything, following the speaker
    if(speech.length){
      const now = performance.now();
      speech = speech.filter(s => now - s.t0 < s.dur);
      for(const s of speech){
        const man = model.men.get(s.id);
        if(!man) continue;
        const [sx, sy] = w2s(man.pos);
        const age = now - s.t0;
        const a = age > s.dur - 400 ? Math.max(0, (s.dur - age) / 400) : 1;
        drawSpeech(s.text, sx, sy, 0.42 * P, a, w, h);
      }
    }

    requestAnimationFrame(draw);
  }
  // A cream speech bubble with a small tail pointing at the speaker.
  // Kept at constant screen size (like the UI) regardless of zoom, and
  // flipped to the other side of the marker near the canvas edges.
  function drawSpeech(text, sx, sy, r, alpha, w, h){
    const fpx = 12, lineH = fpx * 1.25, pad = 7, maxW = 170;
    ctx.font = "italic bold " + fpx + "px Georgia, serif";
    // word wrap
    const words = text.split(" "), lines = [];
    let cur = "";
    for(const wd of words){
      const t = cur ? cur + " " + wd : wd;
      if(ctx.measureText(t).width > maxW && cur){ lines.push(cur); cur = wd; }
      else cur = t;
    }
    if(cur) lines.push(cur);
    let bw = 0;
    for(const ln of lines) bw = Math.max(bw, ctx.measureText(ln).width);
    bw += pad * 2;
    const bh = lines.length * lineH + pad * 2 - (lineH - fpx);
    // preferred: above-right of the marker; flip near edges
    const gap = r * 0.55;
    let right = sx + r + gap + bw <= w - 4;
    let above = sy - r - gap - bh >= 4;
    if(!right && sx - r - gap - bw < 4) right = true;   // both fail: keep right
    const bx = right ? sx + r + gap : sx - r - gap - bw;
    const by = above ? sy - r - gap - bh : sy + r + gap;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#FFFDF4";
    ctx.strokeStyle = "#8A7B57";
    ctx.lineWidth = 1.2;
    roundRect(bx, by, bw, bh, 6);
    ctx.fill();
    // tail: from the bubble's near corner toward the speaker
    const tx0 = right ? bx + 3 : bx + bw - 3;
    const ty0 = above ? by + bh - 2 : by + 2;
    const tx1 = right ? bx + 14 : bx + bw - 14;
    ctx.beginPath();
    ctx.moveTo(tx0, ty0);
    ctx.lineTo(sx + (right ? r * 0.6 : -r * 0.6), sy + (above ? -r * 0.6 : r * 0.6));
    ctx.lineTo(tx1, ty0);
    ctx.closePath();
    ctx.fill();
    // outline bubble + tail (stroke bubble after tail fill so the join is clean)
    roundRect(bx, by, bw, bh, 6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tx0, ty0);
    ctx.lineTo(sx + (right ? r * 0.6 : -r * 0.6), sy + (above ? -r * 0.6 : r * 0.6));
    ctx.lineTo(tx1, ty0);
    ctx.stroke();
    ctx.fillStyle = "#3B3325";
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    for(let i = 0; i < lines.length; i++)
      ctx.fillText(lines[i], bx + pad, by + pad - 2 + i * lineH);
    ctx.globalAlpha = 1;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
  }
  function drawPill(text, x, y, fpx, color){
    ctx.font = "bold " + fpx + "px Georgia, serif";
    const tw = ctx.measureText(text).width;
    ctx.fillStyle = "rgba(252,250,243,0.82)";
    ctx.strokeStyle = "rgba(180,162,122,0.7)";
    ctx.lineWidth = 1;
    const pad = 4, hh = fpx*0.75 + pad;
    roundRect(x - tw/2 - pad, y - hh/2 - 1, tw + pad*2, hh + 2, 4);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = color;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(text, x, y);
  }
  function roundRect(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---------- interaction ----------
  // Multi-pointer tracking: one finger pans (or taps to identify a man);
  // two fingers pinch-zoom about their midpoint.
  const ptrs = new Map();
  let pinch0 = null;
  cv.addEventListener("pointerdown", e => {
    closeDrawers();
    ptrs.set(e.pointerId, [e.clientX, e.clientY]);
    cv.setPointerCapture(e.pointerId);
    if(ptrs.size === 2){
      const pts = [...ptrs.values()];
      pinch0 = { d0: Math.hypot(pts[0][0]-pts[1][0], pts[0][1]-pts[1][1]) || 1,
                 zoom0: zoom };
      dragging = null; dragMoved = true;
      cv.classList.remove("dragging");
    } else if(ptrs.size === 1){
      dragging = [e.clientX, e.clientY]; dragMoved = false;
      cv.classList.add("dragging");
    }
  });
  cv.addEventListener("pointermove", e => {
    if(ptrs.has(e.pointerId)) ptrs.set(e.pointerId, [e.clientX, e.clientY]);
    const rect2 = cv.getBoundingClientRect();
    const [wx, wy] = s2w(e.clientX - rect2.left, e.clientY - rect2.top);
    document.getElementById("coordDisplay").textContent =
      "x: " + wx.toFixed(2) + "  y: " + wy.toFixed(2);
    if(pinch0 && ptrs.size === 2){
      const pts = [...ptrs.values()];
      const d = Math.hypot(pts[0][0]-pts[1][0], pts[0][1]-pts[1][1]) || 1;
      const midX = (pts[0][0]+pts[1][0])/2 - rect2.left;
      const midY = (pts[0][1]+pts[1][1])/2 - rect2.top;
      const before = s2w(midX, midY);
      zoom = Math.min(2.2, Math.max(0.4, pinch0.zoom0 * d / pinch0.d0));
      el("inZoom").value = zoom;
      const after = s2w(midX, midY);
      view[0] += before[0] - after[0];
      view[1] += before[1] - after[1];
      el("inFollow").checked = false;
      return;
    }
    if(!dragging || ptrs.size > 1) return;
    const dx = e.clientX - dragging[0], dy = e.clientY - dragging[1];
    if(Math.abs(dx) + Math.abs(dy) > 3) dragMoved = true;
    if(dragMoved){
      view[0] -= dx / ppp(); view[1] -= dy / ppp();
      el("inFollow").checked = false;
      dragging = [e.clientX, e.clientY];
    }
  });
  cv.addEventListener("pointercancel", e => {
    ptrs.delete(e.pointerId);
    if(ptrs.size < 2) pinch0 = null;
    if(ptrs.size === 0){ dragging = null; cv.classList.remove("dragging"); }
  });
  cv.addEventListener("pointerup", e => {
    ptrs.delete(e.pointerId);
    if(ptrs.size < 2) pinch0 = null;
    cv.classList.remove("dragging");
    if(dragging && !dragMoved){
      const rect = cv.getBoundingClientRect();
      const wpt = s2w(e.clientX - rect.left, e.clientY - rect.top);
      let best = null, bestD = 0.8;
      for(const m of model.men.values()){
        const d = dist(m.pos, wpt);
        if(d < bestD){ bestD = d; best = m; }
      }
      selId = best ? best.id : null;
      if(best){
        const plt = best.platoon === 1 ? "1st Platoon"
                  : best.platoon === 2 ? "2d Platoon" : "";
        showText(best.label + "  (" + ROLE_LONG[best.role] + ")",
                 best.desc + (plt ? "\n\n" + plt : ""));
      }
    }
    dragging = null;
  });
  cv.addEventListener("wheel", e => {
    e.preventDefault();
    const nz = Math.min(2.2, Math.max(0.4, zoom * (e.deltaY < 0 ? 1.1 : 0.9)));
    zoom = nz; el("inZoom").value = nz;
  }, { passive: false });

  el("inZoom").addEventListener("input", e => { zoom = parseFloat(e.target.value); });
  function rebuild(){
    anim = null; arrows = []; selId = null; speech = [];
    model.build(parseInt(el("inFiles").value) || 20,
                el("inCpl8").checked, el("in3Lt").checked);
    resetView(); updateState();
  }
  el("btnReset").onclick = rebuild;
  el("inFiles").addEventListener("change", rebuild);
  el("inCpl8").addEventListener("change", rebuild);
  el("in3Lt").addEventListener("change", rebuild);

  // ---------- boot ----------
  buildTree();
  resetView();
  showText("Welcome", TXT_ABOUT);
  updateState();
  requestAnimationFrame(draw);
})();
}
</script>
</body>
</html>
