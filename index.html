        const afterTrailWheel = rotAbout(pw, trailPivotFinal, signedStopTr);
        const stoppedFinal    = add(afterTrailWheel, F, trailAlignAdv);
        const fn = t => {
          if(t <= 0.60){
            const s = t / 0.60;
            return [p0[0] + (pw[0] - p0[0]) * s, p0[1] + (pw[1] - p0[1]) * s];
          }
          if(t <= 0.725){
            const wt = (t - 0.60) / 0.125;
            return rotAbout(pw, trailPivotFinal, signedStopTr * wt);
          }
          const s = (t - 0.725) / 0.275;
          return [afterTrailWheel[0] + (stoppedFinal[0] - afterTrailWheel[0]) * s,
                  afterTrailWheel[1] + (stoppedFinal[1] - afterTrailWheel[1]) * s];
        };
        finals.set(m.id, stoppedFinal);
        m.setTimedPath(samplePath(fn, 80));
      }

    } else {
      // ---- Both platoons wheel simultaneously in place (243-245) ----
      // The guides (1S, 2S) STAND FAST, marking the line of battle; the
      // pivot man of each platoon has faced and stands against his guide
      // (244). Signed stop angle: the chiefs halt the platoons three paces
      // short of the line (245).
      const signedStop = p => Math.sign(turn) * stopAngle[p];
      for(const p of [1,2]){
        for(const m of this.platoonMembers(p)){
          if(m.id === "1S" || m.id === "2S") continue;   // guides stand fast
          const p0 = m.pos.slice(), c = pivots[p], sa = signedStop(p);
          if(dist(p0, c) > 1e-9){
            const final = rotAbout(p0, c, sa);
            finals.set(m.id, final);
            m.setTimedPath(samplePath(t => rotAbout(p0, c, sa * t), 40));
          }
        }
      }
    }

    // Compute the true full-90° finals for the dress step and captain/1L targets.
    // fullFinals = pure 90° rotation for every man (the on-line positions).
    // finals     = stopped-short positions (set per-man in the wheel loops above).
    // Exception: in the march-past case the leading platoon advanced beyond pure rotation;
    // their fullFinals should use the advanced positions stored in finals.
    const fullFinals = new Map();
    for(const p of [1,2])
      for(const m of this.platoonMembers(p))
        fullFinals.set(m.id, rotAbout(m.pos, pivots[p], turn));
    // Override fullFinals for march-past case:
    // Lead: full 90° wheel + clearance advance. Trail: full 90° wheel + alignment advance.
    if(forwardTravel > 1.5){
      for(const m of this.platoonMembers(lead)){
        const full90 = rotAbout(m.pos, pivots[lead], turn);
        fullFinals.set(m.id, add(full90, F, clearAdv));
      }
      for(const m of this.platoonMembers(trail)){
        const pw = preW.get(m.id);
        const full90 = rotAbout(pw, trailPivotFinal, turn);
        fullFinals.set(m.id, add(full90, F, trailAlignAdv));
      }
    } else if(Math.abs(shiftF) > 1e-9 || Math.abs(shiftR) > 1e-9){
      // Simultaneous wheel with unequal platoon fronts: the trailing
      // platoon's pure rotation does not sit correctly beside the leading
      // platoon (its line lands shiftF forward / shiftR to the side of its
      // proper place). Apply the same alignment shift computed for `finals`
      // above, so the DRESS step closes the gap and the company forms one
      // continuous line — the 1st platoon always resting on the right.
      for(const m of this.platoonMembers(trail)){
        if(m.id === "1S" || m.id === "2S") continue;   // guides stand fast
        const full90 = rotAbout(m.pos, pivots[trail], turn);
        fullFinals.set(m.id, add(add(full90, F, shiftF), Rv, shiftR));
      }
    }

    if(forwardTravel <= 1.5){
      // Guides stood fast: their finals are simply where they stand.
      for(const gid of ["1S","2S"]){
        const gm = this.men.get(gid);
        finals.set(gid, gm.pos.slice());
        fullFinals.set(gid, gm.pos.slice());
      }
    }
    this._form = { finals: finals, fullFinals: fullFinals, heading: h, marchPast: forwardTravel > 1.5, plt1PivotId: plt1PivotId, trailPlt: trail };
    this.heading = h;
    this.faceAll(h);
    this.state = "FORM_WHEELED"; return null;
  }
  odFormHalt(){
    if(this.state !== "FORM_WHEELED")
      return "'Platoon--HALT' is given while the platoons are wheeling into "+
             "line (after 'Left/right into line, wheel--MARCH').";
    this.clearPaths();
    const f = this._form, h = f.heading;
    const Rv = vec(h + Math.PI/2), Lv = vec(h - Math.PI/2), Bv = vec(h + Math.PI);
    // Platoons are now fully on the line (Fix 5: full-wheel animation).
    // Chief of the 2d platoon returns to the file closers, passing around
    // the LEFT of his subdivision (par. 246).
    const lt = this.men.get("1L");
    const body2 = this.platoonMembers(2).filter(m =>
      m.rank === "front" || m.rank === "rear");
    let maxL = -Infinity, minD = Infinity, maxD = -Infinity;
    for(const m of body2){
      maxL = Math.max(maxL, dot(m.pos, Lv));
      minD = Math.min(minD, dot(m.pos, Bv));
      maxD = Math.max(maxD, dot(m.pos, Bv));
    }
    const ltD = dot(lt.pos, Bv);
    const cL = maxL + 1.7;
    const cF = Math.min(ltD, minD) - 1.3;
    const cB = maxD + 1.4;
    const ff = f.fullFinals || f.finals;
    const s4 = [];
    for(const m of this.men.values())
      if(m.section === 4 && m.rank === "front") s4.push(ff.get(m.id));
    const c4 = centroid(s4);
    const post = add(add(c4, Rv, this.lt1Shift() * FW), Bv, CLOSERD);
    const postL = dot(post, Lv);
    const XY = (lat, dep) => [ Lv[0]*lat + Bv[0]*dep, Lv[1]*lat + Bv[1]*dep ];
    const w1 = XY(cL, cF);
    const w2 = XY(cL, cB);
    const w3 = XY(postL, cB);
    lt.setPath([w1, w2, w3]);
    lt.rank = "closer";
    f.ltPost = post;
    // the captain moves rapidly to where the right of the company will rest
    const capt = this.men.get("capt");
    const Fv = vec(h);
    let captDest;
    if(f.marchPast){
      if(f.trailPlt === 1){
        // Left-wheel + left-into-line: plt 1 is the TRAIL and has marched past plt 2.
        // Anchor to C-1's current position (right-flank corporal of plt 1).
        // Offset measured empirically: 2 paces right (Rv), 3 paces forward (Fv).
        const c1 = this.men.get("C-1");
        captDest = add(add(c1.pos, Rv, 2.0), Fv, 3.0);
      } else {
        // Right-wheel + right-into-line: plt 1 is the LEAD. Anchor to the
        // right-flank front-rank man of plt 1 (1S now serves as the guide on
        // the LEFT flank of the column, per 168, so he is no longer here).
        // Offsets reproduce the previously verified captain position.
        let rm = null;
        for(const m of this.platoonMembers(1))
          if(m.rank === "front" && m.id !== "1S" && m.id !== "capt")
            if(!rm || dot(m.pos, Rv) > dot(rm.pos, Rv)) rm = m;
        captDest = add(add(rm.pos, Rv, 1.8), Fv, 1.0);
      }
      f.captPost = captDest;
    } else {
      // Simultaneous-wheel case (e.g. left-into-line after right-wheel):
      // original verified logic — rightmost front-rank fullFinals position.
      // No captPost here: the dress step uses unshifted fullFinals as verified.
      let rightSpot = null, bd = -Infinity;
      for(const m of this.men.values())
        if(m.rank === "front" && m.id !== "1S" && m.id !== "2S" && ff.has(m.id)){
          const d = dot(ff.get(m.id), Rv);
          if(d > bd){ bd = d; rightSpot = ff.get(m.id); }
        }
      captDest = add(rightSpot, Rv, FW);   // one pace right of C-1's spot
    }
    capt.setPath([captDest]);
    this.state = "FORM_HALTED"; return null;
  }
  odFormDress(){
    if(this.state !== "FORM_HALTED")
      return "'Right--DRESS' here follows the halt of the wheeling platoons "+
             "(previous command).";
    this.clearPaths();
    const f = this._form;
    const ff = f.fullFinals || f.finals;
    const Fv = vec(f.heading);
    // In the march-past case the captain has moved to 1S's position + 1 pace right
    // + 0.5 forward. Shift all fullFinals in Fv so the front rank dresses up to
    // exactly the captain's forward level (captPost Fv - 0.5, i.e. level with 1S).
    let fShift = 0, rShift = 0;
    const Rv = vec(f.heading + Math.PI/2);
    if(f.captPost){
      let ffFrontEdge = -Infinity;
      for(const m of this.men.values())
        if(m.rank === "front" && ff.has(m.id))
          ffFrontEdge = Math.max(ffFrontEdge, dot(ff.get(m.id), Fv));
      // Dress front rank to captain's Fv level so company ends up directly to his left.
      const targetF = dot(f.captPost, Fv);
      fShift = targetF - ffFrontEdge;
      // Left-wheel + left-into-line only: also shift laterally so the rightmost
      // front-rank man (1S) lands exactly 1 pace to the captain's LEFT — giving
      // the captain his own space in the line.
      if(f.marchPast && f.trailPlt === 1){
        let ffRightEdge = -Infinity;
        for(const m of this.men.values())
          if(m.rank === "front" && ff.has(m.id))
            ffRightEdge = Math.max(ffRightEdge, dot(ff.get(m.id), Rv));
        rShift = (dot(f.captPost, Rv) - FW) - ffRightEdge;
      }
    }
    const shiftPt = tgt => {
      let s = tgt;
      if(fShift !== 0) s = add(s, Fv, fShift);
      if(rShift !== 0) s = add(s, Rv, rShift);
      return s;
    };
    for(const p of [1,2])
      for(const m of this.platoonMembers(p)){
        if(m.id === "capt" || m.id === "1L") continue;
        const tgt = ff.get(m.id);
        if(tgt){
          const shifted = shiftPt(tgt);
          if(dist(m.pos, shifted) > 1e-9) m.setPath([shifted]);
        }
      }
    // the chief of the 2d platoon dresses up onto his file-closer post (also shifted)
    const lt = this.men.get("1L");
    const ltPost = f.ltPost ? shiftPt(f.ltPost) : null;
    if(ltPost && dist(lt.pos, ltPost) > 1e-9) lt.setPath([ltPost]);
    this.state = "FORM_DRESSED"; return null;
  }
  odFormFront(){
    if(this.state !== "FORM_DRESSED") return "'FRONT' here follows 'Right--DRESS.'";
    this.clearPaths();
    this.state = "LINE_WHEELED"; return null;
  }
  // ---- On the right (left) into line: from the column by platoon, right
  // (left) in front, marching or at a halt. The marker (2d lieutenant) runs
  // out to mark where the flank of the new line will rest; the column
  // marches up abreast; each group of four then wheels in succession and
  // comes down onto the line.
  odOnLinePrep(right){
    if(this.state !== "COL_MARCH" && this.state !== "COL_HALT")
      return "'On the right (left) into line' is given with the column by "+
             "platoon marching or at a halt.";
    this.finish();
    const q = right ? 1 : -1;
    const D = vec(this.colDir), Sv = vec(this.colDir + q*Math.PI/2);
    const cen1 = centroid(this.platoonMembers(1).map(m => m.pos));
    const cen2 = centroid(this.platoonMembers(2).map(m => m.pos));
    const lead = dot(sub(cen1, cen2), D) > 0 ? 1 : 2;
    if(right && lead !== 1)
      return "'On the right into line' requires the column to be RIGHT in "+
             "front (1st platoon leading).";
    if(!right && lead !== 2)
      return "'On the left into line' requires the column to be LEFT in "+
             "front (2d platoon leading).";
    this.clearPaths();
    const aOf = p => dot(p, D), sOf = p => dot(p, Sv);
    let headA = -Infinity, maxS = -Infinity;
    for(const m of this.men.values()){
      if(m.rank === "front" || m.rank === "rear") headA = Math.max(headA, aOf(m.pos));
      maxS = Math.max(maxS, sOf(m.pos));
    }
    const sLine = maxS + 10;
    const lt2 = this.men.get("2L");
    let A = MARCH_PACES;
    for(let i = 0; i < 10; i++){
      const M = [D[0]*(headA + A) + Sv[0]*sLine, D[1]*(headA + A) + Sv[1]*sLine];
      A = Math.max(A, dist(lt2.pos, M) / 1.8);
    }
    A += 0.1;   // margin so the marker is surely established before the head
    const M = [D[0]*(headA + A) + Sv[0]*sLine, D[1]*(headA + A) + Sv[1]*sLine];
    const W = A;
    for(const m of this.men.values()){
      const p0 = m.pos.slice();
      if(m.id === "2L"){
        const L = dist(p0, M);
        m.setTimedPath(samplePath(t => {
          const d = Math.min(L, t * W * 1.8);
          const u = L <= 1e-9 ? 1 : d / L;
          return [p0[0] + (M[0]-p0[0])*u, p0[1] + (M[1]-p0[1])*u];
        }, 60));
      } else {
        m.setTimedPath(samplePath(t => add(p0, D, Math.min(A, t*W)), 40));
      }
    }
    this._onRight = { M: M, sLine: sLine, Ma: headA + A,
                      h: this.colDir + q*Math.PI/2, right: right, lead: lead };
    this.state = "ONLINE_READY"; return null;
  }
  odOnLineTurn(){
    if(this.state !== "ONLINE_READY")
      return "'Right (left) turn' here follows 'On the right (left) into "+
             "line' with the head of the column abreast the marker.";
    this.clearPaths();
    const o = this._onRight;
    const right = o.right, q = right ? 1 : -1;
    const D = vec(this.colDir), Sv = vec(this.colDir + q*Math.PI/2);
    const h = o.h;
    const aOf = p => dot(p, D), sOf = p => dot(p, Sv);
    const Ma = o.Ma, sLine = o.sLine, sShort = sLine - 3;
    const jobs = [], finals = new Map();
    const ARC4 = 1.49 * Math.PI/2;
    // Files of each platoon sorted from the line-side flank (the flank that
    // forms first, nearest the marker's end of the line).
    const fileLists = {};
    for(const p of [1,2]){
      const fronts = this.platoonMembers(p).filter(m =>
        m.rank === "front" && m.id !== "1S" && m.id !== "capt");
      fronts.sort((a,b) => sOf(b.pos) - sOf(a.pos));
      const rears = this.platoonMembers(p).filter(m => m.rank === "rear");
      fileLists[p] = fronts.map(fm => {
        let best = null, bd = Infinity;
        for(const rm of rears){
          const d = Math.abs(sOf(rm.pos) - sOf(fm.pos));
          if(d < bd){ bd = d; best = rm; }
        }
        return [fm, best];
      });
    }
    const lead = o.lead, trail = lead === 1 ? 2 : 1;
    const nLead = fileLists[lead].length;
    const n = nLead + fileLists[trail].length;
    // Record each front-rank man's march distance to his wheel point, so the
    // closers can time their own start off the four standing in front of them.
    const fileD1 = new Map();
    const mkFour = (p, k, fOff) => {
      const files = fileLists[p];
      const pairA = files[2*k], pairB = (2*k + 1 < files.length) ? files[2*k+1] : null;
      const f0 = fOff + 2*k;
      const turnA = Ma + 1 + f0;
      const pivotMan = pairA[0];
      const d1 = turnA - aOf(pivotMan.pos);
      const pivotTurnPt = add(pivotMan.pos, D, d1);
      fileD1.set(pairA[0].id, d1);
      if(pairB) fileD1.set(pairB[0].id, d1);
      const members = [pairA[0], pairA[1]];
      if(pairB){ members.push(pairB[0], pairB[1]); }
      for(const m of members){
        if(!m) continue;
        const p0 = m.pos.slice();
        const preWheel = add(p0, D, d1);
        const postWheel = rotAbout(preWheel, pivotTurnPt, q*Math.PI/2);
        // Rear-rank men keep their distance, halting RANKD behind.
        const eDesc = sShort - sOf(postWheel) - (m.rank === "rear" ? RANKD : 0);
        const stopPos = add(postWheel, Sv, eDesc);
        finals.set(m.id, add(stopPos, Sv, 3));
        const total = d1 + ARC4 + eDesc;
        jobs.push({ m: m, hold: 0, total: total, fn: (t, W) => {
          const dd = Math.min(total, t * W);
          if(dd <= d1) return add(p0, D, dd);
          if(dd <= d1 + ARC4)
            return rotAbout(preWheel, pivotTurnPt,
                            (q*Math.PI/2) * (dd - d1) / ARC4);
          return add(postWheel, Sv, dd - d1 - ARC4);
        }});
      }
    };
    for(let k = 0; 2*k < fileLists[lead].length; k++) mkFour(lead, k, 0);
    for(let k = 0; 2*k < fileLists[trail].length; k++) mkFour(trail, k, nLead);
    const mkRun = (m, pts, hold) => {
      hold = hold || 0;
      const cum = [0];
      for(let k = 1; k < pts.length; k++) cum.push(cum[k-1] + dist(pts[k-1], pts[k]));
      const total = cum[cum.length-1];
      jobs.push({ m: m, hold: hold, total: total, fn: (t, W) => {
        const dd = Math.min(total, Math.max(0, t * W - hold));
        for(let k = 1; k < pts.length; k++)
          if(dd <= cum[k] || k === pts.length - 1){
            const seg = cum[k]-cum[k-1], u = seg<=1e-12?0:Math.min(1,(dd-cum[k-1])/seg);
            return [pts[k-1][0]+(pts[k][0]-pts[k-1][0])*u,
                    pts[k-1][1]+(pts[k][1]-pts[k-1][1])*u];
          }
        return pts[pts.length-1];
      }});
    };
    // The captain places himself at the marker's end of the line — the flank
    // on which the company will dress.
    const capt = this.men.get("capt");
    const captTgt = [D[0]*Ma + Sv[0]*sLine, D[1]*Ma + Sv[1]*sLine];
    mkRun(capt, [capt.pos.slice(),
                 add(capt.pos, D, Math.max(0, (Ma - 2) - aOf(capt.pos))),
                 captTgt]);
    finals.set("capt", captTgt);
    // The marker (2L) side-steps to clear the captain's place.
    mkRun(this.men.get("2L"), [this.men.get("2L").pos.slice(),
                               add(this.men.get("2L").pos, D, -1)]);
    // Guides: each posts himself immediately in front of where the far flank
    // of his platoon will rest, facing the captain. 1S serves the 1st
    // platoon, 2S the 2d, whichever leads.
    const mkGuide = (id, fEnd) => {
      const g = this.men.get(id);
      const tgt = [D[0]*(Ma + fEnd) + Sv[0]*(sLine + 1),
                   D[1]*(Ma + fEnd) + Sv[1]*(sLine + 1)];
      const wp = [D[0]*(Ma + fEnd) + Sv[0]*sOf(g.pos),
                  D[1]*(Ma + fEnd) + Sv[1]*sOf(g.pos)];
      mkRun(g, [g.pos.slice(), wp, tgt]);
      finals.set(id, tgt);
    };
    mkGuide(lead === 1 ? "1S" : "2S", nLead);
    mkGuide(lead === 1 ? "2S" : "1S", n);
    // 1L: two paces before the centre of the 2d platoon's line, facing it.
    {
      const lt = this.men.get("1L");
      const fOff2 = (lead === 2) ? 0 : nLead;
      const cA = Ma + 1 + fOff2 + (fileLists[2].length - 1)/2;
      mkRun(lt, [lt.pos.slice(),
                 [D[0]*cA + Sv[0]*(sLine + 2), D[1]*cA + Sv[1]*(sLine + 2)]]);
    }
    // File closers follow BEHIND the fours of their own platoons: each holds
    // until his platoon's last four has completed its wheel, then trails to
    // his post behind the line.
    const postIds = ["3S","4S","5S"];
    if(this.men.has("3L")) postIds.push("3L");
    const postFi = { "3S": this.n1 + 1, "4S": this.n1 - 2, "5S": 1,
                     "3L": (this.n1 + this.nFiles - 1)/2 };
    for(const id of postIds){
      const m = this.men.get(id);
      // slot counted from the marker end: from the right if forming on the
      // right, from the left (reversed) if forming on the left.
      const slot = right ? postFi[id] : (this.nFiles - 1 - postFi[id]);
      const post = [D[0]*(Ma + 1 + slot) + Sv[0]*(sLine - CLOSERD),
                    D[1]*(Ma + 1 + slot) + Sv[1]*(sLine - CLOSERD)];
      const wp = [D[0]*(Ma + 1 + slot) + Sv[0]*sOf(m.pos),
                  D[1]*(Ma + 1 + slot) + Sv[1]*sOf(m.pos)];
      // Each closer starts shortly after the four in front of him: find his
      // nearest file laterally, and hold just long enough that he reaches
      // its wheel ground after that four has turned and cleared.
      let d1g = 0, bd = Infinity;
      for(const [fm] of fileLists[m.platoon]){
        const d = Math.abs(sOf(fm.pos) - sOf(m.pos));
        if(d < bd){ bd = d; d1g = fileD1.get(fm.id) || 0; }
      }
      const dC1 = dist(m.pos, wp);
      const hold = Math.max(0, d1g + ARC4 + 2 - dC1);
      mkRun(m, [m.pos.slice(), wp, post], hold);
    }
    let W = 0;
    for(const j of jobs) W = Math.max(W, j.hold + j.total);
    for(const j of jobs)
      j.m.setTimedPath(samplePath(t => j.fn(t, W), 120));
    this.heading = h;
    this.faceAll(h);
    capt.facing = h - q*Math.PI/2;                     // along the line, to it
    this.men.get("1S").facing = h + q*Math.PI/2;       // toward the captain
    this.men.get("2S").facing = h + q*Math.PI/2;
    this.men.get("1L").facing = h + Math.PI;           // toward his platoon
    o.finals = finals;
    this.state = "ONLINE_HALTED"; return null;
  }
  odOnLineDress(){
    if(this.state !== "ONLINE_HALTED")
      return "'Right (left)--DRESS' here follows the halt of the fours "+
             "three paces from the line.";
    this.clearPaths();
    const o = this._onRight;
    for(const m of this.men.values()){
      if(m.id === "capt" || m.id === "1S" || m.id === "2S" ||
         m.id === "1L" || m.id === "2L") continue;
      const tgt = o.finals.get(m.id);
      if(tgt && dist(m.pos, tgt) > 1e-9) m.setPath([tgt]);
    }
    this.state = "ONLINE_DRESSED"; return null;
  }

  // ---- Lesson VI, Art. 1: to break the company into platoons on the march
  // ---- (270-277), and to re-form the company (278-286). --------------------
  odBreakPlatoons(rightInFront){
    if(this.state !== "LINE_MARCH")
      return "'Break into platoons' is given while the company is MARCHING "+
             "in line (par. 270).";
    this.finish();
    this.clearPaths();
    this._captSpeedMult = 1;
    const F = this.F();
    const Rv = vec(this.heading + Math.PI/2), Lv = vec(this.heading - Math.PI/2);
    const n = this.nFiles, n1 = this.n1, n2 = n - n1;
    const lead = rightInFront ? 1 : 2, rear = rightInFront ? 2 : 1;
    const nLead = rightInFront ? n1 : n2;
    const shiftV = rightInFront ? Rv : Lv;   // the rear platoon slides behind
    const hold2 = 2;                          // marks time till the rear rank
                                              // of the lead platoon has passed
    // Budget A (in lead-platoon paces). The rear platoon: hold, oblique at a
    // shortened step covering nLead forward + nLead lateral, then Forward at
    // the full step, ending exactly one platoon front behind the lead (274-5).
    let A = 2 * nLead + 6;

    const frontOf = p => this.platoonMembers(p).filter(m =>
      m.rank === "front" && m.id !== "capt" && m.id !== "1S");
    const edge = (list, v) => {
      let best = null;
      for(const m of list)
        if(!best || dot(m.pos, v) > dot(best.pos, v)) best = m;
      return best;
    };
    const leadFront = frontOf(lead), rearFront = frontOf(rear);
    const capt = this.men.get("capt"), lt = this.men.get("1L");
    const s1 = this.men.get("1S"), s2 = this.men.get("2S");

    // Special-route budgets can exceed A; iterate to a sufficient A.
    const guideLen = () => {
      // 1S route (right in front): ahead, across the front, settle at the
      // lead platoon's left flank. Symmetric estimate for the mirrored case.
      return (A + 2) + (nLead + 3) + 2;
    };
    for(let it = 0; it < 6; it++)
      A = Math.max(A, hold2 + 1 + guideLen() / 1.8 + 0.5);
    const W = A;

    // ---- movement profiles ----
    const leadPos = (p0, d) => add(p0, F, Math.min(A, d));
    const To = 2 * nLead - hold2;             // oblique time window
    const rearPos = (p0, d) => {
      if(d <= hold2) return p0;
      if(d <= hold2 + To){
        const u = (d - hold2) / To;
        return add(add(p0, F, nLead * u), shiftV, nLead * u);
      }
      return add(add(p0, F, nLead + (d - hold2 - To)), shiftV, nLead);
    };
    const setFn = (m, fn) => m.setTimedPath(samplePath(t => fn(t * W), 120));
    const runLegs = (m, legs, hold, speed) => {
      const cum = [0];
      for(let k = 1; k < legs.length; k++)
        cum.push(cum[k-1] + dist(legs[k-1], legs[k]));
      const L = cum[cum.length - 1];
      setFn(m, d => {
        const dd = Math.min(L, Math.max(0, (d - hold) * speed));
        for(let k = 1; k < legs.length; k++)
          if(dd <= cum[k] || k === legs.length - 1){
            const seg = cum[k]-cum[k-1], u = seg<=1e-12?0:Math.min(1,(dd-cum[k-1])/seg);
            return [legs[k-1][0]+(legs[k][0]-legs[k-1][0])*u,
                    legs[k-1][1]+(legs[k][1]-legs[k-1][1])*u];
          }
        return legs[legs.length-1];
      });
    };

    // rank-and-file and closers: platoon-rigid profiles (271-275, 282)
    for(const m of this.men.values()){
      if(m === capt || m === lt || m === s1 || m === s2) continue;
      if(m.platoon === lead) setFn(m, d => leadPos(m.pos.slice(), d));
      else setFn(m, d => rearPos(m.pos.slice(), d));
    }
    // Captain: quickly before the centre of the 1st platoon (270), then on.
    {
      const plt1F = frontOf(1);
      const cen = centroid(plt1F.map(m => m.pos));
      const fin = (1 === lead)
        ? add(add(cen, F, A), F, 2)
        : add(add(add(cen, F, A - nLead), shiftV, nLead), F, 2);
      runLegs(capt, [capt.pos.slice(), fin], 0, Math.max(1, dist(capt.pos, fin)/W + 0.01));
    }
    // 1st lieutenant: around the LEFT of the company to before the centre of
    // the 2d platoon (271).
    {
      const plt2F = frontOf(2);
      const cen = centroid(plt2F.map(m => m.pos));
      const fin = (2 === lead)
        ? add(add(cen, F, A), F, 2)
        : add(add(add(cen, F, A - nLead), shiftV, nLead), F, 2);
      const lm = edge(frontOf(1).concat(frontOf(2)), Lv);
      const wpL = add(add(lm.pos, Lv, 2), F, 1);
      const legs = [lt.pos.slice(), wpL, fin];
      let L = 0; for(let k=1;k<legs.length;k++) L += dist(legs[k-1],legs[k]);
      runLegs(lt, legs, 0, Math.max(1.2, L/W + 0.01));
    }
    if(rightInFront){
      // 1S: to the left flank of the 1st platoon as soon as it is
      // disengaged, passing by the front rank (273).
      const lm1 = edge(leadFront, Lv);
      const post = add(add(lm1.pos, F, A), Lv, FW);
      const legs = [s1.pos.slice(),
                    add(s1.pos, F, A * 0.55),
                    add(post, F, 2), post];
      runLegs(s1, legs, hold2 + 1, 1.8);
      // 2S: left guide of the 2d platoon — moves with it to its final left
      // flank (163/168).
      const lm2 = edge(rearFront, Lv);
      const post2 = add(add(add(lm2.pos, F, A - nLead), shiftV, nLead), Lv, FW);
      runLegs(s2, [s2.pos.slice(), post2], hold2, 1.2);
    } else {
      // Left in front (276-277): 1S remains on the right of the 1st platoon;
      // 2S shifts to the right flank of the 2d.
      const rm1 = edge(frontOf(1), Rv);
      const post1 = add(add(add(rm1.pos, F, A - nLead), shiftV, nLead), Rv, FW);
      runLegs(s1, [s1.pos.slice(), post1], hold2, 1.2);
      const rm2 = edge(frontOf(2), Rv);
      const post2 = add(add(rm2.pos, F, A), Rv, FW);
      const legs = [s2.pos.slice(),
                    add(add(rm2.pos, Rv, 1.5), F, 0),
                    add(post2, F, 2), post2];
      runLegs(s2, legs, hold2 + 1, 1.8);
    }
    capt.rank = "chief"; lt.rank = "chief"; s1.rank = "front";
    this.colDir = this.heading;
    this.faceAll(this.colDir);
    this.state = "COL_MARCH"; return null;
  }

  odFormCompany(){
    if(this.state !== "COL_MARCH")
      return "'Form company' is given while the column by platoon is on the "+
             "march (par. 278).";
    this.finish();
    this.clearPaths();
    this._captSpeedMult = 1;
    const D = vec(this.colDir);
    const cen1 = centroid(this.platoonMembers(1).map(m => m.pos));
    const cen2 = centroid(this.platoonMembers(2).map(m => m.pos));
    const lead = dot(sub(cen1, cen2), D) > 0 ? 1 : 2;
    const rear = lead === 1 ? 2 : 1;
    const rightInFront = lead === 1;
    const n1 = this.n1, n2 = this.nFiles - n1;
    const nLead = rightInFront ? n1 : n2;
    // The leading platoon obliques toward its own flank to unmask (282/285).
    const U = vec(this.colDir + (rightInFront ? 1 : -1) * Math.PI/2);
    const frontOf = p => this.platoonMembers(p).filter(m =>
      m.rank === "front" && m.id !== "capt" && m.id !== "1S");
    const edge = (list, v) => {
      let best = null;
      for(const m of list)
        if(!best || dot(m.pos, v) > dot(best.pos, v)) best = m;
      return best;
    };
    const aOf = p => dot(p, D);
    const gap = aOf(centroid(frontOf(lead).map(m=>m.pos))) -
                aOf(centroid(frontOf(rear).map(m=>m.pos)));
    const t_o = nLead * Math.SQRT2;                 // oblique at the full step
    const holdLead = Math.max(0, gap + nLead - t_o); // mark time (283)
    const Tf = 6;                                    // united, forward (284)
    const W = t_o + holdLead + Tf;

    const leadPos = (p0, d) => {
      if(d <= t_o){
        const u = d / t_o;
        return add(add(p0, D, nLead * u), U, nLead * u);
      }
      if(d <= t_o + holdLead) return add(add(p0, D, nLead), U, nLead);
      return add(add(p0, D, nLead + (d - t_o - holdLead)), U, nLead);
    };
    const rearPos = (p0, d) => add(p0, D, Math.min(W, d));
    const setFn = (m, fn) => m.setTimedPath(samplePath(t => fn(t * W), 120));
    const runLegs = (m, legs, hold, speed) => {
      const cum = [0];
      for(let k = 1; k < legs.length; k++)
        cum.push(cum[k-1] + dist(legs[k-1], legs[k]));
      const L = cum[cum.length - 1];
      setFn(m, d => {
        const dd = Math.min(L, Math.max(0, (d - hold) * speed));
        for(let k = 1; k < legs.length; k++)
          if(dd <= cum[k] || k === legs.length - 1){
            const seg = cum[k]-cum[k-1], u = seg<=1e-12?0:Math.min(1,(dd-cum[k-1])*1/seg);
            return [legs[k-1][0]+(legs[k][0]-legs[k-1][0])*u,
                    legs[k-1][1]+(legs[k][1]-legs[k-1][1])*u];
          }
        return legs[legs.length-1];
      });
    };
    const capt = this.men.get("capt"), lt = this.men.get("1L");
    const s1 = this.men.get("1S"), s2 = this.men.get("2S");
    for(const m of this.men.values()){
      if(m === capt || m === lt || m === s1 || m === s2) continue;
      if(m.platoon === lead) setFn(m, d => leadPos(m.pos.slice(), d));
      else setFn(m, d => rearPos(m.pos.slice(), d));
    }
    // final front-rank line for reference
    const allFrontFin = [];
    for(const m of frontOf(1).concat(frontOf(2)))
      allFrontFin.push(m.platoon === lead
        ? add(add(m.pos.slice(), D, nLead + Tf), U, nLead)
        : add(m.pos.slice(), D, W));
    const cenFin = centroid(allFrontFin);
    // Captain: two paces before the centre of the united company.
    runLegs(capt, [capt.pos.slice(), add(cenFin, D, 2)], 0,
            Math.max(1, dist(capt.pos, add(cenFin, D, 2))/W + 0.01));
    // 1L: returns to his post among the file closers behind the 4th section.
    {
      const s4 = this.menArr().filter(m => m.rank === "front" && m.section === 4);
      const s4fin = s4.map(m => m.platoon === lead
        ? add(add(m.pos.slice(), D, nLead + Tf), U, nLead)
        : add(m.pos.slice(), D, W));
      const post = add(add(centroid(s4fin),
        vec(this.colDir + Math.PI/2), this.lt1Shift() * FW), D, -CLOSERD);
      runLegs(lt, [lt.pos.slice(), post], 0,
              Math.max(1, dist(lt.pos, post)/W + 0.01));
      lt.rank = "closer";
    }
    const Rl = vec(this.colDir + Math.PI/2), Ll = vec(this.colDir - Math.PI/2);
    if(rightInFront){
      // 1S: from the left of the 1st platoon to the right of the company,
      // passing by the front rank (282).
      const rm = edge(frontOf(1), Rl);
      const post = add(add(add(rm.pos, D, nLead + Tf), U, nLead), Rl, FW);
      const legs = [s1.pos.slice(),
                    add(s1.pos, D, W * 0.45),
                    add(post, D, 2), post];
      runLegs(s1, legs, 0, 1.8);
      // 2S stays the left guide, marching with the 2d platoon.
      setFn(s2, d => rearPos(s2.pos.slice(), d));
    } else {
      // Left in front (286): 2S passes from the right of the 2d platoon to
      // its LEFT flank the moment it begins to oblique; 1S remains on the
      // right of the 1st platoon (the right of the company).
      const lm = edge(frontOf(2), Ll);
      const post = add(add(add(lm.pos, D, nLead + Tf), U, nLead), Ll, FW);
      const legs = [s2.pos.slice(),
                    add(s2.pos, D, W * 0.45),
                    add(post, D, 2), post];
      runLegs(s2, legs, 0, 1.8);
      setFn(s1, d => rearPos(s1.pos.slice(), d));
    }
    capt.rank = "front"; s1.rank = "cover";
    this.heading = this.colDir;
    this.faceAll(this.heading);
    this.state = "LINE_MARCH"; return null;
  }

  odGuidesPosts(){
    if(this.state !== "LINE_WHEELED" && this.state !== "ONLINE_DRESSED")
      return "'Guides--POSTS' is given when the company stands aligned in its "+
             "new line of battle (after FRONT / the dress).";
    this.clearPaths();
    const h = this.heading;
    const B = vec(h + Math.PI), F = vec(h);
    const Rv = vec(h + Math.PI/2), Lv = vec(h - Math.PI/2);
    const capt = this.men.get("capt"), s1 = this.men.get("1S");
    capt.rank = "front";
    // Flank references from the dressed front rank.
    let rightMan = null, leftMan = null;
    for(const m of this.men.values())
      if(m.rank === "front" && m.id !== "capt" && m.id !== "1S"){
        if(!rightMan || dot(m.pos, Rv) > dot(rightMan.pos, Rv)) rightMan = m;
        if(!leftMan  || dot(m.pos, Lv) > dot(leftMan.pos, Lv))  leftMan  = m;
      }
    // The captain's post is the right of the front rank (251/259), one
    // pace beyond the right-flank man. If he anchored the dress from the
    // LEFT, he crosses around the front of the company; if he stands off
    // his post on the right (e.g. after anchoring a dress from beyond the
    // flank), he simply steps to it; otherwise he stands fast.
    let captPost = add(rightMan.pos, Rv, FW);
    if(dist(capt.pos, captPost) < 0.05){
      captPost = capt.pos.slice();
    } else if(dot(capt.pos, Rv) < dot(rightMan.pos, Rv) + 0.3){
      const wp1 = add(capt.pos, F, 2);
      const wp2 = add(captPost, F, 2);
      capt.setPath([wp1, wp2, captPost]);
      this._captSpeedMult = 1.5;
    } else {
      capt.setPath([captPost]);
    }
    // 1S covers the captain (251).
    const cover = add(captPost, B, RANKD);
    if(dist(s1.pos, cover) > 1e-9) s1.setPath([cover]);
    s1.rank = "cover";
    // 2S returns to his place as a file closer, second file from the left
    // (251/259); 2L (if detached as a marker) likewise to his post.
    const closerTo = (m, post, aroundLeft) => {
      if(dist(m.pos, post) < 1.5) return;
      const endMan = aroundLeft ? leftMan : rightMan;
      const outv = aroundLeft ? Lv : Rv;
      const wp1 = add(endMan.pos, outv, 1.5);
      const wp2 = add(wp1, B, CLOSERD);
      m.setPath([wp1, wp2, post]);
      m.rank = "closer";
    };
    closerTo(this.men.get("2S"),
             add(add(leftMan.pos, Rv, FW), B, CLOSERD), true);
    closerTo(this.men.get("2L"),
             add(add(rightMan.pos, Lv, ((this.n1 - 1)/2) * FW), B, CLOSERD),
             false);
    const lt = this.men.get("1L");
    {
      const ms = this.menArr().filter(m => m.rank === "front" && m.section === 4);
      const cc = add(centroid(ms.map(m => m.pos)), Rv, this.lt1Shift() * FW);
      const ltPost = add(cc, B, CLOSERD);
      if(dist(lt.pos, ltPost) > 1.5) lt.setPath([ltPost]);
    }
    lt.rank = "closer";
    this.faceAll(h);
    this.state = "LINE_HALT"; return null;
  }

  // ------- Lesson VI, Art. 2: to break files to the rear, and to cause -----
  // ------- them to re-enter into line (294-310) -----------------------------
  // Files are broken in PAIRS from one flank of the marching company. Each
  // pair (four men) forms a single rank covering the first through fourth
  // files from that flank of the remaining company (295) — the outer file's
  // men on the 1st and 3rd, the inner file's on the 2d and 4th. Successive
  // pairs stack behind the company with the NEWEST nearest the rear rank:
  // at each new break the earlier ranks gain two files inward and shorten
  // the step to make room (297); files return into line in the reverse
  // order, the others gaining two files back toward the flank (300).
  // Simplifications: the momentary flank-facing and doubling of 295 are not
  // shown (the men slide directly to their covering places); the broken
  // ranks are drawn behind the file closers, who keep their posts (the
  // flank guide of 305 has no separate representation in line of battle).
  _remainingFront(){
    const Rv = vec(this.heading + Math.PI/2);
    return this.menArr().filter(m =>
      m.rank === "front" && m.id !== "capt" && !m._broken)
      .sort((a, b) => dot(a.pos, Rv) - dot(b.pos, Rv)); // leftmost first
  }
  _rearOf(frontMan){
    const Rv = vec(this.heading + Math.PI/2);
    const lat = dot(frontMan.pos, Rv);
    let best = null, bd = Infinity;
    for(const m of this.men.values())
      if(m.rank === "rear" && !m._broken){
        const d = Math.abs(dot(m.pos, Rv) - lat);
        if(d < bd){ bd = d; best = m; }
      }
    return bd < 0.3 ? best : null;
  }
  canBreakFiles(left, pairs){
    if(this.state !== "LINE_MARCH" && this.state !== "FILES_MARCH") return false;
    if(this.brokenPairs.length && this._breakSide !== left) return false;
    return this.nFiles - 2*this.brokenPairs.length - 2*pairs >= 6;
  }
  canFilesIntoLine(pairs){
    return this.state === "FILES_MARCH" && this.brokenPairs.length >= pairs;
  }
  // Lay out every broken pair behind the flank-most four files of the
  // remaining line: row 1 (newest pair) nearest the company, each row 1.6
  // paces deeper, all behind the rank of file closers. `flankAnchor` is the
  // FINAL front-rank position of the flank-most remaining file.
  _layoutBrokenRows(F, Rv, flankAnchor){
    const inward = this._breakSide ? 1 : -1;   // from the left flank, inward = right
    const P = this.brokenPairs.length;
    for(let k = 0; k < P; k++){
      const rec = this.brokenPairs[k];
      const row = P - k;                        // last pushed = row 1
      const depth = CLOSERD + 1.6 * row;
      const men = [rec.frontOuter, rec.frontInner, rec.rearOuter, rec.rearInner];
      for(let j = 0; j < 4; j++){
        const slot = add(add(flankAnchor, Rv, inward * j * FW), F, -depth);
        this.men.get(men[j]).setPath([slot]);
      }
    }
  }
  odBreakFiles(left, pairs){
    if(this.state !== "LINE_MARCH" && this.state !== "FILES_MARCH")
      return "Files are broken to the rear while the company is marching in "+
             "line of battle (Lesson III: Company, forward — MARCH first).";
    if(this.brokenPairs.length && this._breakSide !== left)
      return "The new files must always be broken from the same side as the "+
             "first (298).";
    if(this.nFiles - 2*this.brokenPairs.length - 2*pairs < 6)
      return "That would reduce the front below six files (cf. 329) — cause "+
             "files to re-enter the line first, or drill a larger company.";
    this.clearPaths();
    const F = this.F(), Rv = vec(this.heading + Math.PI/2);
    // the flank-most remaining files, outermost first
    const rem = this._remainingFront();
    const take = left ? rem.slice(0, 2*pairs)
                      : rem.slice(rem.length - 2*pairs).reverse();
    for(let p = 0; p < pairs; p++){
      const fOut = take[2*p], fIn = take[2*p + 1];
      const rOut = this._rearOf(fOut), rIn = this._rearOf(fIn);
      if(!rOut || !rIn) return "Could not resolve the rear-rank men of the flank files.";
      const rec = { frontOuter: fOut.id, frontInner: fIn.id,
                    rearOuter: rOut.id, rearInner: rIn.id };
      for(const id of [rec.frontOuter, rec.frontInner, rec.rearOuter, rec.rearInner])
        this.men.get(id)._broken = true;
      this.brokenPairs.push(rec);           // outermost pushed first -> newest = innermost
    }
    this._breakSide = left;
    // the rest of the company marches straight on
    for(const m of this.men.values())
      if(!m._broken) m.setPath([add(m.pos, F, MARCH_PACES)]);
    // all broken ranks take (or shift to) their covering places behind the
    // new flank — earlier ranks gaining two files inward and dropping back
    const rem2 = this._remainingFront();
    const flankMan = left ? rem2[0] : rem2[rem2.length - 1];
    this._layoutBrokenRows(F, Rv, add(flankMan.pos, F, MARCH_PACES));
    this.state = "FILES_MARCH";
    return null;
  }
  odFilesIntoLine(pairs){
    if(this.state !== "FILES_MARCH" || !this.brokenPairs.length)
      return "No files are broken to the rear.";
    if(this.brokenPairs.length < pairs)
      return "Only " + (2*this.brokenPairs.length) +
             " file(s) are broken to the rear.";
    this.clearPaths();
    const F = this.F(), Rv = vec(this.heading + Math.PI/2);
    const left = this._breakSide;
    const rem = this._remainingFront();
    const flankMan = left ? rem[0] : rem[rem.length - 1];
    const flankAnchor = add(flankMan.pos, F, MARCH_PACES);
    const outward = left ? -1 : 1;
    // the ranks nearest the company return first (300), each pair to its
    // own two files beyond the present flank
    for(let p = 0; p < pairs; p++){
      const rec = this.brokenPairs.pop();
      const latIn = outward * (2*p + 1) * FW, latOut = outward * (2*p + 2) * FW;
      for(const [id, lat, dep] of [
          [rec.frontInner, latIn, 0], [rec.frontOuter, latOut, 0],
          [rec.rearInner, latIn, RANKD], [rec.rearOuter, latOut, RANKD]]){
        const man = this.men.get(id);
        man._broken = false;
        man.setPath([add(add(flankAnchor, Rv, lat), F, -dep)]);
      }
    }
    // the rest of the company marches straight on
    for(const m of this.men.values())
      if(!m._broken && !m.path) m.setPath([add(m.pos, F, MARCH_PACES)]);
    // remaining broken ranks gain two files back toward the flank (300)
    if(this.brokenPairs.length)
      this._layoutBrokenRows(F, Rv,
        add(flankAnchor, Rv, outward * 2 * pairs * FW));
    if(this.brokenPairs.length){ this.state = "FILES_MARCH"; }
    else { this._breakSide = null; this.state = "LINE_MARCH"; }
    return null;
  }

  // ------- Lesson VI, Art. 3: the column in route (311-342) ----------------
  // Route step: the rear rank opens to a full pace (313, stylized as
  // ROUTE_RANKD), the file closers keep their two paces behind it, and the
  // rank-and-file are no longer required to keep the step or the touch of
  // elbows — shown as a small deterministic disorder that is re-drawn on
  // every march segment and vanishes when the cadenced step is resumed.
  _routeJit(id){
    let h = (2166136261 ^ ((this._routeTick || 0) * 2654435761)) >>> 0;
    for(let i = 0; i < id.length; i++)
      h = Math.imul(h ^ id.charCodeAt(i), 16777619) >>> 0;
    return [((h % 997)/997 - 0.5) * 0.36, (((h >>> 11) % 991)/991 - 0.5) * 0.7];
  }
  _routeJitVec(m, F, Rv){
    if((m.rank !== "front" && m.rank !== "rear") || m.id === "capt") return [0, 0];
    const j = this._routeJit(m.id);
    return [Rv[0]*j[0] + F[0]*j[1], Rv[1]*j[0] + F[1]*j[1]];
  }
  _routeOff(){
    this.clearPaths();
    const F = this.F(), Rv = vec(this.heading + Math.PI/2);
    this._routeTick = (this._routeTick || 0) + 1;
    const opens = m => m.rank === "rear" || m.rank === "cover" || m.rank === "closer";
    for(const m of this.men.values()){
      const a = MARCH_PACES - (opens(m) ? (ROUTE_RANKD - RANKD) : 0);
      const j = this._routeJitVec(m, F, Rv);
      m.setPath([[m.pos[0] + F[0]*a + j[0], m.pos[1] + F[1]*a + j[1]]]);
    }
    this.state = "ROUTE_MARCH"; return null;
  }
  odRouteForward(){
    if(this.state !== "LINE_HALT")
      return "'Column, forward — Route step — MARCH' is given with the "+
             "company at a halt, in line, as a subdivision of a column (312).";
    return this._routeOff();
  }
  odRouteStep(){
    if(this.state !== "LINE_MARCH")
      return "'Route step — MARCH' here is given with the company marching "+
             "in the cadenced pace (317).";
    return this._routeOff();
  }
  odQuickTime(){
    if(this.state !== "ROUTE_MARCH")
      return "'Quick time — MARCH' is given with the company marching in "+
             "the route step (315).";
    this.clearPaths();
    const F = this.F(), Rv = vec(this.heading + Math.PI/2);
    const opens = m => m.rank === "rear" || m.rank === "cover" || m.rank === "closer";
    for(const m of this.men.values()){
      const j = this._routeJitVec(m, F, Rv);
      const a = MARCH_PACES + (opens(m) ? (ROUTE_RANKD - RANKD) : 0);
      m.setPath([[m.pos[0] - j[0] + F[0]*a, m.pos[1] - j[1] + F[1]*a]]);
    }
    this.state = "LINE_MARCH"; return null;
  }

  // 319-320: marching in the route step, pass to the flank march in the SAME
  // direction: the company faces to the right (or left) in marching, files
  // doubling, and the leading guide wheels at once — so the column of fours
  // continues along the original line of march. The final formation is the
  // exact doubled-column layout of Company, right (left)--FACE, rigidly
  // wheeled back onto the old direction, so every flank evolution (by file,
  // halt and front, into line by file, into line by company/platoon) can
  // follow from it.
  odRouteFlank(toRight){
    if(this.state === "COL_MARCH") return this._routeFlankFromColumn(toRight);
    if(this.state !== "ROUTE_MARCH")
      return "'Company by the right (left) flank — By file left (right) — "+
             "MARCH' is given here while marching in the route step (319), "+
             "or in the column by platoon (330).";
    this.clearPaths();
    const h = this.heading, Fh = vec(h), Rv = vec(h + Math.PI/2);
    // dressed base position of every man (route disorder and the opened
    // rear-rank distance removed; the cadenced step is resumed in the turn)
    const base = new Map();
    for(const m of this.men.values()){
      const j = this._routeJitVec(m, Fh, Rv);
      let p = [m.pos[0] - j[0], m.pos[1] - j[1]];
      if(m.rank === "rear" || m.rank === "cover" || m.rank === "closer")
        p = add(p, Fh, ROUTE_RANKD - RANKD);
      base.set(m.id, p);
    }
    const D0 = h + (toRight ? Math.PI/2 : -Math.PI/2);
    const Dv = vec(D0);
    const rankAndFile = this.menArr().filter(m =>
      (m.rank === "front" || m.rank === "rear") && m.id !== "capt" && m.id !== "1S");
    let c1 = null;
    for(const m of rankAndFile)
      if(m.rank === "front" &&
         (!c1 || dot(base.get(m.id), Rv) > dot(base.get(c1.id), Rv))) c1 = m;
    const Or = base.get(c1.id);
    const captOrig = base.get("capt");
    const n = this.nFiles;
    const face = new Map();          // the doubled layout, before the wheel
    if(toRight){
      face.set("1S", captOrig.slice());
      face.set("capt", add(captOrig, vec(D0 + Math.PI/2), -FW));
      for(const m of rankAndFile){
        const i = Math.round(-dot(sub(base.get(m.id), Or), Dv) / FW);
        m.fileI = i;
        const k = Math.floor(i/2);
        const lane = m.rank === "front" ? (i%2===0 ? 0 : 1) : (i%2===0 ? 2 : 3);
        face.set(m.id, add(add(Or, Dv, -2*k*FW), vec(D0 + Math.PI/2), lane*FW));
      }
      for(const m of this.menArr()){
        if(m.rank !== "closer") continue;
        m.fileI = null;
        const lat = dot(sub(base.get(m.id), Or), vec(D0 + Math.PI/2));
        face.set(m.id, add(base.get(m.id), vec(D0 + Math.PI/2), 4.2*FW - lat));
      }
    } else {
      const Ld = vec(D0 - Math.PI/2);
      let c4 = null;
      for(const m of rankAndFile)
        if(m.rank === "front" &&
           (!c4 || dot(base.get(m.id), Dv) > dot(base.get(c4.id), Dv))) c4 = m;
      this._flankPivotId = c4.id;
      const Ol = base.get(c4.id);
      for(const m of rankAndFile){
        const i = Math.round(dot(sub(base.get(m.id), Or), Dv) / FW);
        m.fileI = i;
        const k = Math.floor((n-1-i)/2), lp = (n-1-i)%2;
        const lane = m.rank === "front" ? lp : lp + 2;
        face.set(m.id, add(add(Ol, Dv, -2*k*FW), Ld, lane*FW));
      }
      const head2S = add(Ol, Dv, FW);
      face.set("2S", head2S);
      face.set("capt", add(head2S, Ld, -FW));
      // 1S keeps his own (rear-rank) spot, as in Company, left--FACE
      const Bv = vec(h + Math.PI);
      for(const m of this.menArr()){
        if(m.rank !== "closer" || m.id === "2S") continue;
        m.fileI = null;
        face.set(m.id, add(base.get(m.id), Bv, 2));
      }
      this.men.get("2S").fileI = null;
    }
    this.men.get("1S").fileI = null;
    this.men.get("capt").fileI = null;
    // Phase 1: the company faces and doubles as in Company, right (left)--
    // FACE; Phase 2: the immediate by-file wheel — each four wheels 90
    // degrees in succession over the same pivot arc, exactly as in the
    // march by the flank (Lesson IV machinery), bringing the column back
    // onto the original direction of march.
    const turn = toRight ? -Math.PI/2 : Math.PI/2;
    const ids = [...this.men.keys()];
    const facedOf = id => face.get(id) || base.get(id);
    const plans = this._wheelPlan(ids, facedOf, D0, turn);
    const TF = 0.3;
    const lerp = (p, q, u) => [p[0]+(q[0]-p[0])*u, p[1]+(q[1]-p[1])*u];
    for(const m of this.men.values()){
      const start = m.pos.slice(), fp = facedOf(m.id), plan = plans.get(m.id);
      const fn = t => t < TF ? lerp(start, fp, t/TF)
                             : plan(Math.min(1, (t - TF)/(1 - TF)));
      m.setTimedPath(samplePath(fn, 80));
    }
    this._flankRight = toRight;
    this._flankHybrid = false;
    this._flankCaptOrigin = captOrig;
    this._sgOrigin = base.get("1S");
    this.colDir = h;
    this.faceAll(h);
    this._perManAnim = false;
    this._captSpeedMult = 1;
    this.state = "FLANK_MARCH"; return null;
  }

  // Per-man motion for the immediate by-file wheel, computed on a FACED
  // column layout — the same pivot-arc machinery as the wheel in marching
  // by the flank: lead to the wheeling point, sweep the common 90-degree
  // arc in succession, then lead out on the new direction. The net effect
  // is a rigid quarter-turn of the column plus a fixed advance, so the
  // resulting formation is exact.
  _wheelPlan(ids, facedOf, D0, turn, opts){
    opts = opts || {};
    const D = vec(D0), Rv = vec(D0 + Math.PI/2), NDv = vec(D0 + turn);
    let H = null;
    if(opts.H){ H = opts.H; }
    else if(opts.headId){ H = facedOf(opts.headId); }
    else {
      let hA = -Infinity;
      for(const id of ids){
        const a = dot(facedOf(id), D);
        if(a > hA){ hA = a; H = facedOf(id); }
      }
    }
    const aM = new Map(), sM = new Map();
    for(const id of ids){
      aM.set(id, dot(sub(facedOf(id), H), D));
      sM.set(id, dot(sub(facedOf(id), H), Rv));
    }
    const isCloser = id => this.men.get(id).fileI === null &&
                           id !== "capt" && id !== "1S";
    const PR = opts.PR !== undefined ? opts.PR : 2.0;
    const LEAD = opts.LEAD !== undefined ? opts.LEAD : 2.0;
    let sC;
    if(opts.sC !== undefined){ sC = opts.sC; }
    else {
      const lanes = ids.map(id => sM.get(id));
      const sInner = (turn < 0) ? Math.min(...lanes) : Math.max(...lanes);
      sC = (turn < 0) ? sInner - PR : sInner + PR;
    }
    const Cc = add(add(H, D, LEAD), Rv, sC);
    const depth = Math.max(...ids.map(id => -aM.get(id)));
    const E = opts.E !== undefined ? opts.E : depth + 2.0;
    let Rstar = 1;
    for(const id of ids)
      if(!isCloser(id)) Rstar = Math.max(Rstar, Math.abs(sM.get(id) - sC));
    const Tstar = LEAD + E + Rstar * Math.abs(turn);
    const plans = new Map();
    for(const id of ids){
      const a = aM.get(id), s = sM.get(id);
      const d1 = LEAD - a, e = E + a;
      const t1 = d1 / Tstar, t2 = (d1 + Rstar * Math.abs(turn)) / Tstar;
      const arcStart = add(add(H, D, LEAD), Rv, s);
      const arcEnd = rotAbout(arcStart, Cc, turn);
      const p0 = facedOf(id);
      plans.set(id, t => {
        if(t <= t1) return add(p0, D, d1 * (t1 <= 0 ? 1 : Math.min(1, t/t1)));
        if(t <= t2) return rotAbout(arcStart, Cc, turn * (t - t1)/(t2 - t1));
        return add(arcEnd, NDv, e * Math.min(1, (t - t2)/(1 - t2)));
      });
    }
    return plans;
  }

  // 330: the column by platoon, marching in route, passes to the flank
  // march in the same direction: each platoon faces to the right (left) in
  // marching, its files doubling, and wheels 90 degrees at its own pivot;
  // the first file of each subdivision prolongs the direction and unites
  // with the rear of the subdivision preceding, the 2d platoon closing up
  // any remaining distance while the captain, the guides, and the file
  // closers take the posts of a company that has faced. Both platoons
  // wheel over lanes that coincide, so the 2d finishes directly behind the
  // 1st. For the RIGHT flank this reproduces exactly the company's own
  // faced column (all evolutions follow); for the LEFT, the 1st platoon
  // still leads (330), a valid column in which files are not un-doubled.
  _routeFlankFromColumn(toRight){
    const C = this.colDir;
    const D0 = C + (toRight ? Math.PI/2 : -Math.PI/2);
    const turn = toRight ? -Math.PI/2 : Math.PI/2;
    const Dv = vec(D0), Dfin = vec(C);
    const RvC = vec(C + Math.PI/2);          // right of the column direction
    const LaneV = vec(C + (toRight ? Math.PI/2 : -Math.PI/2));
    this.clearPaths();
    const n = this.nFiles, n1 = this.n1, n2 = n - n1;
    const rf = this.menArr().filter(m =>
      (m.rank === "front" || m.rank === "rear") &&
      m.id !== "capt" && m.id !== "1S" && m.platoon);
    const plats = { 1: [], 2: [] };
    for(const m of rf) plats[m.platoon].push(m);
    // local file index from each platoon's right flank; company file index
    const local = new Map();
    for(const p of [1, 2]){
      let maxLat = -Infinity;
      for(const m of plats[p])
        if(m.rank === "front") maxLat = Math.max(maxLat, dot(m.pos, RvC));
      for(const m of plats[p]){
        const j = Math.round((maxLat - dot(m.pos, RvC)) / FW);
        local.set(m.id, j);
        m.fileI = (p === 1 ? 0 : n1) + j;
      }
    }
    // faced layout per platoon (Company, right (left)--FACE applied to
    // each platoon line where it stands), file closers to the outer lane
    const face = new Map();
    const wheelIds = { 1: [], 2: [] };
    for(const p of [1, 2]){
      const cnt = p === 1 ? n1 : n2;
      let O = null;
      for(const m of plats[p])
        if(m.rank === "front" &&
           local.get(m.id) === (toRight ? 0 : cnt - 1)) O = m.pos;
      const Lat0 = dot(O, RvC);
      for(const m of plats[p]){
        wheelIds[p].push(m.id);
        const j = local.get(m.id);
        let k, lp;
        if(toRight){ k = Math.floor(j/2); lp = j % 2; }
        else { const L = cnt - 1 - j; k = Math.floor(L/2); lp = L % 2; }
        const lane = (m.rank === "front" ? 0 : 2) + lp;
        face.set(m.id, add(add(O, Dv, -2*k*FW),
                           vec(D0 + (toRight ? Math.PI/2 : -Math.PI/2)), lane*FW));
      }
      // this platoon's closers: to the flank lane, keeping their laterals
      for(const m of this.menArr()){
        if(m.rank !== "closer" || m.platoon !== p ||
           m.id === "2S" || m.id === "1S") continue;
        m.fileI = null;
        wheelIds[p].push(m.id);
        const latRel = Math.abs(Lat0 - dot(m.pos, RvC));
        face.set(m.id, add(add(O, Dv, -latRel),
                           vec(D0 + (toRight ? Math.PI/2 : -Math.PI/2)), 4.2*FW));
      }
    }
    // each platoon wheels 90 degrees at its own pivot
    const plans = {
      1: this._wheelPlan(wheelIds[1], id => face.get(id), D0, turn),
      2: this._wheelPlan(wheelIds[2], id => face.get(id), D0, turn)
    };
    const wheelEnd = id =>
      (plans[1].has(id) ? plans[1] : plans[2]).get(id)(1);
    // anchor: the head of the 1st platoon's column; the 2d platoon closes
    // up so its head rank follows the 1st platoon's tail at full distance
    let anchorId = null, headId2 = null;
    for(const m of rf){
      const j = local.get(m.id);
      if(m.rank === "front" && m.platoon === 1 &&
         j === (toRight ? 0 : n1 - 1)) anchorId = m.id;
      if(m.rank === "front" && m.platoon === 2 &&
         j === (toRight ? 0 : n2 - 1)) headId2 = m.id;
    }
    const anchorEnd = wheelEnd(anchorId);
    const slotA2 = -2 * Math.ceil(n1 / 2);   // 2d platoon's head slot
    const lag = dot(sub(wheelEnd(headId2), anchorEnd), Dfin) - slotA2;
    const ADV3 = Math.max(2, lag + 2);
    const drift = { 1: ADV3, 2: ADV3 - lag };
    const TF = 0.25, TW = 0.8;
    const lerp = (p, q, u) => [p[0]+(q[0]-p[0])*u, p[1]+(q[1]-p[1])*u];
    for(const p of [1, 2])
      for(const id of wheelIds[p]){
        const m = this.men.get(id);
        const start = m.pos.slice(), fp = face.get(id), plan = plans[p].get(id);
        const we = plan(1), fin = add(we, Dfin, drift[p]);
        const fn = t => t < TF ? lerp(start, fp, t/TF)
                    : t < TW ? plan((t - TF)/(TW - TF))
                    : lerp(we, fin, (t - TW)/(1 - TW));
        m.setTimedPath(samplePath(fn, 80));
      }
    // the captain, the guides, and the 1st Lieutenant (returning to the
    // file closers) take the posts of a company that has faced
    const headGuide = toRight ? "1S" : "2S";
    const tailGuide = toRight ? "2S" : "1S";
    const hg = add(add(anchorEnd, Dfin, ADV3 + FW), LaneV, 0);
    this.men.get(headGuide).setPath([hg]);
    this.men.get("capt").setPath([add(hg, LaneV, -FW)]);
    const lt1 = this.men.get("1L");
    const off1L = toRight ? (this.lt1Fi() - n1) : (n - 1 - this.lt1Fi());
    lt1.setPath([add(add(anchorEnd, Dfin, ADV3 + slotA2 - off1L*FW),
                     LaneV, 4.2*FW)]);
    lt1.rank = "closer"; lt1.fileI = null;
    // the other guide takes his proper post: for the right flank, the 2d
    // Sergeant's habitual closer station on the outer lane; for the left,
    // the 1st Sergeant falls in at the tail of the column
    if(toRight){
      this.men.get(tailGuide).setPath([
        add(add(anchorEnd, Dfin, ADV3 + slotA2 - (n - 2 - n1)*FW),
            LaneV, 4.2*FW)]);
    } else {
      let minA = Infinity;
      for(const p of [1, 2]) for(const id of wheelIds[p])
        minA = Math.min(minA, dot(sub(wheelEnd(id), anchorEnd), Dfin) + drift[p]);
      this.men.get(tailGuide).setPath([
        add(add(anchorEnd, Dfin, minA - FW), LaneV, 1.1*FW)]);
    }
    this.men.get(tailGuide).fileI = null;
    this.men.get(headGuide).fileI = null;
    this.men.get("capt").fileI = null;
    // restore the line-of-battle roles the column had suspended: the
    // captain resumes his front-rank character, 1st Sergeant his post as
    // covering sergeant, 2d Sergeant among the file closers
    this.men.get("capt").rank = "front";
    this.men.get("1S").rank = "cover";
    this.men.get("2S").rank = "closer";
    if(!toRight){
      let c4 = null;
      for(const m of rf) if(m.rank === "front" && m.fileI === n - 1) c4 = m;
      this._flankPivotId = c4.id;
    }
    this._flankRight = toRight;
    this._flankHybrid = !toRight;
    this._flankCaptOrigin = add(hg, LaneV, -FW);
    this._sgOrigin = hg;
    this.colDir = C;
    this.faceAll(C);
    this._perManAnim = false;
    this._captSpeedMult = 1;
    this.state = "FLANK_MARCH"; return null;
  }

  // ------- Lesson VI, Art. 4: the countermarch (343-351) -------------------
  // The company, at a halt as part of a column, faces to the right (left)
  // WITHOUT doubling; the two guides post themselves on the flanks of the
  // front rank and face about; the two leading files break to the rear
  // (344) — which clears them to swing around the standing guide — and the
  // captain conducts the first file. At MARCH the guides stand fast; every
  // file wheels 180 degrees in succession over the same ground around the
  // pivot guide and marches back along the front; when the leading file is
  // opposite the far guide: Company — HALT — FRONT — Right — DRESS, and
  // the front rank dresses in, enclosed between the two guides (345-349).
  // The company thus ends on its own ground, faced about, the front rank
  // still in front and the right flank still on the right. Simplifications:
  // the guides are shown as the 1st and 2d Sergeants; the captain takes
  // the app's line-of-battle post on the new right (349's column post
  // before the centre is not shown); the countermarch of the column by
  // platoon (350) is not yet animated.
  odCountermarch(toRight){
    if(this.state !== "LINE_HALT")
      return "The countermarch is executed from a halt, in line, as part "+
             "of a column (343).";
    this.clearPaths();
    const h = this.heading, F = vec(h), Rv = vec(h + Math.PI/2), B = vec(h + Math.PI);
    const h2 = h + Math.PI;
    const n = this.nFiles;
    const D0 = h + (toRight ? Math.PI/2 : -Math.PI/2);
    const turn = toRight ? -Math.PI : Math.PI;   // by file left / right, 180
    // front-rank origin (file 0) and geometric file indices
    const rankAndFile = this.menArr().filter(m =>
      (m.rank === "front" || m.rank === "rear") && m.id !== "capt" && m.id !== "1S");
    let o0 = null;
    for(const m of rankAndFile)
      if(m.rank === "front" && (!o0 || dot(m.pos, Rv) > dot(o0.pos, Rv))) o0 = m;
    const O0 = o0.pos.slice();
    const lat0 = dot(O0, Rv);
    const fi = new Map();
    for(const m of rankAndFile)
      fi.set(m.id, Math.round((lat0 - dot(m.pos, Rv)) / FW));
    // guide posts on the flanks of the front rank, faced about (344)
    const rgSpot = add(O0, Rv, FW);            // right of the front rank
    const lgSpot = add(O0, Rv, -n*FW);         // left of the front rank
    const pivotHead = toRight ? 0 : n - 1;     // the leading (first) file
    const second = toRight ? 1 : n - 2;
    // Phase-1 targets: everyone faces in place (files un-doubled: each
    // file's rear man is already beside his leader); the two leading files
    // step to the rear for room to swing around the pivot guide (344), and
    // the captain places himself by the side of the first front-rank man.
    const faced = new Map();
    for(const m of rankAndFile){
      const i = fi.get(m.id);
      let p = m.pos.slice();
      if(i === pivotHead || i === second) p = add(p, B, 1.3);
      faced.set(m.id, p);
    }
    let headMan = null;
    for(const m of rankAndFile)
      if(m.rank === "front" && fi.get(m.id) === pivotHead) headMan = m;
    const captLane = (toRight ? -1 : 1);       // outside the front rank
    faced.set("capt", add(faced.get(headMan.id), vec(D0 + Math.PI/2), captLane*FW));
    // the wheel: 180 degrees around a pivot one pace outside the pivot
    // guide, the whole company following the leading file over the same
    // ground (345), halting with the column above the new line
    const wheelIds = [...rankAndFile.map(m => m.id), "capt"];
    const savedFileI = new Map();
    for(const id of wheelIds){ savedFileI.set(id, this.men.get(id).fileI); this.men.get(id).fileI = 0; }
    const anchorH = toRight ? O0 : add(O0, Rv, -(n - 1)*FW);
    const plans = this._wheelPlan(wheelIds, id => faced.get(id), D0, turn,
      { H: anchorH, PR: 1.0, LEAD: 1.0, E: (n - 1)*FW,
        sC: (turn < 0 ? -1 : 1) });
    for(const id of wheelIds) this.men.get(id).fileI = savedFileI.get(id);
    // Final: the exact inversion — every file on the same ground, faced
    // about, the front rank enclosed between the two guides (349)
    const newFront = i => add(O0, Rv, -(n - 1 - i)*FW);
    const finals = new Map();
    for(const m of rankAndFile){
      const i = fi.get(m.id);
      finals.set(m.id, m.rank === "front"
        ? newFront(i) : add(newFront(i), F, RANKD));
    }
    finals.set("capt", add(newFront(0), Rv, -FW));
    const T1 = 0.15, T2 = 0.85;
    const lerp = (p, q, u) => [p[0]+(q[0]-p[0])*u, p[1]+(q[1]-p[1])*u];
    for(const id of wheelIds){
      const m = this.men.get(id);
      const start = m.pos.slice(), fp = faced.get(id), plan = plans.get(id);
      const we = plan(1), fin = finals.get(id);
      const fn = t => t < T1 ? lerp(start, fp, t/T1)
                  : t < T2 ? plan((t - T1)/(T2 - T1))
                  : lerp(we, fin, (t - T2)/(1 - T2));
      m.setTimedPath(samplePath(fn, 90));
    }
    // the guides: to the flanks of the front rank, standing fast through
    // the wheel, then passing along the front rank to their proper places
    // (345, 349): 1S to cover the captain, 2S among the file closers
    const posts = fidx => add(newFront(fidx), F, CLOSERD);
    const guideFin = {
      "1S": add(finals.get("capt"), F, RANKD),
      "2S": posts(n - 2)
    };
    const guideSpot = { "1S": rgSpot, "2S": lgSpot };
    for(const id of ["1S", "2S"]){
      const m = this.men.get(id);
      const start = m.pos.slice(), spot = guideSpot[id], fin = guideFin[id];
      const wp = add(fin, B, CLOSERD + 1.2);   // along the (new) front side
      const fn = t => t < T1 ? lerp(start, spot, t/T1)
                  : t < T2 ? spot
                  : (t < T2 + 0.09 ? lerp(spot, wp, (t - T2)/0.09)
                                   : lerp(wp, fin, (t - T2 - 0.09)/(1 - T2 - 0.09)));
      m.setTimedPath(samplePath(fn, 90));
    }
    // the file closers pass around the flank away from the pivot to their
    // habitual places behind the (new) rear rank
    const sideDir = toRight ? -1 : 1;          // away from the pivot guide
    const farLat = toRight ? -(n + 1.6) : 2.6;
    const postFi = { "1L": this.lt1Fi(), "2L": (this.n1 - 1)/2,
                     "3S": this.n1 + 1, "4S": this.n1 - 2, "5S": 1 };
    if(this.men.has("3L")) postFi["3L"] = (this.n1 + n - 1)/2;
    for(const id in postFi){
      const m = this.men.get(id);
      const start = m.pos.slice(), fin = posts(postFi[id]);
      const W1 = add(add(O0, Rv, farLat), B, CLOSERD);
      const W2 = add(add(O0, Rv, farLat), F, CLOSERD);
      const fn = t => t < 0.42 ? start
                  : t < 0.62 ? lerp(start, W1, (t - 0.42)/0.2)
                  : t < 0.82 ? lerp(W1, W2, (t - 0.62)/0.2)
                  : lerp(W2, fin, (t - 0.82)/0.18);
      m.setTimedPath(samplePath(fn, 90));
    }
    for(const m of this.men.values()) m.fileI = null;
    this.heading = h2;
    this.faceAll(h2);
    this._perManAnim = false;
    this._captSpeedMult = 1;
    this.state = "LINE_HALT"; return null;
  }

  // 331-339: un-doubling and doubling files in the flank march.
  // Column of fours (FLANK_MARCH) <-> column of twos (FLANK_2, each file's
  // front- and rear-rank man abreast) <-> single rank (FLANK_1). The
  // captain and the guides keep their stations relative to the head of the
  // column; the file closers close toward the narrower column and open out
  // again on re-doubling.
  _flankLaneV(){
    return vec(this.colDir + ((this._flankRight !== false) ? Math.PI/2 : -Math.PI/2));
  }
  _flankOrd(i){ return (this._flankRight !== false) ? i : (this.nFiles - 1 - i); }
  _flankHeadFront(){
    for(const m of this.men.values())
      if(m.rank === "front" && m.fileI !== null && this._flankOrd(m.fileI) === 0)
        return m;
    return null;
  }
  _flankRelayout(adv, closerShift, slotOf){
    this.clearPaths();
    const D = vec(this.colDir), Lv = this._flankLaneV();
    const head = this._flankHeadFront();
    const H = add(head.pos, D, adv);
    for(const m of this.men.values()){
      let tgt;
      if(m.rank === "closer"){
        // close toward the narrower column / open out again on doubling,
        // each closer keeping his own station beyond the outer lane
        tgt = add(add(m.pos, D, adv), Lv, -closerShift*FW);
      } else if(m.fileI === null){
        tgt = add(m.pos, D, adv);      // captain and guides keep station
      } else {
        const slot = slotOf(this._flankOrd(m.fileI), m.rank === "front");
        tgt = add(add(H, D, -slot[0]*FW), Lv, slot[1]*FW);
      }
      if(dist(m.pos, tgt) > 1e-9) m.setPath([tgt]);
    }
    this._captSpeedMult = 1;
    this._perManAnim = false;
  }
  odFlankUndouble2(){
    if(this.state !== "FLANK_MARCH")
      return "'In two ranks, undouble files' is given with the company "+
             "marching by the flank in column of fours, the cadenced step "+
             "resumed (331).";
    if(this._flankHybrid)
      return "The subdivisions marched by the flank in succession (330) — "+
             "un-doubling is shown only for the company's own flank march. "+
             "Halt, front, and face the company anew first.";
    this._flankRelayout(MARCH_PACES, 2, (o, isFront) => [o, isFront ? 0 : 1]);
    this.state = "FLANK_2"; return null;
  }
  odFlankUndouble1(){
    if(this.state !== "FLANK_2")
      return "'In one rank, undouble files' is given with the company "+
             "marching by the flank in two ranks (334).";
    // the column doubles in length: the head marches on while each file
    // steps off as its distance is gained (335)
    this._flankRelayout(MARCH_PACES + this.nFiles*FW, 1,
      (o, isFront) => [2*o + (isFront ? 0 : 1), 0]);
    this.state = "FLANK_1"; return null;
  }
  odFlankDouble2(){
    if(this.state !== "FLANK_1")
      return "'In two ranks, double files' is given with the company "+
             "marching in single rank (336).";
    this._flankRelayout(MARCH_PACES, -1, (o, isFront) => [o, isFront ? 0 : 1]);
    this.state = "FLANK_2"; return null;
  }
  odFlankDouble4(){
    if(this.state !== "FLANK_2")
      return "'In four ranks, double files' is given with the company "+
             "marching by the flank in two ranks (338).";
    this._flankRelayout(MARCH_PACES, -2,
      (o, isFront) => [2*Math.floor(o/2), (isFront ? 0 : 2) + o%2]);
    this.state = "FLANK_MARCH"; return null;
  }

  // 321-328: the column by platoon (route step supposed), to break into
  // sections and re-form platoons. The right section of each platoon leads,
  // commanded by the captain and 1st Lieutenant; the left sections are
  // commanded by the next subalterns or, in their absence, sergeants (323).
  // Simplifications: the guides keep their column posts and the file
  // closers their stations (the guide/rear-rank swaps and closing to one
  // pace of 325 are not shown), and the inverse means for a column left in
  // front are not distinguished.
  odBreakSections(){
    if(this.state !== "COL_MARCH")
      return "'Break into sections' is given with the column by platoon on "+
             "the march (in route, 324-326).";
    if(this.n2 < 12)
      return "Platoons are broken into sections only when they have a front "+
             "of twelve files or more (322) — drill a company of 24 files "+
             "or larger.";
    this.clearPaths();
    const D = vec(this.colDir), Rv = vec(this.colDir + Math.PI/2);
    const rf = this.menArr().filter(m =>
      (m.rank === "front" || m.rank === "rear") && m.section);
    const secMen = s => rf.filter(m => m.section === s);
    const secFront = s => secMen(s).filter(m => m.rank === "front");
    const frontDep = s => Math.max(...secFront(s).map(m => dot(m.pos, D)));
    // directing flank = the guides' side of the column
    const cen = centroid(rf.map(m => m.pos));
    const gs = dot(sub(this.men.get("1S").pos, cen), Rv) >= 0 ? 1 : -1;
    const edge = s => {
      let b = -Infinity, v = 0;
      for(const m of secFront(s)){
        const l = dot(m.pos, Rv);
        if(l*gs > b){ b = l*gs; v = l; }
      }
      return v;
    };
    const gap = Math.abs(frontDep(1) - frontDep(3)) / 2;
    const ADV = Math.max(MARCH_PACES, gap + 4);
    const ds = { 2: edge(1) - edge(2), 4: edge(3) - edge(4) };
    const chief4 = this.men.has("3L") ? "3L" : "3S";
    // anchor for restoring the left-section chiefs to their posts: the
    // directing-flank front man of the 1st section marches straight
    // throughout the column by section
    let anchor = secFront(1)[0];
    for(const m of secFront(1))
      if(dot(m.pos, Rv)*gs > dot(anchor.pos, Rv)*gs) anchor = m;
    this._sections = { gap: gap, ds: ds, chief4: chief4, anchorId: anchor.id,
      off2L: sub(this.men.get("2L").pos, anchor.pos),
      off4:  sub(this.men.get(chief4).pos, anchor.pos) };
    // the trailing (left) sections oblique in behind their leading sections,
    // aligning on the directing flank; everyone else marches straight on
    const trailSet = new Set();
    for(const t of [2, 4]) for(const m of secMen(t)) trailSet.add(m.id);
    const chiefIds = { capt: 1, "1L": 3, "2L": 2 }; chiefIds[chief4] = 4;
    for(const m of this.men.values()){
      if(m.id in chiefIds) continue;
      if(trailSet.has(m.id))
        m.setPath([add(add(m.pos, D, ADV - gap), Rv, ds[m.section])]);
      else
        m.setPath([add(m.pos, D, ADV)]);
    }
    // each chief of section posts two paces before its centre (the app's
    // column convention)
    for(const id in chiefIds){
      const s = chiefIds[id];
      let c = add(centroid(secFront(s).map(m => m.pos)), D, ADV + 2);
      if(s === 2 || s === 4) c = add(add(c, D, -gap), Rv, ds[s]);
      this.men.get(id).setPath([c]);
    }
    this._captSpeedMult = 1;
    this.state = "SEC_MARCH"; return null;
  }
  odFormPlatoons(){
    if(this.state !== "SEC_MARCH" || !this._sections)
      return "'Form platoons' is given with the column broken by section (327).";
    this.clearPaths();
    const S = this._sections;
    const D = vec(this.colDir), Rv = vec(this.colDir + Math.PI/2);
    const ADV = Math.max(MARCH_PACES, S.gap + 4);
    const rf = this.menArr().filter(m =>
      (m.rank === "front" || m.rank === "rear") && m.section);
    const finals = new Map();
    const chiefSet = new Set(["capt", "1L", "2L", S.chief4]);
    for(const m of this.men.values()){
      if(chiefSet.has(m.id)) continue;
      const t = m.section;
      const f = (t === 2 || t === 4)
        ? add(add(m.pos, D, ADV + S.gap), Rv, -S.ds[t])
        : add(m.pos, D, ADV);
      finals.set(m.id, f);
      m.setPath([f]);
    }
    // the captain and 1st Lieutenant return before the centres of the
    // re-formed platoons; the left-section chiefs return to their places
    // as file closers (328)
    for(const [id, p] of [["capt", 1], ["1L", 2]]){
      const fr = rf.filter(m => m.platoon === p && m.rank === "front")
        .map(m => finals.get(m.id));
      this.men.get(id).setPath([add(centroid(fr), D, 2)]);
    }
    const anch = finals.get(S.anchorId);
    this.men.get("2L").setPath([[anch[0] + S.off2L[0], anch[1] + S.off2L[1]]]);
    this.men.get(S.chief4).setPath([[anch[0] + S.off4[0], anch[1] + S.off4[1]]]);
    this._sections = null;
    this._captSpeedMult = 1;
    this.state = "COL_MARCH"; return null;
  }
}
