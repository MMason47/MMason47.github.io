<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#efe8d6">
<title>Casey's Infantry Tactics — School of the Company</title>
<style>
  :root{
    --parchment:#f4efe4; --parchment-2:#ece5d3; --paper:#fcfaf3;
    --ink:#26221a; --ink-soft:#5a4a1f; --oxblood:#7a1f1b; --union:#16406e;
    --brass:#b4a27a; --rule:#c9bc9e;
  }
  *{box-sizing:border-box}
  html{height:100%}
  body{height:100vh;height:100dvh;margin:0}
  body{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    background:var(--parchment); color:var(--ink);
    display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:8px 14px; border-bottom:3px double var(--brass);
    background:linear-gradient(180deg,#efe8d6,#e7dfc9);
  }
  header h1{
    font-size:15px; margin:0 10px 0 0; font-variant:small-caps;
    letter-spacing:.12em; color:var(--oxblood); white-space:nowrap;
  }
  header h1 span{color:var(--ink-soft); font-size:12px; letter-spacing:.06em}
  .ctl{display:flex; align-items:center; gap:5px; font-size:12px; color:var(--ink-soft)}
  .ctl input[type=range]{width:90px; accent-color:var(--oxblood)}
  .ctl input[type=number]{width:52px; font-family:inherit; background:var(--paper);
    border:1px solid var(--rule); padding:2px 4px}
  .ctl input[type=checkbox]{accent-color:var(--oxblood)}
  button{
    font-family:inherit; font-size:12px; font-variant:small-caps; letter-spacing:.06em;
    background:var(--oxblood); color:#f6efdd; border:none; padding:5px 12px;
    cursor:pointer; border-radius:2px; touch-action:manipulation;
  }
  button:hover{background:#8f2a24}
  #stateLbl{margin-left:auto; font-size:12px; font-weight:bold; color:var(--union);
    text-align:right; min-width:220px}
  #main{flex:1; display:flex; min-height:0}
  nav#book{
    width:330px; min-width:240px; overflow-y:auto; padding:10px 8px 30px;
    border-right:2px solid var(--brass); background:var(--parchment-2);
    font-size:13px;
  }
  nav#book h2{font-size:12px; font-variant:small-caps; letter-spacing:.1em;
    color:var(--oxblood); margin:2px 4px 8px; border-bottom:1px solid var(--rule);
    padding-bottom:5px}
  details{margin:0 0 2px}
  details>summary{
    cursor:pointer; padding:4px 6px; font-weight:bold; list-style:none;
    color:var(--ink); user-select:none;
  }
  details>summary::before{content:"❧"; color:var(--brass); margin-right:6px; font-weight:normal}
  details[open]>summary::before{color:var(--oxblood)}
  details.lesson>summary{font-variant:small-caps; letter-spacing:.08em}
  details.article{margin-left:14px}
  details.article>summary{font-weight:normal; font-style:italic; font-size:12.5px}
  .cmd{
    display:block; width:calc(100% - 26px); text-align:left; margin:2px 0 2px 26px;
    background:var(--paper); color:var(--ink); border:1px solid var(--rule);
    font-variant:normal; letter-spacing:0; font-size:12px; padding:4px 8px;
    border-radius:2px; font-style:normal;
  }
  .cmd:hover{background:#fff; border-color:var(--oxblood); color:var(--oxblood)}
  .cmd.textonly{color:#8a7f66; font-style:italic}
  .artbtn{background:none;border:none;color:inherit;font:inherit;cursor:pointer;padding:0}
  #field{flex:1; position:relative; min-width:0;
    user-select:none; -webkit-user-select:none}
  #cvWrap{position:relative; width:100%; height:100%;}
  canvas{display:block; width:100%; height:100%; cursor:grab;
    touch-action:none; -webkit-tap-highlight-color:transparent}
  #drawerBtns{display:none; position:absolute; top:8px; left:8px; z-index:40; gap:6px}
  #drawerBtns button{box-shadow:0 1px 4px rgba(0,0,0,.25)}
  canvas.dragging{cursor:grabbing}
  button.cmd:disabled{opacity:.35; cursor:not-allowed; text-decoration:line-through}
  #legend{
    position:absolute; left:10px; bottom:8px; font-size:11px; color:#444;
    background:rgba(252,250,243,.85); border:1px solid var(--rule);
    padding:4px 10px; border-radius:3px; display:flex; gap:12px; align-items:center;
    pointer-events:none;
  }
  #legend .sw{display:inline-block; width:11px; height:11px; border-radius:50%;
    border:1.5px solid #444; vertical-align:-2px; margin-right:4px}
  aside#panel{
    width:360px; min-width:260px; border-left:2px solid var(--brass);
    background:var(--paper); display:flex; flex-direction:column;
  }
  aside#panel h2{
    font-size:13px; margin:0; padding:10px 14px 8px; font-variant:small-caps;
    letter-spacing:.1em; color:var(--oxblood); border-bottom:1px solid var(--rule);
  }
  #ptext{flex:1; overflow-y:auto; padding:12px 16px 30px; font-size:13.5px;
    line-height:1.55; white-space:pre-wrap}
  #ptext .note{display:block; margin-top:14px; font-style:italic; font-size:12.5px;
    color:var(--ink-soft); border-top:1px dotted var(--rule); padding-top:8px}
  #ptext .warn{display:block; margin-top:12px; font-weight:bold; color:var(--oxblood)}
  /* ---- mobile / narrow layout: panels become overlay drawers ---- */
  @media (max-width:900px){
    #main{position:relative}
    #drawerBtns{display:flex}
    nav#book, aside#panel{
      position:absolute; top:0; bottom:0; z-index:30;
      width:min(85vw,340px); min-width:0;
      transition:transform .22s ease; box-shadow:0 0 18px rgba(0,0,0,.3);
    }
    nav#book{left:0; transform:translateX(-105%); border-right-width:1px}
    nav#book.open{transform:none}
    aside#panel{right:0; transform:translateX(105%); border-left-width:1px}
    aside#panel.open{transform:none}
  }
  @media (max-width:700px){
    #legend{display:none}
    header h1 span{display:none}
  }
  /* ---- finger-friendly targets on touch-first devices only ---- */
  @media (pointer:coarse){
    button{padding:10px 14px; font-size:14px}
    .cmd{font-size:14px; padding:10px 10px}
    details>summary{padding:9px 6px}
    nav#book{font-size:14.5px}
    #ptext{font-size:15px; line-height:1.6}
    .ctl input[type=range]{width:120px}
  }
</style>
</head>
<body>
<header>
  <h1>Casey's Infantry Tactics <span>— School of the Company (1862)</span></h1>
  <label class="ctl">Files <input type="number" id="inFiles" min="8" max="48" value="20"></label>
  <label class="ctl"><input type="checkbox" id="inCpl8" checked> 8 corporals</label>
  <label class="ctl"><input type="checkbox" id="in3Lt"> 3rd Lieut.</label>
  <label class="ctl">Speed <input type="range" id="inSpeed" min="1" max="10" step="0.5" value="3"></label>
  <label class="ctl">Zoom <input type="range" id="inZoom" min="0.4" max="2.2" step="0.05" value="1"></label>
  <label class="ctl"><input type="checkbox" id="inFollow" checked> Follow</label>
  <label class="ctl"><input type="checkbox" id="inUnits" checked> Labels</label>
  <label class="ctl"><input type="checkbox" id="inArrows"> Keep arrows</label>
  <button id="btnReset">Reset formation</button>
  <div id="stateLbl"></div>
</header>
<div id="main">
  <nav id="book"><h2>The Drill Book</h2><div id="tree"></div></nav>
  <div id="field">
    <div id="drawerBtns">
      <button id="btnBook">☰ Book</button>
      <button id="btnManual">§ Manual</button>
    </div>
    <canvas id="cv"></canvas>
    <div id="readyBadge" style="position:absolute;top:8px;right:132px;border:1px solid #bbb;border-radius:4px;padding:3px 8px;font:bold 12px sans-serif;pointer-events:none;z-index:10;background:#d9ecd0;color:#2c6b2f;">READY</div>
    <div id="coordDisplay" style="position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.82);border:1px solid #bbb;border-radius:4px;padding:3px 8px;font:12px monospace;pointer-events:none;z-index:10;">x: — , y: —</div>
    <div id="legend">
      <span><span class="sw" style="background:#FFD24D"></span>Captain</span>
      <span><span class="sw" style="background:#FFB84D"></span>Lieut.</span>
      <span><span class="sw" style="background:#F08272"></span>Sergeant</span>
      <span><span class="sw" style="background:#8FD693"></span>Corporal</span>
      <span><span class="sw" style="background:#7FB3E8"></span>Private</span>
      <span>ring: <b style="color:#16406e">blue</b>=1st plt, <b style="color:#7a1f1b">red</b>=2d plt · tick=facing</span>
    </div>
  </div>
  <aside id="panel">
    <h2 id="ptitle">From the manual</h2>
    <div id="ptext"></div>
  </aside>
</div>

<script>
/*MODEL-START*/
"use strict";
// ---------------------------------------------------------------------------
// Casey's Infantry Tactics (1862) -- School of the Company: drill model.
// World units are PACES; screen y grows downward; the company starts facing
// "north" (screen up).  All movement logic lives in CompanyModel (no DOM).
// ---------------------------------------------------------------------------
const UP = -Math.PI / 2;
const FW = 1.0;              // interval between files (stylized)
const RANKD = 1.1;           // front-rank to rear-rank depth
const CLOSERD = RANKD + 2.0; // file closers: two paces behind the rear rank
const OPEN_RANKD = 4.0;      // opened ranks: rear rank 4 paces from front
const ROUTE_RANKD = 2.2;     // route step: rear rank opens to a full pace (313)
const MARCH_PACES = 12;

function vec(h){ return [Math.cos(h), Math.sin(h)]; }
function add(p, v, k){ return [p[0] + v[0]*k, p[1] + v[1]*k]; }
function sub(a, b){ return [a[0]-b[0], a[1]-b[1]]; }
function dot(a, b){ return a[0]*b[0] + a[1]*b[1]; }
function dist(a, b){ return Math.hypot(a[0]-b[0], a[1]-b[1]); }
function rotAbout(p, c, a){
  const rx = p[0]-c[0], ry = p[1]-c[1], ca = Math.cos(a), sa = Math.sin(a);
  return [c[0] + rx*ca - ry*sa, c[1] + rx*sa + ry*ca];
}
function arcPoints(p, c, aTot, steps){
  steps = steps || 24;
  const out = [];
  for(let i = 1; i <= steps; i++) out.push(rotAbout(p, c, aTot*i/steps));
  return out;
}
function samplePath(fn, n){
  n = n || 48;
  const out = [];
  for(let i = 1; i <= n; i++) out.push(fn(i/n));
  return out;
}
function centroid(pts){
  let x = 0, y = 0;
  for(const p of pts){ x += p[0]; y += p[1]; }
  return [x/pts.length, y/pts.length];
}

class Man{
  constructor(id, label, role, platoon, section, rank, desc){
    this.id = id; this.label = label; this.role = role;
    this.platoon = platoon; this.section = section; this.rank = rank;
    this.desc = desc;
    this.pos = [0,0]; this.facing = UP;
    this.path = null; this.cum = null; this.length = 0; this.timed = false;
    this.fileI = null;
  }
  setTimedPath(pts){
    this.path = [this.pos].concat(pts);
    this.timed = true;
    this.length = 0;
    for(let i = 1; i < this.path.length; i++)
      this.length += dist(this.path[i-1], this.path[i]);
    if(this.length < 1e-9){ this.path = null; this.timed = false; }
  }
  setPath(pts){
    this.timed = false;
    const all = [this.pos].concat(pts);
    const clean = [all[0]];
    for(let i = 1; i < all.length; i++)
      if(dist(all[i], clean[clean.length-1]) > 1e-9) clean.push(all[i]);
    if(clean.length === 1){ this.path = null; this.length = 0; return; }
    this.path = clean;
    this.cum = [0];
    for(let i = 1; i < clean.length; i++)
      this.cum.push(this.cum[i-1] + dist(clean[i-1], clean[i]));
    this.length = this.cum[this.cum.length-1];
  }
  pointAtFraction(f){
    if(!this.path) return this.pos;
    f = Math.max(0, Math.min(1, f));
    if(this.timed){
      const x = f * (this.path.length - 1);
      const i = Math.min(Math.floor(x), this.path.length - 2);
      const t = x - i, a = this.path[i], b = this.path[i+1];
      return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t];
    }
    const d = this.length * f;
    for(let i = 1; i < this.path.length; i++){
      if(d <= this.cum[i] || i === this.path.length - 1){
        const seg = this.cum[i] - this.cum[i-1];
        const t = seg <= 1e-12 ? 0 : (d - this.cum[i-1]) / seg;
        const a = this.path[i-1], b = this.path[i];
        return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t];
      }
    }
    return this.path[this.path.length-1];
  }
}

class CompanyModel{
  constructor(nFiles, corporals8, incl3Lt){ this.build(nFiles, corporals8, incl3Lt); }

  build(nFiles, corporals8, incl3Lt){
    const n = Math.max(8, Math.floor(nFiles || 20));
    corporals8 = corporals8 !== false;
    let n1 = Math.floor(n/2);
    if(n1 % 2) n1 += 1;
    n1 = Math.min(n1, n - 2);
    const n2 = n - n1, s1 = Math.floor(n1/2), s3 = Math.ceil(n2/2);
    this.nFiles = n; this.n1 = n1; this.n2 = n2; this.s1 = s1; this.s3 = s3;
    this.heading = UP; this.colDir = UP; this.state = "LINE_HALT";
    this.men = new Map(); this.order = [];
    // Lesson VI, Art. 2: stack of file-pairs broken to the rear
    // (oldest first, newest last), and the flank they broke from.
    this.brokenPairs = []; this._breakSide = null;
    // Lesson VI, Art. 3: route-step disorder seed and section bookkeeping
    this._routeTick = 0; this._sections = null; this._flankHybrid = false;
    const sectionOf = i => i < s1 ? 1 : i < n1 ? 2 : i < n1 + s3 ? 3 : 4;
    const fx = i => -i * FW;
    const put = (m, x, y) => { m.pos = [x, y]; this.men.set(m.id, m); this.order.push(m.id); };

    put(new Man("capt","C","captain",1,null,"front",
      "Captain — posted on the right of the company, in the front rank, "+
      "touching elbows with the man on his left (Title First, par. 13)."), FW, 0);
    put(new Man("1S","1S","sergeant",1,null,"cover",
      "First Sergeant — 'covering sergeant' or right guide; rear rank, "+
      "covering the captain (Title First, par. 14)."), FW, RANKD);

    // Par. 15: ALL corporals are posted in the FRONT rank, on the right and
    // left of platoons, according to height — two at each platoon flank when
    // eight are present, numbered from the tallest (C-1, first file, right
    // of the company) to the shortest (last file, left of the company).
    // Each corporal is covered by a private in the rear rank.
    const cplFront = [...new Set(corporals8
      ? [0, 1, n1-2, n1-1, n1, n1+1, n-2, n-1]
      : [0, n1-1, n1, n-1])];
    const cplFiles = new Map();
    let k = 1;
    for(const i of cplFront){
      cplFiles.set(i, { front: k++ });
    }

    let pvt = 1;
    for(let i = 0; i < n; i++){
      const plt = i < n1 ? 1 : 2, sec = sectionOf(i);
      for(const [rank, y] of [["front",0],["rear",RANKD]]){
        const c = cplFiles.has(i) ? cplFiles.get(i)[rank] : null;
        if(c){
          put(new Man("C-"+c, "C-"+c, "corporal", plt, sec, rank,
            "Corporal "+c+" — posted in the front rank on the flank of the "+
            (plt===1?"1st":"2d")+" platoon, according to height (par. 15)."), fx(i), y);
        }else{
          put(new Man("P-"+pvt, ""+pvt, "private", plt, sec, rank,
            "Private No. "+pvt+" — "+rank+" rank, file "+(i+1)+", "+
            (plt===1?"1st":"2d")+" Platoon, Section "+sec+"."), fx(i), y);
          pvt++;
        }
      }
    }
    this.nPrivates = pvt - 1;

    const center = files => -(files.reduce((a,b)=>a+b,0)/files.length) * FW;
    const range = (a,b) => { const r=[]; for(let i=a;i<b;i++) r.push(i); return r; };
    const plt1Files = range(0, n1), plt2Files = range(n1, n);

    put(new Man("1L","1L","lieutenant",2,null,"closer",
      "First Lieutenant — file closer, opposite the centre of the 4th section "+
      "(Title First, par. 16). Chief of the 2d platoon when the company breaks "+
      "into platoons."), fx(this.lt1Fi()), CLOSERD);
    put(new Man("2L","2L","lieutenant",1,null,"closer",
      "Second Lieutenant — file closer, opposite the centre of the 1st platoon "+
      "(Title First, par. 17)."), center(plt1Files), CLOSERD);
    if(incl3Lt)
      put(new Man("3L","3L","lieutenant",2,null,"closer",
        "Third Lieutenant — file closer, opposite the centre of the 2d platoon "+
        "(Title First, par. 18)."), center(plt2Files), CLOSERD);
    put(new Man("2S","2S","sergeant",2,null,"closer",
      "Second Sergeant — left guide of the company; file closer opposite the "+
      "second file from the left (Title First, par. 19)."), fx(n-2), CLOSERD);
    put(new Man("3S","3S","sergeant",2,null,"closer",
      "Third Sergeant — file closer opposite the second file from the right of "+
      "the 2d platoon (Title First, par. 20)."), fx(n1+1), CLOSERD);
    put(new Man("4S","4S","sergeant",1,null,"closer",
      "Fourth Sergeant — file closer opposite the second file from the left of "+
      "the 1st platoon (Title First, par. 21)."), fx(n1-2), CLOSERD);
    put(new Man("5S","5S","sergeant",1,null,"closer",
      "Fifth Sergeant — file closer opposite the second file from the right of "+
      "the 1st platoon (Title First, par. 22)."), fx(1), CLOSERD);

    for(const m of this.men.values()){ m.facing = UP; m.path = null; }
  }

  F(){ return vec(this.heading); }
  menArr(){ return Array.from(this.men.values()); }
  // 1st Lieutenant's file-closer post: opposite the centre of the 4th
  // section (Title First, par. 16). At company sizes where that centre
  // falls exactly on the 2d Sergeant's post (opposite the second file
  // from the left, par. 19 — happens at 12-15 files), the lieutenant
  // takes post one file to the right so the two do not share a spot.
  lt1Fi(){
    const fi = (this.n1 + this.s3 + this.nFiles - 1)/2;
    return Math.abs(fi - (this.nFiles - 2)) < 0.5 ? fi - 1 : fi;
  }
  // How far (in files, toward the company's right) the post above is
  // shifted off the exact centre of the 4th section: 0 normally, 1 when
  // avoiding the 2d Sergeant. Used by the centroid-based post computations.
  lt1Shift(){ return (this.n1 + this.s3 + this.nFiles - 1)/2 - this.lt1Fi(); }
  extremeFrontMan(platoon, dir){
    let best = null, bestD = -Infinity;
    for(const m of this.men.values())
      if(m.platoon === platoon && m.rank === "front"){
        const d = dot(m.pos, dir);
        if(d > bestD){ bestD = d; best = m; }
      }
    return best;
  }
  platoonMembers(p){ return this.menArr().filter(m => m.platoon === p); }
  faceAll(a, members){ for(const m of (members || this.menArr())) m.facing = a; }
  clearPaths(){ for(const m of this.men.values()){ m.path = null; m.length = 0; } }
  finish(){
    for(const m of this.men.values())
      if(m.path){ m.pos = m.path[m.path.length-1]; m.path = null; }
    this._captSpeedMult = 1;
  }
  lineOrigin(){
    const R = vec(this.heading + Math.PI/2);
    let best = null, bestD = -Infinity;
    for(const m of this.men.values())
      if(m.rank === "front" && m.id !== "capt"){
        const d = dot(m.pos, R);
        if(d > bestD){ bestD = d; best = m; }
      }
    return best.pos;
  }

  // ---------------- Lesson I: open / close ranks ----------------
  odOpenPrep(){
    if(this.state !== "LINE_HALT")
      return "The ranks can only be opened from the halted line of battle.";
    this.clearPaths();
    const g = this.men.get("2S");
    const L = vec(this.heading - Math.PI/2);
    const lm = this.extremeFrontMan(2, L);
    g.setPath([add(lm.pos, L, FW)]);
    this.state = "OPEN_PREP"; return null;
  }
  odOpenOrder(){
    if(this.state !== "OPEN_PREP")
      return "First have the left guide (2S) posted on the left of the front rank (previous command).";
    this.clearPaths();
    const B = vec(this.heading + Math.PI);
    this.men.get("1S").setPath([add(this.men.get("1S").pos, B, OPEN_RANKD - RANKD)]);
    this.men.get("2S").setPath([add(this.men.get("2S").pos, B, OPEN_RANKD)]);
    this.state = "OPEN_MARKED"; return null;
  }
  odOpenMarch(){
    if(this.state !== "OPEN_MARKED")
      return "'MARCH' here follows 'To the rear, open order' (previous command).";
    this.clearPaths();
    const B = vec(this.heading + Math.PI);
    for(const m of this.men.values()){
      if(m.id === "2S") continue;
      if(m.rank === "rear") m.setPath([add(m.pos, B, OPEN_RANKD - RANKD)]);
      else if(m.rank === "closer") m.setPath([add(m.pos, B, (OPEN_RANKD + 2) - CLOSERD)]);
    }
    this.state = "OPEN_RANKS"; return null;
  }
  odOpenFront(){
    if(this.state !== "OPEN_RANKS")
      return "'FRONT' here follows the MARCH that opened the ranks.";
    this.clearPaths();
    const g = this.men.get("2S");
    const B = vec(this.heading + Math.PI), L = vec(this.heading - Math.PI/2);
    const base = this.lineOrigin();
    let p = add(base, L, (this.nFiles - 2) * FW);
    p = add(p, B, OPEN_RANKD + 2);
    g.setPath([p]);
    this.state = "OPEN_DONE"; return null;
  }
  odCloseOrder(){
    if(this.state !== "OPEN_RANKS" && this.state !== "OPEN_DONE")
      return "The ranks are not open.";
    this.clearPaths();
    const F = this.F();
    for(const m of this.men.values()){
      if(m.rank === "rear" || m.rank === "cover")
        m.setPath([add(m.pos, F, OPEN_RANKD - RANKD)]);
      else if(m.rank === "closer" || m.id === "2S")
        m.setPath([add(m.pos, F, (OPEN_RANKD + 2) - CLOSERD)]);
    }
    this.state = "LINE_HALT"; return null;
  }

  // ---------------- Lesson III: line of battle ----------------
  // Note: the "six paces in front" posting of the covering sergeant is a
  // TRAINING device only (S.C. par. 104).  In the field the 1S stays in the
  // rear rank covering the captain throughout the advance.
  odCompanyForward(){
    if(this.state !== "LINE_HALT")
      return "'Company, forward' is given with the company halted, in line of "+
             "battle, ranks closed.  (Use Reset, or halt and re-form the line first.)";
    this.clearPaths();
    // 1S stays in the rear rank — no path needed
    this.state = "LINE_MARCH"; return null;
  }
  odLineMarch(){
    if(this.state === "ROUTE_MARCH"){
      // continue in the route step: the men keep no fixed dress — each
      // marches at ease, so the small disorder is re-drawn every move (313)
      this.clearPaths();
      const F = this.F(), Rv = vec(this.heading + Math.PI/2);
      const old = new Map();
      for(const m of this.men.values()) old.set(m.id, this._routeJitVec(m, F, Rv));
      this._routeTick++;
      for(const m of this.men.values()){
        const jo = old.get(m.id), jn = this._routeJitVec(m, F, Rv);
        m.setPath([[m.pos[0] - jo[0] + jn[0] + F[0]*MARCH_PACES,
                    m.pos[1] - jo[1] + jn[1] + F[1]*MARCH_PACES]]);
      }
      return null;
    }
    if(this.state !== "LINE_MARCH" && this.state !== "FILES_MARCH")
      return "'MARCH' here follows 'Company, forward.'";
    this.clearPaths();
    const F = this.F();
    for(const m of this.men.values()) m.setPath([add(m.pos, F, MARCH_PACES)]);
    // state unchanged: files broken to the rear (Lesson VI, Art. 2) march on
    // with the company, preserving their distances (295).
    return null;
  }
  odLineHalt(){
    if(this.state === "ROUTE_MARCH"){
      // 341: at the command halt the rear rank closes up (and the whole
      // shoulders arms); the men re-take their dress.
      this.clearPaths();
      const F = this.F(), Rv = vec(this.heading + Math.PI/2);
      const opens = m => m.rank === "rear" || m.rank === "cover" || m.rank === "closer";
      for(const m of this.men.values()){
        const j = this._routeJitVec(m, F, Rv);
        const a = opens(m) ? (ROUTE_RANKD - RANKD) : 0;
        const tgt = [m.pos[0] - j[0] + F[0]*a, m.pos[1] - j[1] + F[1]*a];
        if(dist(m.pos, tgt) > 1e-9) m.setPath([tgt]);
      }
      this.state = "LINE_HALT"; return null;
    }
    if(this.state !== "LINE_MARCH" && this.state !== "OBLIQUE_MARCH")
      return "The company is not marching in line of battle.";
    this.clearPaths();
    // Halting from the oblique: the men face to the front and the rear rank
    // steps back into habitual cover behind their own file leaders, restoring
    // the original formation.
    if(this.state === "OBLIQUE_MARCH"){
      const F = this.F();
      if(this._oblPairs)
        for(const [rid, lid] of this._oblPairs){
          const rman = this.men.get(rid);
          const tgt = add(this.men.get(lid).pos, F, -RANKD);
          if(dist(rman.pos, tgt) > 1e-9) rman.setPath([tgt]);
        }
      this._oblPairs = null;
      this.faceAll(this.heading);
    }
    this.state = "LINE_HALT"; return null;
  }

  // ---- Lesson III, Art. 3: the oblique march in line of battle (101-108) --
  _buildObliquePairs(){
    // Pair every rear-rank man with his habitual file leader by geometry:
    // at the moment the oblique begins the rear rank is in exact cover, so
    // the leader is the front-rank man at the same lateral position. The
    // pairing is remembered for the duration of the oblique, because the
    // echelon then shifts the rear rank one file sideways (par. 102).
    const Rv = vec(this.heading + Math.PI/2);
    const fronts = [];
    for(const x of this.men.values())
      if(x.rank === "front") fronts.push(x);
    const pairs = new Map();
    for(const m of this.men.values()){
      if(m.rank === "rear"){
        let best = null, bd = Infinity;
        for(const x of fronts){
          const d = Math.abs(dot(m.pos, Rv) - dot(x.pos, Rv));
          if(d < bd){ bd = d; best = x; }
        }
        if(best && bd < 0.3) pairs.set(m.id, best.id);
      }
    }
    // 1S echelons with the captain as leader, but only when he actually
    // stands at his habitual cover — after some evolutions (e.g. forming
    // line from the flank) he serves as a flank guide and simply obliques.
    const capt = this.men.get("capt"), s1 = this.men.get("1S");
    if(dist(s1.pos, add(capt.pos, this.F(), -RANKD)) < 0.5)
      pairs.set("1S", "capt");
    this._oblPairs = pairs;
  }
  odOblique(right){
    if(this.state !== "LINE_MARCH" && this.state !== "LINE_HALT" &&
       this.state !== "OBLIQUE_MARCH")
      return "'Right (left) oblique--MARCH' is given with the company in "+
             "line of battle, marching or at a halt (par. 101).";
    this.clearPaths();
    if(this.state !== "OBLIQUE_MARCH") this._buildObliquePairs();
    const side = vec(this.heading + (right ? 1 : -1) * Math.PI/2);
    const obl  = vec(this.heading + (right ? 1 : -1) * Math.PI/4);
    for(const m of this.men.values()){
      const leaderId = this._oblPairs.get(m.id);
      if(leaderId){
        // echelon: in rear (along the oblique) of the leader's side neighbor
        const leaderFinal = add(this.men.get(leaderId).pos, obl, MARCH_PACES);
        m.setPath([add(add(leaderFinal, side, FW), obl, -RANKD)]);
      } else {
        m.setPath([add(m.pos, obl, MARCH_PACES)]);
      }
    }
    // The men half-face toward the oblique (S.S. 340); the guide passes,
    // without indication, to the side toward which the oblique is made (105).
    this.faceAll(this.heading + (right ? 1 : -1) * Math.PI/4);
    this._oblRight = right;
    this.state = "OBLIQUE_MARCH"; return null;
  }
  odObliqueForward(){
    if(this.state !== "OBLIQUE_MARCH")
      return "'Forward--MARCH' here resumes the direct march from the "+
             "oblique (par. 103).";
    this.clearPaths();
    const F = this.F();
    for(const m of this.men.values()){
      const leaderId = this._oblPairs.get(m.id);
      if(leaderId){
        // resume habitual cover: directly behind the own file leader (104)
        const leaderFinal = add(this.men.get(leaderId).pos, F, MARCH_PACES);
        m.setPath([add(leaderFinal, F, -RANKD)]);
      } else {
        m.setPath([add(m.pos, F, MARCH_PACES)]);
      }
    }
    this._oblPairs = null;
    this.faceAll(this.heading);
    this.state = "LINE_MARCH"; return null;
  }

  // ---------------- Lesson IV: march by the flank ----------------
  // Shared logic for both right-face and left-face.
  // RIGHT-FACE (par. 131-132): captain steps one pace forward then turns right;
  //   1S steps forward into captain's vacated spot then turns right — so 1S
  //   stands at the head of the front rank (directly ahead of C-1 / right flank).
  //   Captain is on 1S's LEFT (one file to his left in march direction).
  // LEFT-FACE (par. 143): mirror image — left guide (1S, or when designated the
  //   left-flank NCO) steps to head of front rank on the left end; captain passes
  //   rapidly to the right side of that guide.
  _odFlankFace(toRight){
    if(this.state !== "LINE_HALT")
      return "'Company, " + (toRight ? "right" : "left") + "--FACE' is given from the halted line of battle.";
    this.clearPaths();
    this._captSpeedMult = 1;
    const turn = toRight ? Math.PI/2 : -Math.PI/2;
    const D = this.heading + turn;           // new march direction
    const Dv = vec(D);                       // forward in new direction
    const Rv = vec(D + Math.PI/2);           // rightward in new direction

    // Captain's and 1S's pre-face positions, stored for FRONT reversal
    const captOrigPos = this.men.get("capt").pos.slice();
    const sgOrigPos   = this.men.get("1S").pos.slice();
    this._flankCaptOrigin = captOrigPos;
    this._sgOrigin        = sgOrigPos;
    this._flankRight      = toRight;
    this._flankHybrid     = false;

    // Rank-and-file (excludes capt and 1S, handled separately)
    const rankAndFile = this.menArr().filter(m =>
      (m.rank === "front" || m.rank === "rear") && m.id !== "capt" && m.id !== "1S");
    const frontRankOnly = rankAndFile.filter(m => m.rank === "front");

    if(toRight){
      // ---- RIGHT FACE ----
      // Pivot = C-1 (rightmost front-rank man, which is captOrigPos after capt steps out).
      // 1S steps forward into captain's vacated front-rank spot → head of column (captOrigPos).
      // Captain stands one pace to the LEFT of 1S in the march direction.
      // File closers shift to the RIGHT (outer) flank.
      const O = captOrigPos;  // pivot = capt's old spot = rightmost front-rank position

      this.men.get("1S").setPath([O.slice()]);
      this.men.get("1S").fileI = null;
      this.men.get("capt").setPath([add(O, Rv, -FW)]);
      this.men.get("capt").fileI = null;

      // Rank-and-file double rightward.
      // Origin for doubling = rightmost front-rank man in the rank-and-file (C-1 at [0,0]).
      // i=0 is C-1 (rightmost), increases leftward. Same as original code.
      let rfOrigin = rankAndFile.filter(m => m.rank === "front")[0];
      for(const m of rankAndFile.filter(m => m.rank === "front"))
        if(dot(m.pos, Dv) > dot(rfOrigin.pos, Dv)) rfOrigin = m;
      const Or = rfOrigin.pos;  // C-1's position
      for(const m of rankAndFile){
        const i = Math.round(-dot(sub(m.pos, Or), Dv) / FW);
        m.fileI = i;
        const k = Math.floor(i/2);
        const lane = m.rank === "front" ? (i%2===0 ? 0 : 1) : (i%2===0 ? 2 : 3);
        m.setPath([add(add(Or, Dv, -2*k*FW), Rv, lane*FW)]);
      }
      // File closers shift to right (outer) flank
      for(const m of this.menArr()){
        if(m.rank !== "closer") continue;
        m.fileI = null;
        const lat = dot(sub(m.pos, Or), Rv);
        m.setPath([add(m.pos, Rv, 4.2*FW - lat)]);
      }

    } else {
      // ---- LEFT FACE ----
      // Pivot = C-4 (leftmost front-rank man). He does NOT move, only faces left.
      // 1S steps into captain's vacated front-rank spot (tail of column, in line with rank-and-file).
      // 2S leaves file closers → moves to the head of the column, in front of P-32 (lane 3).
      // Captain goes around the left of the column → head, one pace to the RIGHT of 2S.
      // File closers (except 2S) stay in place — just face left.

      // Find pivot (leftmost front-rank man = C-4)
      let pivotMan = frontRankOnly[0];
      for(const m of frontRankOnly)
        if(dot(m.pos, Dv) > dot(pivotMan.pos, Dv)) pivotMan = m;
      this._flankPivotId = pivotMan.id;
      const Ol = pivotMan.pos;  // C-4's position — never moves

      // 1S only faces left in place — no path (faceAll handles the turn below)
      this.men.get("1S").fileI = null;

      // Rank-and-file double leftward into column of fours.
      // Lane direction = vec(D - π/2) = [0,+1] = old backward = C-4's LEFT when facing left.
      // (Rv = vec(D + π/2) = [0,-1] = old forward = C-4's RIGHT — we must NOT use that here.)
      const Ld = vec(D - Math.PI/2);  // [0,+1]: lane direction = C-4's left when facing left
      // fileI counts from the RIGHT (C-1=0, C-4=n-1), same convention as right-face,
      // so odFlankHaltFront can use the identical rebuild formula for both faces.
      let rfOriginL = rankAndFile.filter(m => m.rank === "front")[0];
      for(const m of rankAndFile.filter(m => m.rank === "front"))
        if(dot(m.pos, Dv) < dot(rfOriginL.pos, Dv)) rfOriginL = m;  // find C-1 (rightmost)
      const n_files = this.nFiles;
      for(const m of rankAndFile){
        const i = Math.round(dot(sub(m.pos, rfOriginL.pos), Dv) / FW);
        m.fileI = i;  // 0=C-1(rightmost/tail), n-1=C-4(leftmost/lead)
        // k = group index from the LEFT (leading end): C-4 group is k=0, trailing group is k=max
        const k = Math.floor((n_files - 1 - i) / 2);
        // Within each group, C-4-side file (larger i = more leftward) gets lane 0 or 2;
        // the adjacent file (smaller i) gets lane 1 or 3.
        const laneParity = (n_files - 1 - i) % 2;
        const lane = m.rank === "front" ? laneParity : laneParity + 2;
        m.setPath([add(add(Ol, Dv, -2*k*FW), Ld, lane*FW)]);
      }

      // 2S: moves from file closers to head of column, directly in front of C-4 (lane 0).
      const sg2s = this.men.get("2S");
      const headOf2S = add(Ol, Dv, FW);   // one pace forward of C-4, same lane (y=0)
      sg2s.setPath([headOf2S]);
      sg2s.fileI = null;

      // Captain: routes in FRONT of the company to the head of the column.
      // Path: step 2 paces forward (clear of front rank), traverse left past C-4, arrive at spot.
      // Right when facing left = -Ld = old forward = [0,-1].
      const captFinalPos = add(headOf2S, Ld, -FW);
      const Fv2 = vec(this.heading);           // old forward direction
      const captWp1 = add(captOrigPos, Fv2, 2);       // 2 paces forward, clear of front rank
      const captWp2 = [Ol[0] - 2*FW, captWp1[1]];    // traverse left past C-4 (same y)
      this.men.get("capt").setPath([captWp1, captWp2, captFinalPos]);
      this.men.get("capt").fileI = null;
      this._captSpeedMult = 1.5;
      // Store waypoints so FRONT can retrace the path in reverse
      this._captLeftWaypoints = [captWp1, captWp2];

      // File closers (except 2S): step 2 paces backward (old-backward = Ld direction)
      // to clear the rank-and-file as they double, then face left via faceAll below.
      const Bv = vec(this.heading + Math.PI);  // old backward direction
      for(const m of this.menArr()){
        if(m.rank !== "closer" || m.id === "2S") continue;
        m.fileI = null;
        m.setPath([add(m.pos, Bv, 2)]);
      }
    }

    this.colDir = D;
    this.faceAll(D);
    this._perManAnim = !toRight;  // left-face uses per-man independent timing
    this.state = "FLANK_FACED"; return null;
  }
  odRightFace(){ return this._odFlankFace(true); }
  odLeftFace(){  return this._odFlankFace(false); }
  odFlankMarch(){
    if(this.state !== "FLANK_FACED" && this.state !== "FLANK_MARCH" &&
       this.state !== "FLANK_2" && this.state !== "FLANK_1")
      return "'Forward--MARCH' here follows 'Company, right (or left)--FACE.'";
    this.clearPaths();
    this._captSpeedMult = 1;
    const D = vec(this.colDir);
    for(const m of this.men.values()) m.setPath([add(m.pos, D, MARCH_PACES)]);
    if(this.state === "FLANK_FACED") this.state = "FLANK_MARCH";
    return null;
  }
  odByFile(left){
    if(this.state !== "FLANK_MARCH" && this.state !== "FLANK_FACED")
      return "'By file left (right)--MARCH' is executed while the company is "+
             "marching by the flank.";
    this.clearPaths();
    this._captSpeedMult = 1;
    const D = vec(this.colDir), Rv = vec(this.colDir + Math.PI/2);
    const turn = left ? -Math.PI/2 : Math.PI/2;
    const nd = this.colDir + turn, NDv = vec(nd);
    const men = this.menArr();
    let head = men[0];
    for(const m of men) if(dot(m.pos, D) > dot(head.pos, D)) head = m;
    const H = head.pos;
    const aM = new Map(), sM = new Map();
    for(const m of men){
      aM.set(m.id, dot(sub(m.pos, H), D));
      sM.set(m.id, dot(sub(m.pos, H), Rv));
    }
    const isCloser = m => m.fileI === null && m.id !== "capt" && m.id !== "1S";
    const lanes = men.map(m => sM.get(m.id));
    const sInner = left ? Math.min(...lanes) : Math.max(...lanes);
    const PR = 2.0;                              // pivot-arc radius
    const sC = left ? sInner - PR : sInner + PR;
    const LEAD = 2.0;                            // wheeling ground ahead of the head
    const Cc = add(add(H, D, LEAD), Rv, sC);
    const depth = Math.max(...men.map(m => -aM.get(m.id)));
    const E = depth + 2.0;
    // common angular window sized on the rank-and-file outer radius
    let Rstar = 1;
    for(const m of men)
      if(!isCloser(m)) Rstar = Math.max(Rstar, Math.abs(sM.get(m.id) - sC));
    const Tstar = LEAD + E + Rstar * Math.PI/2;
    for(const m of men){
      const a = aM.get(m.id), s = sM.get(m.id);
      const d1 = LEAD - a, e = E + a;
      const t1 = d1 / Tstar, t2 = (d1 + Rstar * Math.PI/2) / Tstar;
      const arcStart = add(add(H, D, LEAD), Rv, s);
      const arcEnd = rotAbout(arcStart, Cc, turn);
      const p0 = m.pos.slice();
      const fn = t => {
        if(t <= t1) return add(p0, D, d1 * (t1 <= 0 ? 1 : t/t1));
        if(t <= t2) return rotAbout(arcStart, Cc, turn * (t - t1)/(t2 - t1));
        return add(arcEnd, NDv, e * (t - t2)/(1 - t2));
      };
      m.setTimedPath(samplePath(fn, 60));
    }
    this.colDir = nd;
    this.faceAll(nd);
    this.state = "FLANK_MARCH"; return null;
  }
  odFlankHaltFront(){
    if(this.state !== "FLANK_MARCH" && this.state !== "FLANK_FACED")
      return "The company is not marching by the flank.";
    this.clearPaths();
    const wasRight = (this._flankRight !== false);
    this.heading = wasRight ? this.colDir - Math.PI/2 : this.colDir + Math.PI/2;
    const B = vec(this.heading + Math.PI), Lv = vec(this.heading - Math.PI/2);
    const n = this.nFiles, n1 = this.n1, s3 = this.s3;

    // Determine anchor O = the rightmost front-rank position (C-1's spot).
    // RIGHT FACE: 1S is at C-1's position + one pace right (he stepped into capt's spot).
    //   O = add(1S.pos, Lv, FW) shifts one pace left → lands on C-1. ✓
    // LEFT FACE: C-4 (pivot) never moved. fileI=0 is C-4, fileI=n-1 is C-1.
    //   O = add(C-4.pos, Lv, -(n-1)*FW) shifts rightward by (n-1) paces → lands on C-1. ✓
    let O;
    if(wasRight){
      O = add(this.men.get("1S").pos, Lv, FW);
    } else {
      const pivot = this.men.get(this._flankPivotId);  // C-4, never moved
      O = add(pivot.pos, Lv, -(n-1)*FW);
    }

    // Captain returns to right of front rank; 1S returns to rear rank behind capt.
    const captPos = add(O, Lv, -FW);
    const sgPos   = add(captPos, B, RANKD);
    if(!wasRight){
      const capt = this.men.get("capt");
      const F = vec(this.heading);
      const returnWp1 = add(capt.pos, F, 2);
      const returnWp2 = add(captPos, F, 2);
      capt.setPath([returnWp1, returnWp2, captPos]);
      this._captSpeedMult = 1.5;
    } else {
      this.men.get("capt").setPath([captPos]);
      this._captSpeedMult = 1;
    }
    this.men.get("1S").setPath([sgPos]);

    // Re-form rank-and-file (fileI set at face-time; same formula for both faces).
    for(const m of this.men.values()){
      if((m.rank === "front" || m.rank === "rear") && m.fileI !== null){
        let p = add(O, Lv, m.fileI * FW);
        if(m.rank === "rear") p = add(p, B, RANKD);
        m.setPath([p]);
      }
    }

    // File closers return to their posts (same formula for both faces).
    // For left-face this also returns 2S from the head of the column.
    const post = fi => add(add(O, Lv, fi*FW), B, CLOSERD);
    const posts = {
      "1L": post(this.lt1Fi()), "2L": post((n1 - 1)/2),
      "2S": post(n - 2), "3S": post(n1 + 1), "4S": post(n1 - 2), "5S": post(1)
    };
    if(this.men.has("3L")) posts["3L"] = post((n1 + n - 1)/2);
    for(const id in posts) this.men.get(id).setPath([posts[id]]);
    this.faceAll(this.heading);
    this._perManAnim = !wasRight;  // left-face FRONT also uses per-man timing
    this.state = "LINE_HALT"; return null;
  }

  // ---- Lesson IV, Art. 4: the company marching by the flank, to form it
  // ---- on the right (or left) by file into line of battle (150-152) ------
  odFileIntoLine(onRight){
    if(this.state !== "FLANK_MARCH" && this.state !== "FLANK_FACED")
      return "'On the right (left), by file into line' is given while the "+
             "company is marching by the flank.";
    if(onRight && this._flankRight === false)
      return "'On the RIGHT, by file into line' requires the company to be "+
             "marching by the RIGHT flank (after 'Company, right--FACE').";
    if(!onRight && this._flankRight !== false)
      return "'On the LEFT, by file into line' requires the company to be "+
             "marching by the LEFT flank (after 'Company, left--FACE').";
    this.clearPaths();
    this._captSpeedMult = 1;
    const sign = onRight ? 1 : -1;
    const D  = vec(this.colDir);                    // column march direction
    const Sv = vec(this.colDir + sign*Math.PI/2);   // toward the line = new fwd
    const h  = this.colDir + sign*Math.PI/2;        // new line-of-battle heading
    const capt = this.men.get("capt");
    const sg   = this.men.get(onRight ? "1S" : "2S");   // head guide
    const aOf = p => dot(p, D), sOf = p => dot(p, Sv);
    const n = this.nFiles, n1 = this.n1, s3 = this.s3;

    // The line of battle lies 6 paces beyond the rank of file closers (151).
    let sClosers = -Infinity;
    for(const m of this.men.values())
      if(m.rank === "closer") sClosers = Math.max(sClosers, sOf(m.pos));
    const sLine = sClosers + 6;

    // Captain: turns toward the line and marches straight forward; he anchors
    // the alignment (on the right of the line for the right variant, on the
    // LEFT for the left variant, par. 152). The head guide halts behind him.
    const captFinal = add(capt.pos, Sv, sLine - sOf(capt.pos));
    const captA = aOf(captFinal);
    const sgFinal = add(captFinal, Sv, -RANKD);

    // Choreography jobs: sequences of {wait: w} (mark time for the time of
    // marching w paces) or {pts: [...]} (march waypoints at the common pace).
    const jobs = [];
    const segLen = pts => { let L = 0;
      for(let k = 1; k < pts.length; k++) L += dist(pts[k-1], pts[k]);
      return L; };
    const mkJob = (m, segs) => {
      let L = 0;
      for(const s of segs) L += (s.wait !== undefined) ? s.wait : segLen(s.pts);
      jobs.push({ m: m, segs: segs, L: L });
      return L;
    };
    mkJob(capt, [{pts: [capt.pos.slice(), captFinal]}]);
    mkJob(sg,   [{pts: [sg.pos.slice(),   sgFinal]}]);

    const ARC = FW * Math.PI/2;            // quarter-wheel arc length
    const XOVER = Math.hypot(FW, 2);       // crossover diagonal length
    const arcPts = C => {                  // arcing man's quarter-wheel around C
      const out = [];
      for(let j = 1; j <= 8; j++)
        out.push(add(C,
          vec(this.colDir - sign*Math.PI/2 + sign*(Math.PI/2)*(j/8)), FW));
      return out;
    };

    // Pair the rank-and-file by doubled group, counted from the HEAD of the
    // column. Within each pair the man nearer the line pivots in place and
    // shortens step at the end; his comrade wheels around him and precedes
    // onto the line (odd numbers on the right flank, even on the left — 152).
    const groups = { front: new Map(), rear: new Map() };
    for(const m of this.men.values())
      if((m.rank === "front" || m.rank === "rear") && m.fileI !== null){
        const k = onRight ? Math.floor(m.fileI / 2)
                          : Math.floor((n - 1 - m.fileI) / 2);
        if(!groups[m.rank].has(k)) groups[m.rank].set(k, []);
        groups[m.rank].get(k).push(m);
      }

    const frontFinish = [], rearTravel = [], rearJobIdx = [];
    for(const r of ["front", "rear"]){
      const lineS = (r === "front") ? sLine : sLine - RANKD;
      const ks = [...groups[r].keys()].sort((a,b)=>a-b);
      for(const k of ks){
        const pair = groups[r].get(k);
        const aNear = captA + (2*k + 1) * FW;
        if(pair.length === 2){
          // Pivot = the member nearer the line; arcer wheels around him.
          let P = pair[0], A = pair[1];
          if(sOf(A.pos) > sOf(P.pos)){ const t = P; P = A; A = t; }
          const pP0 = P.pos.slice(), pA0 = A.pos.slice();
          const sP = sOf(pP0);
          const C = add(pP0, D, aNear - aOf(pP0));         // wheel centre
          const aWheelStart = add(pA0, D, aNear - aOf(pA0));
          const aDescStart  = add(C, D, FW);               // far track
          const aDescEnd    = add(aDescStart, Sv, (lineS - 2) - sP);
          const aFinal      = add(add(aDescEnd, D, -FW), Sv, 2); // near slot
          const pDescEnd    = add(C, Sv, (lineS - 2) - sP);
          const pFinal      = add(add(pDescEnd, D, FW), Sv, 2);  // far slot
          const aL = mkJob(A, [
            {pts: [pA0, aWheelStart]},                 // march to the wheel
            {pts: [aWheelStart].concat(arcPts(C))},    // quarter-wheel around P
            {pts: [aDescStart, aDescEnd]},             // descend abreast
            {pts: [aDescEnd, aFinal]}                  // cross in front, on line
          ]);
          const pL = mkJob(P, [
            {pts: [pP0, C]},                           // march to the wheel
            {wait: ARC},                               // pivot in place
            {pts: [C, pDescEnd]},                      // descend abreast
            {wait: XOVER},                             // shorten step
            {pts: [pDescEnd, pFinal]}                  // oblique into slot
          ]);
          if(r === "front" && k < 2) frontFinish.push(aL, pL);
          if(r === "rear"  && k < 1) rearTravel.push(aL, pL);
          if(r === "rear") rearJobIdx.push(jobs.length - 2, jobs.length - 1);
        } else {
          // Unpaired trailing file: simple turn above the slot, straight down.
          const m = pair[0];
          const p0 = m.pos.slice();
          const turnPt = add(p0, D, aNear - aOf(p0));
          const fin = add(turnPt, Sv, lineS - sOf(p0));
          const L = mkJob(m, [{pts: [p0, turnPt, fin]}]);
          if(r === "front" && k < 2) frontFinish.push(L);
          if(r === "rear"  && k < 1) rearTravel.push(L);
          if(r === "rear") rearJobIdx.push(jobs.length - 1);
        }
      }
    }

    // Left variant: 1S is at the TAIL of the column; he marches on to his
    // line-of-battle post — rear rank, covering the captain's own post on
    // the right of the company (which the captain reoccupies afterwards).
    if(!onRight){
      const s1 = this.men.get("1S");
      const p0 = s1.pos.slice();
      const aCover = captA + (n + 1) * FW;
      const turnPt = add(p0, D, aCover - aOf(p0));
      const fin = add(turnPt, Sv, (sLine - RANKD) - sOf(p0));
      mkJob(s1, [{pts: [p0, turnPt, fin]}]);
    }

    // The rear rank marks time until four front-rank men are established (151).
    const rearStart = Math.max(...frontFinish);
    for(const idx of rearJobIdx){
      jobs[idx].segs.unshift({wait: rearStart});
      jobs[idx].L += rearStart;
    }
    // File closers hold until the rear rank's first two files are established,
    // so the rear-rank men stream past them before they leave their posts.
    const closerStart = rearStart + Math.max(...rearTravel);

    // Closer posts, measured from C-1's slot leftward along the new line.
    const O_C1 = add(captFinal, D, (onRight ? 1 : n) * FW);
    const Lline = vec(h - Math.PI/2);                 // left along the new line
    const postFi = {
      "1L": this.lt1Fi(), "2L": (n1 - 1)/2,
      "3S": n1 + 1, "4S": n1 - 2, "5S": 1
    };
    if(onRight) postFi["2S"] = n - 2;   // left variant: 2S is the head guide
    if(this.men.has("3L")) postFi["3L"] = (n1 + n - 1)/2;
    for(const id in postFi){
      const m = this.men.get(id);
      const postPos = add(add(O_C1, Lline, postFi[id]*FW), Sv, -CLOSERD);
      const p0 = m.pos.slice();
      const turnPt = add(p0, D, aOf(postPos) - aOf(p0));
      mkJob(m, [{wait: closerStart}, {pts: [p0, turnPt, postPos]}]);
    }

    // Convert jobs to timed paths sharing one constant-speed global clock.
    let W = 0;
    for(const j of jobs) W = Math.max(W, j.L);
    for(const j of jobs){
      let acc = 0, cursor = j.m.pos.slice();
      for(const s of j.segs){
        s._start = acc; s._anchor = cursor.slice();
        if(s.wait !== undefined){ s._len = s.wait; }
        else {
          s._cum = [0];
          for(let k = 1; k < s.pts.length; k++)
            s._cum.push(s._cum[k-1] + dist(s.pts[k-1], s.pts[k]));
          s._len = s._cum[s._cum.length - 1];
          cursor = s.pts[s.pts.length - 1].slice();
        }
        acc += s._len;
      }
      const total = acc, segs = j.segs, finalPos = cursor.slice();
      const fn = t => {
        const d = Math.min(total, Math.max(0, t * W));
        for(const s of segs){
          if(d <= s._start + s._len){
            if(s.wait !== undefined) return s._anchor;
            const dd = Math.max(0, d - s._start);
            for(let k = 1; k < s.pts.length; k++){
              if(dd <= s._cum[k] || k === s.pts.length - 1){
                const seg = s._cum[k] - s._cum[k-1];
                const tt = seg <= 1e-12 ? 0 : (dd - s._cum[k-1]) / seg;
                return [s.pts[k-1][0] + (s.pts[k][0]-s.pts[k-1][0])*tt,
                        s.pts[k-1][1] + (s.pts[k][1]-s.pts[k-1][1])*tt];
              }
            }
          }
        }
        return finalPos;
      };
      j.m.setTimedPath(samplePath(fn, 140));
    }

    this.heading = h;
    this.faceAll(h);
    // Right variant: the captain and 1S already stand at their posts → line
    // of battle. Left variant: the captain and left guide are posted at the
    // LEFT and return by a further order of the instructor (152).
    this.state = onRight ? "LINE_HALT" : "FILE_LINE_LEFT";
    return null;
  }

  // Par. 152 (closing sentence): after forming on the left, the captain and
  // the left guide return to their places in line of battle.
  odFileIntoLinePosts(){
    if(this.state !== "FILE_LINE_LEFT")
      return "'Captain and left guide to your posts' follows forming ON THE "+
             "LEFT by file into line.";
    this.clearPaths();
    const h = this.heading;
    const F = vec(h), Rl = vec(h + Math.PI/2), Ll = vec(h - Math.PI/2);
    const capt = this.men.get("capt"), sg2 = this.men.get("2S");
    // Captain: around the FRONT of the line to the right of the front rank.
    let rightMan = null, leftMan = null;
    for(const m of this.men.values())
      if(m.rank === "front" && m.fileI !== null){
        if(!rightMan || dot(m.pos, Rl) > dot(rightMan.pos, Rl)) rightMan = m;
        if(!leftMan  || dot(m.pos, Ll) > dot(leftMan.pos, Ll))  leftMan  = m;
      }
    const captPost = add(rightMan.pos, Rl, FW);
    const wp1 = add(capt.pos, F, 2);
    const wp2 = add(captPost, F, 2);
    capt.setPath([wp1, wp2, captPost]);
    this._captSpeedMult = 1.5;
    // 2S: behind the line to his file-closer post, second file from the left.
    const sgPost = add(add(leftMan.pos, Rl, FW), F, -CLOSERD);
    const sgWp = add(sg2.pos, F, -(CLOSERD - RANKD + 1));
    sg2.setPath([sgWp, sgPost]);
    this.state = "LINE_HALT"; return null;
  }

  // ---- Lesson IV, Art. 5: the company marching by the flank, to form it
  // ---- by company, or by platoon, into line, without halting (155-169) ---
  odFlankIntoLine(byPlatoon){
    if(this.state !== "FLANK_MARCH" && this.state !== "FLANK_FACED")
      return "'By company (platoon), into line' is given while the company "+
             "is marching by the flank.";
    this.clearPaths();
    this._captSpeedMult = 1;
    const onRight = (this._flankRight !== false);
    const q = onRight ? 1 : -1;
    const D   = vec(this.colDir);                    // march direction (kept)
    const Lat = vec(this.colDir + q*Math.PI/2);      // lane-side lateral
    const n = this.nFiles, n1 = this.n1, n2 = n - n1;
    const DQ = 1.8;                                  // double-quick speed
    const aOf = p => dot(p, D);
    const anchor = this.men.get(onRight ? "1S" : "2S");  // head guide anchors
    const p0A = anchor.pos.slice();

    // Lateral slot (in FW, negative = away from the lanes) and line offsets.
    // Company: one line, files ordered from the anchor's track outward.
    // Platoon: leading platoon's line at the anchor; trailing platoon's line
    // one platoon-front behind (wheeling distance); each covers the other.
    const leadPlt = onRight ? 1 : 2;
    const nLead = leadPlt === 1 ? n1 : n2;
    const lineOff = p => (!byPlatoon || p === leadPlt) ? 0 : -(nLead + 2) * FW;
    const latIdx = i => {
      if(!byPlatoon) return onRight ? (i + 1) : (n - i);
      const p = (i < n1) ? 1 : 2;
      return onRight ? (i - (p === 1 ? 0 : n1) + 1)
                     : ((p === 1 ? n1 - 1 : n - 1) - i + 1);
    };
    const pltOf = i => (i < n1) ? 1 : 2;

    // Iterate the anchor's advance A until every mover can reach his slot at
    // double-quick within the time the anchor takes to march A paces.
    const slotPos = (A, da, s) =>
      add(add(p0A, D, A + da), Lat, -s * FW);
    // collect movers: [man, daOff (line offset - rank depth - chief lead), s]
    const movers = [];
    for(const m of this.men.values()){
      if(m.id === anchor.id) continue;
      if((m.rank === "front" || m.rank === "rear") && m.fileI !== null){
        const i = m.fileI, p = pltOf(i);
        const da = (byPlatoon ? lineOff(p) : 0) - (m.rank === "rear" ? RANKD : 0);
        movers.push([m, da, latIdx(i)]);
      }
    }
    // Guides, chiefs, and closers.
    if(byPlatoon){
      // One guide per platoon on the outer flank (166-168): 1S serves the
      // 1st platoon, 2S the 2d (167). The anchor is already handled; the
      // other sergeant crosses to his platoon's flank.
      const g1 = this.men.get("1S"), g2 = this.men.get("2S");
      const nP = { 1: n1, 2: n2 };
      const guideOf = { 1: g1, 2: g2 };
      for(const p of [1, 2]){
        const g = guideOf[p];
        if(g.id === anchor.id){
          // the anchor crosses to the flank too (handled as a mover so the
          // whole formation shares one clock; a virtual point anchors A)
          movers.push([g, lineOff(p), nP[p] + 1]);
        } else {
          movers.push([g, lineOff(p), nP[p] + 1]);
        }
      }
      // Chiefs before the centres of their platoons (165).
      movers.push([this.men.get("capt"), lineOff(1) + 2, (n1 + 1)/2]);
      movers.push([this.men.get("1L"),  lineOff(2) + 2, (n2 + 1)/2]);
      // File closers follow the platoons to which they are attached (169).
      // 1L is chief of the 2d platoon here, so his usual closer post stays
      // vacant; the remaining closers follow their own platoons (169).
      const posts = { "2L": [1, (n1 - 1)/2 + 1], "4S": [1, n1 - 1],
                      "5S": [1, 2], "3S": [2, 2] };
      if(this.men.has("3L")) posts["3L"] = [2, (n2 - 1)/2 + 1];
      for(const id in posts){
        const [p, s] = posts[id];
        movers.push([this.men.get(id), lineOff(p) - CLOSERD, s]);
      }
    } else {
      // Company into line: the other sergeant runs to the far flank as guide
      // (161-162); the captain posts two paces before the centre (160);
      // the file closers take their posts behind the rear rank.
      const other = this.men.get(onRight ? "2S" : "1S");
      movers.push([other, 0, n + 1]);
      movers.push([this.men.get("capt"), 2, (n + 1)/2]);
      const postFi = { "1L": this.lt1Fi(), "2L": (n1 - 1)/2,
                       "3S": n1 + 1, "4S": n1 - 2, "5S": 1 };
      if(this.men.has("3L")) postFi["3L"] = (n1 + n - 1)/2;
      for(const id in postFi)
        movers.push([this.men.get(id), -CLOSERD, postFi[id] + 1]);
    }

    let A = 8;
    for(let it = 0; it < 14; it++){
      let need = A;
      for(const [m, da, s] of movers)
        need = Math.max(need, dist(m.pos, slotPos(A, da, s)) / DQ);
      A = need;
    }
    A += 0.5;   // small margin

    // Anchor: straight ahead at the common step for the full duration.
    const jobsW = A;   // time budget (in anchor-paces)
    const mkTimed = (m, segs) => {
      // segs: [{pts:[..], speed}] — time cost of a segment = length/speed
      let acc = 0;
      for(const s of segs){
        s._cum = [0];
        for(let k = 1; k < s.pts.length; k++)
          s._cum.push(s._cum[k-1] + dist(s.pts[k-1], s.pts[k]));
        s._len = s._cum[s._cum.length - 1] / s.speed;
        s._start = acc; acc += s._len;
      }
      const total = acc, fin = segs[segs.length-1].pts.slice(-1)[0];
      const fn = t => {
        const tt = Math.min(total, Math.max(0, t * jobsW));
        for(const s of segs){
          if(tt <= s._start + s._len || s === segs[segs.length-1]){
            const dd = Math.min(s._cum[s._cum.length-1],
                                Math.max(0, (tt - s._start) * s.speed));
            for(let k = 1; k < s.pts.length; k++){
              if(dd <= s._cum[k] || k === s.pts.length - 1){
                const seg = s._cum[k] - s._cum[k-1];
                const u = seg <= 1e-12 ? 0 : (dd - s._cum[k-1]) / seg;
                return [s.pts[k-1][0] + (s.pts[k][0]-s.pts[k-1][0])*u,
                        s.pts[k-1][1] + (s.pts[k][1]-s.pts[k-1][1])*u];
              }
            }
          }
        }
        return fin;
      };
      m.setTimedPath(samplePath(fn, 120));
    };

    mkTimed(anchor, [{pts: [p0A, add(p0A, D, A)], speed: 1}]);

    // Each mover: double-quick straight to the EARLIEST intercept with his
    // slot on the moving line, then fall into the common step (156-158).
    for(const [m, da, s] of movers){
      const fin = slotPos(A, da, s);
      const p0 = m.pos.slice();
      // slot at time-fraction τ: fin - D·A·(1-τ). Solve |u + τ·v| = DQ·A·τ
      const u = sub(add(fin, D, -A), p0), v = [D[0]*A, D[1]*A];
      const k2 = (DQ*A)*(DQ*A);
      const a2 = dot(v, v) - k2, b2 = 2*dot(u, v), c2 = dot(u, u);
      let tau;
      if(c2 < 1e-12) tau = 0;
      else {
        const disc = Math.max(0, b2*b2 - 4*a2*c2);
        const r1 = (-b2 + Math.sqrt(disc)) / (2*a2);
        const r2 = (-b2 - Math.sqrt(disc)) / (2*a2);
        tau = Math.max(r1, r2) > 0 ? Math.min(1, Math.max(1e-4,
              (r1 > 0 && r2 > 0) ? Math.min(r1, r2) : Math.max(r1, r2))) : 1;
      }
      const J = add(add(fin, D, -A * (1 - tau)), [0,0], 0);
      const segs = [];
      if(dist(p0, J) > 1e-9) segs.push({pts: [p0, J], speed: DQ});
      if(dist(J, fin) > 1e-9) segs.push({pts: [segs.length ? J : p0, fin], speed: 1});
      if(!segs.length) segs.push({pts: [p0, fin], speed: 1});
      mkTimed(m, segs);
    }

    this.heading = this.colDir;
    this.faceAll(this.colDir);
    if(byPlatoon){
      // Column by platoon on the march: chiefs and ranks match Lesson V.
      this.men.get("capt").rank = "chief";
      this.men.get("1L").rank = "chief";
      this.men.get("1S").rank = "front";
      this.state = "COL_MARCH";
    } else {
      this.state = "LINE_MARCH";
    }
    return null;
  }

  // ---------------- Lesson V: column by platoon ----------------
  odBreakPrep(){
    if(this.state !== "LINE_HALT")
      return "'By platoon, right (left) wheel' is given from the halted line of battle.";
    this.clearPaths();
    const F = this.F();
    // Chiefs of platoon post 2 paces in front of the centre of their platoon
    for(const [id, p] of [["capt",1],["1L",2]]){
      const ms = this.platoonMembers(p).filter(m => m.rank === "front");
      const c = centroid(ms.map(m => m.pos));
      const chief = this.men.get(id);
      chief.setPath([add(c, F, 2)]);
      chief.rank = "chief";
    }
    // Covering sergeant (1S) steps forward into the captain's vacated front-rank spot
    const s = this.men.get("1S");
    s.setPath([this.men.get("capt").pos.slice()]);
    s.rank = "front";
    this.state = "COL_READY"; return null;
  }
  _breakGeometry(left){
    // Shared geometry for breaking into column by platoon (176-187).
    const turn = left ? -Math.PI/2 : Math.PI/2;
    const side = vec(this.heading + turn);          // wheel side of the line
    const perpDir = vec(this.heading + 2*turn + Math.PI); // pivot -> flank
    const g = { turn, side, perpDir, pivots: {}, rMax: {}, stop: {},
                nP: { 1: this.n1, 2: this.nFiles - this.n1 } };
    for(const p of [1,2]){
      let pivotMan = null; let bestD = -Infinity;
      for(const m of this.platoonMembers(p))
        if(m.rank === "front" && m.id !== "1S"){
          const d = dot(m.pos, side);
          if(d > bestD){ bestD = d; pivotMan = m; }
        }
      g.pivots[p] = pivotMan.pos.slice();
      let rMax = 0;
      for(const m of this.platoonMembers(p))
        rMax = Math.max(rMax, dist(m.pos, g.pivots[p]));
      g.rMax[p] = rMax;
      g.stop[p] = Math.max(0, Math.PI/2 - 3 / rMax);   // halt 3 paces short
    }
    return g;
  }
  odBreakMarch(left){
    if(this.state !== "COL_READY")
      return "'MARCH' here follows 'By platoon, right (left) wheel.'";
    this.clearPaths();
    const g = this._breakGeometry(left);
    const sgn = Math.sign(g.turn);
    const capt = this.men.get("capt"), lt = this.men.get("1L");
    const s1 = this.men.get("1S"), s2 = this.men.get("2S");
    const chiefs = { 1: capt, 2: lt };
    const finals = new Map(), guides = {};
    for(const p of [1,2]){
      const P = g.pivots[p];
      guides[p] = add(P, g.perpDir, g.nP[p] * FW);   // flank rest point
      for(const m of this.platoonMembers(p))
        finals.set(m.id, rotAbout(m.pos, P, g.turn));
    }
    // The chiefs run by the shortest line a little beyond the point at which
    // the marching flank will rest, face the late rear, and mark the
    // perpendicular with the pivot man who has faced (178/180).
    for(const p of [1,2]){
      const marker = add(g.pivots[p], g.perpDir, (g.nP[p] + 2) * FW);
      const p0 = chiefs[p].pos.slice();
      chiefs[p].setTimedPath(samplePath(t => {
        const s = Math.min(1, t / 0.5);
        return [p0[0] + (marker[0]-p0[0])*s, p0[1] + (marker[1]-p0[1])*s];
      }, 60));
      finals.set(chiefs[p].id, marker);
    }
    // Rank-and-file, closers: wheel on the fixed pivot, halting three paces
    // short of the perpendicular at the chiefs' 'Platoon--HALT' (178-179).
    // The pivot man faces to the wheel side and stands fast (178). 1S stands
    // fast, then moves at the halt to the flank rest point of the 1st
    // platoon, passing by the front rank; 2S in like manner for the 2d (179).
    for(const p of [1,2]){
      const P = g.pivots[p], stop = g.stop[p] * sgn;
      for(const m of this.platoonMembers(p)){
        if(m === chiefs[1] || m === chiefs[2] || m.id === "1S" || m.id === "2S")
          continue;
        if(dist(m.pos, P) <= 1e-9) continue;     // the pivot man stands fast
        const p0 = m.pos.slice();
        m.setTimedPath(samplePath(t =>
          rotAbout(p0, P, stop * Math.min(1, t / 0.75)), 60));
      }
    }
    {
      // 1S: stand fast during the wheel, then along the front to plt 1's
      // flank rest point.
      const p0 = s1.pos.slice();
      const P1 = g.pivots[1];
      const out1 = add(P1, g.side, FW);
      const wpB = add(out1, g.perpDir, g.nP[1] * FW);
      const G1 = guides[1];
      const legs = [p0, out1, wpB, G1];
      const cum = [0];
      for(let k=1;k<legs.length;k++) cum.push(cum[k-1]+dist(legs[k-1],legs[k]));
      const L = cum[cum.length-1];
      // Right wheel: 1S stands fast until the halt (179). Left wheel: he has
      // the whole company front to traverse, so he steps off at once.
      const tStart = left ? 0 : 0.75;
      s1.setTimedPath(samplePath(t => {
        if(t <= tStart || L <= 1e-9) return p0;
        const d = L * (t - tStart) / (1 - tStart);
        for(let k=1;k<legs.length;k++)
          if(d <= cum[k] || k === legs.length-1){
            const seg = cum[k]-cum[k-1], u = seg<=1e-12?0:Math.min(1,(d-cum[k-1])/seg);
            return [legs[k-1][0]+(legs[k][0]-legs[k-1][0])*u,
                    legs[k-1][1]+(legs[k][1]-legs[k-1][1])*u];
          }
        return G1;
      }, 60));
      finals.set("1S", G1);
    }
    {
      // 2S: wheels with his platoon (a file closer), then moves at the halt
      // to plt 2's flank rest point.
      const p0 = s2.pos.slice();
      const P2 = g.pivots[2], stop2 = g.stop[2] * sgn;
      const G2 = guides[2];
      const wheeled = rotAbout(p0, P2, stop2);
      s2.setTimedPath(samplePath(t => {
        if(t <= 0.75) return rotAbout(p0, P2, stop2 * (t / 0.75));
        const u = (t - 0.75) / 0.25;
        return [wheeled[0] + (G2[0]-wheeled[0])*u, wheeled[1] + (G2[1]-wheeled[1])*u];
      }, 60));
      finals.set("2S", G2);
    }
    this.colDir = this.heading + g.turn;
    this.faceAll(this.colDir);
    // Chiefs face the late rear, toward their guides (178/180).
    capt.facing = this.heading + Math.PI;
    lt.facing = this.heading + Math.PI;
    this._break = { left: left, finals: finals, guides: guides,
                    pivots: g.pivots, colDir: this.colDir };
    this.state = "BREAK_HALTED"; return null;
  }
  odBreakDress(){
    if(this.state !== "BREAK_HALTED")
      return "'Left (Right)--DRESS' here follows the platoons' halt three "+
             "paces short of the perpendicular.";
    this.clearPaths();
    const b = this._break;
    for(const p of [1,2])
      for(const m of this.platoonMembers(p)){
        if(m.id === "capt" || m.id === "1L" || m.id === "1S" || m.id === "2S")
          continue;
        const tgt = b.finals.get(m.id);
        if(tgt && dist(m.pos, tgt) > 1e-9) m.setPath([tgt]);
      }
    this.state = "BREAK_DRESSED"; return null;
  }
  odBreakFront(){
    if(this.state !== "BREAK_DRESSED")
      return "'FRONT' here follows the dress of the platoons on their guides.";
    this.clearPaths();
    const D = vec(this.colDir);
    for(const [id, p] of [["capt",1],["1L",2]]){
      const ms = this.platoonMembers(p).filter(
        m => m.rank === "front" && m.id !== "1S");
      const cen = centroid(ms.map(m => m.pos));
      this.men.get(id).setPath([add(cen, D, 2)]);
    }
    this.faceAll(this.colDir);
    this.state = "COL_HALT"; return null;
  }
  // 188-194: breaking by platoon and moving the column forward without a
  // halt ('3. Forward. 4. MARCH. 5. Guide left'). Also given from the march
  // in line (194).
  odBreakForward(left){
    const fromMarch = (this.state === "LINE_MARCH");
    if(this.state !== "COL_READY" && !fromMarch)
      return "'MARCH -- and forward' follows 'By platoon, right (left) "+
             "wheel' (after the caution), or is given from the march in "+
             "line (par. 194).";
    this.clearPaths();
    const capt = this.men.get("capt"), lt = this.men.get("1L");
    const s1 = this.men.get("1S");
    if(fromMarch){
      // Par. 189 applied on the move: the chiefs run before their platoons
      // and the covering sergeant replaces the captain, during an initial
      // phase in which the company marks time.
      capt.rank = "chief"; lt.rank = "chief"; s1.rank = "front";
    }
    const F = this.F();
    const prepT = fromMarch ? 0.18 : 0;
    const wheelEnd = prepT + (1 - prepT) * 0.55;
    const g = this._breakGeometry(left);
    const sgn = Math.sign(g.turn);
    const colDir = this.heading + g.turn;
    const Dv = vec(colDir);
    const chiefs = { 1: capt, 2: lt };
    // prep targets (for the from-march case)
    const prepTgt = new Map();
    if(fromMarch){
      for(const p of [1,2]){
        const ms = this.platoonMembers(p).filter(
          m => m.rank === "front" && m.id !== "1S" && m.id !== "capt" && m.id !== "1L");
        prepTgt.set(chiefs[p].id, add(centroid(ms.map(m => m.pos)), F, 2));
      }
      prepTgt.set("1S", capt.pos.slice());
    }
    const guides = {};
    for(const p of [1,2])
      guides[p] = add(add(g.pivots[p], g.perpDir, g.nP[p] * FW),
                      Dv, MARCH_PACES);
    for(const m of this.men.values()){
      const p0 = m.pos.slice();
      const start = prepTgt.has(m.id) ? prepTgt.get(m.id) : p0;
      const p = m.platoon;
      const P = g.pivots[p] || g.pivots[1];
      const full = rotAbout(start, P, g.turn);
      const isGuide = (m.id === "1S" || m.id === "2S");
      const guidePost = isGuide ? guides[m.id === "1S" ? 1 : 2] : null;
      const fn = t => {
        if(t <= prepT){
          const u = prepT <= 1e-9 ? 1 : t / prepT;
          return [p0[0] + (start[0]-p0[0])*u, p0[1] + (start[1]-p0[1])*u];
        }
        if(t <= wheelEnd){
          const w = (t - prepT) / (wheelEnd - prepT);
          return rotAbout(start, P, g.turn * w);
        }
        const u = (t - wheelEnd) / (1 - wheelEnd);
        if(isGuide){
          // Guide left (right): the sergeants move rapidly to the flanks of
          // their platoons as the column steps off (191).
          return [full[0] + (guidePost[0]-full[0])*u,
                  full[1] + (guidePost[1]-full[1])*u];
        }
        return add(full, Dv, MARCH_PACES * u);
      };
      m.setTimedPath(samplePath(fn, 90));
    }
    this.colDir = colDir;
    this.faceAll(colDir);
    this.state = "COL_MARCH"; return null;
  }
  odColMarch(){
    if(this.state !== "COL_HALT" && this.state !== "COL_MARCH" &&
       this.state !== "SEC_MARCH")
      return "The company is not formed in column by platoon.";
    this.clearPaths();
    const D = vec(this.colDir);
    for(const m of this.men.values()) m.setPath([add(m.pos, D, MARCH_PACES)]);
    if(this.state !== "SEC_MARCH") this.state = "COL_MARCH";
    return null;
  }
  odColChange(left){
    if(this.state !== "COL_MARCH" && this.state !== "COL_HALT")
      return "The company is not marching in column by platoon.";
    this.clearPaths();
    const D = vec(this.colDir);
    const turn = left ? -Math.PI/2 : Math.PI/2;
    const inner = vec(this.colDir + turn);
    const nd = this.colDir + turn, NDv = vec(nd);
    const cen = {};
    for(const p of [1,2]) cen[p] = centroid(this.platoonMembers(p).map(m => m.pos));
    const lead = dot(cen[1], D) > dot(cen[2], D) ? 1 : 2;
    const trail = lead === 1 ? 2 : 1;
    const pivotLead = this.extremeFrontMan(lead, inner);
    const PIVR = 1.5;
    const Cw = add(pivotLead.pos, inner, PIVR);
    const pivotTrail = this.extremeFrontMan(trail, inner);
    const gap = dot(sub(pivotLead.pos, pivotTrail.pos), D);
    let wmax = 1;
    for(const m of this.platoonMembers(lead)) wmax = Math.max(wmax, dist(m.pos, Cw));
    const arc = wmax * Math.PI/2;
    const r = arc / (arc + gap);
    for(const m of this.platoonMembers(lead)){
      const p0 = m.pos.slice();
      const fn = t => {
        if(t <= r) return rotAbout(p0, Cw, turn * (t/r));
        const q = rotAbout(p0, Cw, turn);
        return add(q, NDv, gap * (t - r)/(1 - r));
      };
      m.setTimedPath(samplePath(fn, 48));
    }
    // the trailing platoon slackens: it waits until the leading platoon has
    // nearly cleared the wheeling ground before closing on it
    const w = 0.7 * r;
    const q0 = w + (1 - w) * gap / (gap + arc);
    for(const m of this.platoonMembers(trail)){
      const p0 = m.pos.slice();
      const fn = t => {
        if(t <= w) return p0;
        if(t <= q0) return add(p0, D, gap * (t - w)/(q0 - w));
        const q = add(p0, D, gap);
        return rotAbout(q, Cw, turn * (t - q0)/(1 - q0));
      };
      m.setTimedPath(samplePath(fn, 48));
    }
    this.colDir = nd;
    this.faceAll(nd);
    this.state = "COL_MARCH"; return null;
  }
  odColHalt(){
    if(this.state !== "COL_MARCH") return "The column is not marching.";
    this.clearPaths();
    this.state = "COL_HALT"; return null;
  }

  // ------ Lesson V, Art. 5: form to the left (or right) into line ------
  // Fix 5: platoons wheel the full 90° — the HALT command (next step) stops
  // them.  The "three paces from the line" note in par. 245 means the HALT
  // order is given when the marching flank is three paces away, not that the
  // animation stops short.
  //
  // Fix 6: when the trailing platoon must pass behind the leading platoon, it
  // waits for the lead to complete its wheel and advance clear, then marches
  // straight forward (no side-step), and only ONE platoon is moving at a time.
  odFormLineWheel(left){
    if(this.state !== "COL_HALT" && this.state !== "COL_MARCH")
      return "'Left (right) into line, wheel' is given with the column by "+
             "platoon at a halt or on the march.";
    // If marching, finish movement first
    if(this.state === "COL_MARCH") this.finish();
    this.clearPaths();
    const sign = left ? -1 : 1;
    const turn = sign * Math.PI/2;
    const side = vec(this.colDir + turn);    // wheel side
    const h = this.colDir + turn;            // new line-of-battle heading
    const D = vec(this.colDir);              // current march direction
    const F = vec(h);                        // new forward direction
    const Rv = vec(h + Math.PI/2);           // rightward in new line

    // Compute pivot points.
    // The pivot is the flank on the WHEEL SIDE (furthest in the side direction).
    // For left-into-line after a right wheel: side=[0,-1] (northward), so C-2 and C-4
    // (the left/north flanks of each platoon) are correctly selected as pivots.
    // Exclude 1S who may be in plt1's front rank at the extra-right spot after odBreakPrep.
    const pivots = {}, finals = new Map();
    let plt1PivotId = null;
    for(const p of [1,2]){
      let pivotMan = null; let bestD = -Infinity;
      for(const m of this.platoonMembers(p))
        if(m.rank === "front" && m.id !== "1S"){
          const d = dot(m.pos, side);
          if(d > bestD){ bestD = d; pivotMan = m; }
        }
      pivots[p] = pivotMan.pos.slice();
      if(p === 1) plt1PivotId = pivotMan.id;
      // Full 90° final positions (used for dress step and file-closer targets)
      for(const m of this.platoonMembers(p))
        finals.set(m.id, rotAbout(m.pos, pivots[p], turn));
    }

    // Compute the stop-short angle for each platoon: stop when the marching flank
    // is 3 paces from the final line (par. 245). The remaining angle is covered by
    // the DRESS step after Platoon—HALT.
    // stopAngle[p] = π/2 - 3/rMax, where rMax is the outermost man's distance from pivot.
    const STOP_PACES = 3;
    const stopAngle = {};
    for(const p of [1,2]){
      let rMax = 0;
      for(const m of this.platoonMembers(p))
        rMax = Math.max(rMax, dist(m.pos, pivots[p]));
      stopAngle[p] = Math.max(0, Math.PI/2 - STOP_PACES / Math.max(rMax, 1));
    }

    // Determine which platoon is leading (further along colDir)
    const cen = {};
    for(const p of [1,2]) cen[p] = centroid(this.platoonMembers(p).map(m => m.pos));
    const lead = dot(cen[1], D) > dot(cen[2], D) ? 1 : 2;
    const trail = lead === 1 ? 2 : 1;

    // The 1st platoon must always rest on the RIGHT of the line of battle.
    // Adjust the trailing platoon's finals to sit correctly beside the leading platoon.
    // 1S is excluded from the front-rank ranges: he stands at the extra flank
    // spot (the captain's vacated place) outside the platoon front proper,
    // and would otherwise skew the platoon edges by one pace.
    const frIds = p => this.platoonMembers(p).filter(m =>
      m.rank === "front" && m.id !== "1S").map(m => m.id);
    const sLead  = frIds(lead).map(i => dot(finals.get(i), Rv));
    const dLead  = Math.min(...frIds(lead).map(i => dot(finals.get(i), F)));
    const sTrail = frIds(trail).map(i => dot(finals.get(i), Rv));
    const dTrail = Math.min(...frIds(trail).map(i => dot(finals.get(i), F)));
    const trailOnRight = (trail === 1);
    const shiftR = trailOnRight
      ? (Math.max(...sLead) + FW) - Math.min(...sTrail)
      : (Math.min(...sLead) - FW) - Math.max(...sTrail);
    const shiftF = dLead - dTrail;
    for(const m of this.platoonMembers(trail)){
      let qq = finals.get(m.id);
      qq = add(qq, F, shiftF);
      finals.set(m.id, add(qq, Rv, shiftR));
    }

    // Does the trailing platoon need to march PAST the leading platoon?
    // This happens when right-in-front + right-into-line, or left-in-front +
    // left-into-line (the trailing platoon's wheel ground is ahead of/beyond the
    // leading platoon's wheel ground).
    const trailPivotMan = this.extremeFrontMan(trail, side);
    const trailPivotFinal = finals.get(trailPivotMan.id);
    // How far does the trail pivot need to travel forward (along D) vs its current pos?
    const forwardTravel = dot(sub(trailPivotFinal, trailPivotMan.pos), D);

    // Reconstruct pre-wheel start positions for the trailing platoon
    // (reverse-rotate their finals by turn to get the spot they'd wheel from)
    const preW = new Map();
    for(const m of this.platoonMembers(trail)){
      preW.set(m.id, rotAbout(finals.get(m.id), trailPivotFinal, -turn));
    }

    // Variables set in the march-past branch, used later for fullFinals override.
    let clearAdv = 0, trailAlignAdv = 0;

    // Both platoons wheel simultaneously, stopping stopAngle short of the line.
    // (The march-past case where the trailing platoon needs to travel forward
    // beyond the leading platoon is handled as a special case below.)
    if(forwardTravel > 1.5){
      // ---- Trailing platoon marches past and wheels beyond the leading platoon ----
      // Lead:  [0.00..0.20] wheel at 2x speed. [0.20..0.55] advance in F. [0.55..1.0] hold.
      // Trail: [0.00..0.60] march to pre-wheel ground. [0.60..0.725] wheel at 2x speed.
      //        [0.725..1.0] advance in F to align with lead.

      const signedStopL  = Math.sign(turn) * stopAngle[lead];
      const signedStopTr = Math.sign(turn) * stopAngle[trail];

      let leadMinF_afterWheel = Infinity;
      for(const m of this.platoonMembers(lead))
        leadMinF_afterWheel = Math.min(leadMinF_afterWheel,
          dot(rotAbout(m.pos, pivots[lead], turn), F));
      let trailMaxF_preWheel = -Infinity;
      for(const [, pw] of preW)
        trailMaxF_preWheel = Math.max(trailMaxF_preWheel, dot(pw, F));
      clearAdv = Math.max(0, trailMaxF_preWheel + 2.0 - leadMinF_afterWheel) + 1.0;

      let leadFrontF = -Infinity;
      for(const m of this.platoonMembers(lead))
        if(m.rank === "front")
          leadFrontF = Math.max(leadFrontF,
            dot(rotAbout(m.pos, pivots[lead], turn), F) + clearAdv);
      let trailFrontF = -Infinity;
      for(const m of this.platoonMembers(trail))
        if(m.rank === "front"){
          const pw = preW.get(m.id);
          trailFrontF = Math.max(trailFrontF,
            dot(rotAbout(pw, trailPivotFinal, turn), F));
        }
      trailAlignAdv = leadFrontF - trailFrontF;

      // Lead: wheel [0..0.20] at 2x speed, advance in F [0.20..0.55], hold [0.55..1.0]
      for(const m of this.platoonMembers(lead)){
        const p0 = m.pos.slice();
        const afterWheel   = rotAbout(p0, pivots[lead], signedStopL);
        const stoppedFinal = add(afterWheel, F, clearAdv);
        const fn = t => {
          if(t <= 0.20) return rotAbout(p0, pivots[lead], signedStopL * (t / 0.20));
          if(t <= 0.55){
            const s = (t - 0.20) / 0.35;
            return [afterWheel[0] + (stoppedFinal[0] - afterWheel[0]) * s,
                    afterWheel[1] + (stoppedFinal[1] - afterWheel[1]) * s];
          }
          return stoppedFinal;
        };
        finals.set(m.id, stoppedFinal);
        m.setTimedPath(samplePath(fn, 60));
      }

      // Trail: march [0..0.60], wheel [0.60..0.725] at 2x speed, align in F [0.725..1.0]
      for(const m of this.platoonMembers(trail)){
        const p0 = m.pos.slice();
        const pw = preW.get(m.id);
